          {q:'Complete: 729 = 700 + 20 + ___',type:'num',answer:9,fb:'729 → centena 700, dezena 20, unidade 9.',img:'mat_decomp_729'},
          {q:'Arraste cada parte para o lugar certo. Decompondo 1.205.',type:'dd',pool:['1.000','200','0','5'],targets:[{label:'UM',answer:0,placeholder:'?'},{label:'C',answer:1,placeholder:'?'},{label:'D',answer:2,placeholder:'?'},{label:'U',answer:3,placeholder:'?'}],fb:'1.205 = 1.000 + 200 + 0 + 5. Não tem dezena, então a casa D recebe 0!',img:'mat_decomp_1205'},
          {q:'Usando os algarismos 1, 2, 3 e 0, qual é o MAIOR número de 4 ordens que dá pra formar?',type:'num',answer:3210,fb:'O maior começa pelo MAIOR algarismo: 3, depois 2, depois 1, depois 0 → 3.210.',whyWrong:(u)=>{if(u===123)return 'Esse é um número de 3 ordens. O enunciado pede 4 ordens — use os 4 algarismos!';if(u===321)return 'Faltou usar todos os 4 algarismos. Você não usou o 0.';if(u===3201)return 'Quase! Depois do 3, vem 2, depois 1, depois 0.';return null;}},
          {q:'Qual destes números é o MENOR?',opts:['1.250','725','1.000','999'],correct:1,fb:'725 tem só 3 ordens (centena), os outros têm 4 ordens (milhar). Por isso é o menor.',whyWrong:{0:'1.250 tem milhar — é maior.',2:'1.000 tem milhar — é maior que 725.',3:'999 é maior que 725 (999 > 725).'}},
          {q:'Quantas notas de 10 você precisa para juntar 1 nota de 100?',type:'num',answer:10,fb:'10 × 10 = 100. Dez notas de 10 formam 100!',img:'mat_money_100',whyWrong:(u)=>{if(u===100)return '100 é o valor total, não a quantidade de notas. São 10 notas.';if(u===1)return 'Uma nota de 10 vale só 10. Precisamos de 10 notas.';return null;}},
          {q:'Quantas notas de 1 são iguais a 1 nota de 1.000?',type:'num',answer:1000,fb:'Mil notas de 1 = 1.000. Cada nota de 1 vale 1!',whyWrong:(u)=>{if(u===100)return '100 notas de 1 = só 100. Precisamos de 1.000.';if(u===10)return '10 notas de 1 = só 10. Faltam muitas!';return null;}}
        ]},
      {id:'mat_add',icon:'➕',name:'Adição com Reserva',desc:'Como no quadro do caderno',illus:'generic',
        lesson:`<h3>Adição com Reserva</h3><p>Quando somamos e o resultado de uma casa <span class="hl">passa de 9</span>, escrevemos só a unidade e <span class="hl">"reservamos"</span> 1 para a próxima casa (à esquerda).</p><p>Exemplo passo a passo (47 + 35):</p><p>1) Unidades: 7 + 5 = 12. Escreve 2, reserva 1.<br>2) Dezenas: 4 + 3 + 1 = 8.<br>3) Resultado: <strong>82</strong>.</p><p>📌 No caderno, escrevemos a reserva pequena, em vermelho, em cima da próxima casa!</p>`,
        quiz:[
          {q:'Resolva esta adição:',type:'num',answer:82,fb:'7+5=12 (escreve 2, reserva 1). 4+3+1=8. → 82.',img:'mat_add_47_35',imgWrong:'mat_add_47_35_solved',whyWrong:(u)=>{if(u===72)return 'Você esqueceu de RESERVAR o 1 da soma 7+5=12.';if(u===712)return 'Você escreveu o 12 inteiro. Só escreve o 2 e reserva 1.';return null;}},
          {q:'Resolva esta adição:',type:'num',answer:451,fb:'6+5=11 (reserva 1). 5+9+1=15 (reserva 1). 3+0+1=4. → 451.',img:'mat_add_356_95',imgWrong:'mat_add_356_95_solved',whyWrong:(u)=>{if(u===441)return 'Quase! Você esqueceu uma reserva. As DUAS casas reservam.';if(u===341)return 'Você esqueceu as duas reservas.';return null;}},
          {q:'Resolva esta adição:',type:'num',answer:823,fb:'8+5=13 (reserva 1). 3+8+1=12 (reserva 1). 1+6+1=8. → 823.',img:'mat_add_138_685',imgWrong:'mat_add_138_685_solved',whyWrong:(u)=>{if(u===713)return 'Faltou reserva. As duas casas precisam.';return null;}},
          {q:'Olhe o quadro. Qual é a soma? (CDU)',type:'num',answer:725,fb:'543 + 182 = 725. A reserva da unidade (3+2=5, sem reserva!), depois 4+8=12 (reserva 1), 5+1+1=7.',img:'mat_add_quadro1',imgWrong:'mat_add_quadro1_solved',whyWrong:(u)=>{if(u===625)return 'Faltou somar a reserva da dezena na centena.';return null;}},
          {q:'Em uma adição, 7 + 5 = 12. O que escrevo nessa casa?',opts:['12','7','2 e reservo 1','5 e reservo 7'],correct:2,fb:'Escreve a unidade (2) e RESERVA a dezena (1) para a próxima casa.',whyWrong:{0:'Não cabe 12 numa casa só! Cada casa só guarda um algarismo.',1:'7 era um dos números somados, não a resposta.',3:'Reserva-se a DEZENA do resultado (1), não 7.'}},
          {q:'Resolva esta adição:',type:'num',answer:1012,fb:'1+1=2. 2+9=11 (reserva 1). 8+1+1=10. → 1.012 (a centena virou milhar!)',img:'mat_add_821_191',imgWrong:'mat_add_821_191_solved',whyWrong:(u)=>{if(u===912)return 'A soma das centenas passou de 9 — virou milhar!';if(u===1002)return 'Reveja a soma das dezenas: 2+9=11.';return null;}},
          {q:'Lara tinha 124 figurinhas. Ganhou 86. Com quantas ela ficou?',type:'num',answer:210,fb:'124 + 86 = 210. "Ganhou" significa adição.',img:'mat_add_124_86',imgWrong:'mat_add_124_86_solved',whyWrong:(u)=>{if(u===200)return 'Você esqueceu uma reserva. 4+6=10 (escreve 0, reserva 1).';if(u===38)return 'Isso seria 124 − 86. Mas "ganhou" é adição!';return null;}}
        ]},
      {id:'mat_sub',icon:'➖',name:'Subtração com Recurso',desc:'Pegar emprestado da próxima casa',illus:'generic',
        lesson:`<h3>Subtração com Recurso (Empréstimo)</h3><p>Quando o algarismo de cima é <span class="hl">menor</span> que o de baixo, pegamos <span class="hl">emprestado</span> da próxima casa à esquerda.</p><p>Exemplo (63 − 28):</p><p>1) Unidades: 3 não tira 8! Pega 1 dezena emprestada → vira 13.<br>2) 13 − 8 = 5. (A dezena que era 6 ficou 5.)<br>3) Dezenas: 5 − 2 = 3.<br>4) Resultado: <strong>35</strong>.</p><p>📌 No caderno, riscamos a dezena que emprestou e escrevemos o novo valor!</p>`,
        quiz:[
          {q:'Resolva esta subtração:',type:'num',answer:35,fb:'3 não tira 8 → vira 13. 13−8=5. Dezena 6 vira 5: 5−2=3. → 35.',img:'mat_sub_63_28',imgWrong:'mat_sub_63_28_solved',whyWrong:(u)=>{if(u===45)return 'Você esqueceu de DIMINUIR a dezena. Ela era 6 e virou 5.';if(u===25)return 'Você diminuiu a dezena em 2. Empresta só 1!';return null;}},
          {q:'Resolva esta subtração:',type:'num',answer:228,fb:'6−8 não dá → vira 16. 16−8=8. Dezena 5 vira 4: 4−2=2. Centena 2 desce. → 228.',img:'mat_sub_256_28',imgWrong:'mat_sub_256_28_solved',whyWrong:(u)=>{if(u===238)return 'Você não diminuiu a dezena depois do empréstimo.';if(u===232)return 'Reveja: 16−8=8.';return null;}},
          {q:'Resolva esta subtração:',type:'num',answer:546,fb:'4−8 não dá → vira 14. 14−8=6. Dezena 6 vira 5: 5−1=4. Centena 5 desce. → 546.',img:'mat_sub_564_18',imgWrong:'mat_sub_564_18_solved'},
          {q:'Em 415 − 3, precisamos pegar emprestado?',opts:['Sim, da dezena','Não, é só subtrair direto','Sim, da centena','Sim, das duas casas'],correct:1,fb:'5 − 3 = 2 direto, sem precisar emprestar!',img:'mat_sub_415_3',whyWrong:{0:'Só pega emprestado quando o de cima é MENOR. 5 já é maior que 3.',2:'Aqui não precisa nada disso.',3:'5−3=2 direto.'}},
          {q:'Olhe o quadro. Qual é a subtração? (CDU)',type:'num',answer:325,fb:'543 − 218 = 325. Na unidade: 3 não tira 8, pega emprestado (vira 13). 13−8=5. Dezena 4 vira 3: 3−1=2. Centena 5−2=3. → 325.',img:'mat_sub_quadro1',imgWrong:'mat_sub_quadro1_solved',whyWrong:(u)=>{if(u===335)return 'Você esqueceu de DIMINUIR a dezena depois de emprestar.';if(u===335)return null;if(u===225)return 'Reveja a centena: 5−2=3.';return null;}},
          {q:'Pedro tinha 91 cards. Deu 45 para o irmão. Com quantos ele ficou?',type:'num',answer:46,fb:'91 − 45 = 46. "Deu" significa tirar.',img:'mat_sub_91_45',imgWrong:'mat_sub_91_45_solved',whyWrong:(u)=>{if(u===136)return 'Você somou. Mas "deu" é subtração!';if(u===54)return 'Reveja: 1−5 vira 11−5=6 (emprestou). Dezena 9 vira 8: 8−4=4 → 46.';return null;}},
          {q:'Resolva esta subtração:',type:'num',answer:622,fb:'Empréstimo passa pelo zero! 0−8 não dá; dezena também é 0; pega da centena (8 vira 7). → 622.',img:'mat_sub_800_178',imgWrong:'mat_sub_800_178_solved',whyWrong:(u)=>{if(u===722)return 'Você não emprestou de uma das casas com 0.';if(u===632)return 'A centena ficou 7 depois dos empréstimos. 7−1=6.';return null;}}
        ]},
      {id:'mat_mental',icon:'🧠',name:'Cálculo Mental',desc:'Estratégias rápidas: ±10, ±100',illus:'generic',
        lesson:`<h3>Cálculo Mental</h3><p>Cálculo mental é fazer contas <span class="hl">sem precisar armar</span>. Estratégias:</p><p><strong>+10 ou −10:</strong> só muda a casa da DEZENA. Ex: 237 + 10 = 247.</p><p><strong>+100 ou −100:</strong> só muda a casa da CENTENA. Ex: 392 + 100 = 492.</p><p><strong>Completar 100 ou 1.000:</strong> 80 + 20 = 100. 350 + 650 = 1.000.</p><p><strong>Aproximação:</strong> arredondar para a centena mais próxima. Se a dezena é 0–4, vai pra baixo; se é 5–9, vai pra cima.</p>`,
        quiz:[
          {q:'Cálculo mental: 237 + 10 = ?',type:'num',answer:247,fb:'+10 só muda a dezena: 23 → 24. → 247.',img:'mat_mental_237_10',whyWrong:(u)=>{if(u===238)return 'Você somou 1 em vez de 10.';if(u===337)return 'Você somou 100 em vez de 10.';return null;}},
          {q:'Cálculo mental: 546 − 100 = ?',type:'num',answer:446,fb:'−100 só muda a centena: 5 → 4. → 446.',img:'mat_mental_546_100',whyWrong:(u)=>{if(u===536)return 'Você tirou 10. −100 muda a CENTENA.';if(u===545)return 'Você tirou 1. −100 muda a centena.';return null;}},
          {q:'Olhe a reta numérica. Para chegar a 100, faltam quantos?',type:'num',answer:20,fb:'80 + 20 = 100. Bom truque!',img:'mat_mental_80_100',whyWrong:(u)=>{if(u===10)return '80+10=90, ainda não chega a 100.';return null;}},
          {q:'Olhe a reta numérica. Para chegar a 1.000, faltam quantos?',type:'num',answer:650,fb:'350 + 650 = 1.000.',img:'mat_mental_350_1000',whyWrong:(u)=>{if(u===750)return '350+750=1.100 (passou).';if(u===600)return '350+600=950 (faltam 50).';return null;}},
          {q:'Aproxime 320 para a CENTENA mais próxima.',opts:['200','300','400','350'],correct:1,fb:'320 está mais perto de 300 (só 20 de diferença).',img:'mat_mental_320',whyWrong:{0:'200 está MUITO longe (120 de diferença).',2:'400 está a 80; 300 está a 20 — bem mais perto.',3:'350 não é centena exata.'}},
          {q:'Aproxime 680 para a CENTENA mais próxima.',opts:['600','650','700','800'],correct:2,fb:'680 está mais perto de 700 (só 20 de diferença).',img:'mat_mental_680',whyWrong:{0:'600 está a 80; 700 está a 20.',1:'650 não é centena exata.',3:'800 está bem longe.'}},
          {q:'Cálculo mental: 481 + 100 = ?',type:'num',answer:581,fb:'+100 muda a centena: 4 → 5. → 581.',img:'mat_mental_481_100',whyWrong:(u)=>{if(u===491)return 'Você somou 10. +100 muda a centena.';return null;}},
          {q:'Olhe a reta. Para chegar a 2.000, faltam quantos?',type:'num',answer:900,fb:'1.100 + 900 = 2.000.',img:'mat_mental_1100_2000',whyWrong:(u)=>{if(u===100)return '1.100+100=1.200 (ainda falta muito).';return null;}}
        ]},
      {id:'mat_med',icon:'📏',name:'Grandezas e Medidas',desc:'Comprimento e tempo',illus:'generic',
        lesson:`<h3>Grandezas e Medidas</h3><p><strong>Comprimento:</strong> usamos metro (m), centímetro (cm) e milímetro (mm). 1 m = 100 cm. Instrumentos: <span class="hl">régua</span>, <span class="hl">trena</span>, <span class="hl">fita métrica</span>.</p><p>📏 Sempre comece a medir do <strong>zero</strong> da régua!</p><p><strong>Tempo:</strong> 1 hora = 60 minutos · 1 minuto = 60 segundos.</p><p>No relógio analógico:<br>• Ponteiro pequeno = HORAS<br>• Ponteiro grande = MINUTOS</p><p>Os números do relógio marcam minutos de <strong>5 em 5</strong>: 12=0/60, 3=15, 6=30, 9=45.</p>`,
        quiz:[
          {q:'Quantos centímetros tem 1 metro?',type:'num',answer:100,fb:'1 m = 100 cm. É como um passo grande!',whyWrong:(u)=>{if(u===10)return '10 cm é o tamanho da palma da mão. Bem menos que 1 metro.';if(u===1000)return '1.000 cm = 10 metros. Bem mais que 1 metro.';return null;}},
          {q:'Olhe a régua. Quanto mede o segmento PQ?',type:'num',answer:5,fb:'PQ vai de 0 até 5 cm na régua. Mede 5 cm!',img:'mat_ruler_pq',whyWrong:(u)=>{if(u===0)return '0 é onde COMEÇA, não o tamanho.';return null;}},
          {q:'Olhe a régua. PQ mede 5 cm e RS mede 3 cm. Quantos cm PQ é MAIOR que RS?',type:'num',answer:2,fb:'5 − 3 = 2. PQ é 2 cm maior.',img:'mat_ruler_pq_rs',whyWrong:(u)=>{if(u===8)return 'Você somou. Para diferença é subtração.';return null;}},
          {q:'Que horas o relógio marca?',opts:['3:00','12:03','3:12','12:30'],correct:0,fb:'Ponteiro pequeno no 3, ponteiro grande no 12 → 3 horas em ponto.',img:'mat_clock_3_00',whyWrong:{1:'Ponteiro grande no 12 = 0 minutos. Não 3 minutos.',2:'12 minutos seria o ponteiro grande perto do 2 (12 ÷ 5 = 2,4). Aqui está no 12.',3:'Para 12:30 o ponteiro pequeno estaria entre 12 e 1, e o grande no 6.'}},
          {q:'O ponteiro grande está no 6. Quantos minutos passaram?',type:'num',answer:30,fb:'6 × 5 = 30 min. É o famoso "e meia"!',img:'mat_clock_min30',whyWrong:(u)=>{if(u===6)return 'O algarismo é 6, mas como minutos é 30 (6 × 5).';if(u===60)return '60 minutos seria voltar ao 12.';return null;}},
          {q:'O ponteiro grande está no 9. Quantos minutos passaram?',type:'num',answer:45,fb:'9 × 5 = 45 min.',img:'mat_clock_min45',whyWrong:(u)=>{if(u===9)return 'O 9 vale 45 (9 × 5).';if(u===90)return 'Os números marcam de 5 em 5, não de 10 em 10.';return null;}},
          {q:'Qual é maior: 1 metro ou 80 centímetros?',opts:['80 cm','São iguais','1 metro','Depende'],correct:2,fb:'1 m = 100 cm, e 100 > 80.',whyWrong:{0:'80 cm é menor que 100 cm.',1:'Não são iguais: 100 ≠ 80.'}},
          {q:'Quantos minutos tem 1 hora?',type:'num',answer:60,fb:'1 hora = 60 minutos.',whyWrong:(u)=>{if(u===100)return 'Tempo é em base 60, não 100.';if(u===24)return '24 são as HORAS do dia.';return null;}}
        ]},
      {id:'mat_geo',icon:'📊',name:'Gráficos, Trajetos e Calendário',desc:'Ler dados, mapas e datas',illus:'generic',
        lesson:`<h3>Gráficos, Trajetos e Calendário</h3><p><strong>Gráfico de barras:</strong> a barra MAIS ALTA mostra o MAIOR valor. Sempre leia o TÍTULO e a ESCALA primeiro.</p><p><strong>Pictograma:</strong> usa figurinhas. Cada figurinha pode valer mais de 1 (a legenda diz quanto).</p><p><strong>Trajetos / Mapas:</strong> usamos referências (escola, mercado, praça) e direções (esquerda, direita, frente).</p><p><strong>Calendário:</strong> mostra dias, semanas e meses. Um ano tem 365 dias. <span class="hl">Ano bissexto</span> tem 366 dias e fevereiro com 29 — a cada <strong>4 anos</strong>!</p>`,
        quiz:[
          {q:'Olhe o gráfico. Qual brincadeira teve MAIS votos?',opts:['Esconde-esconde','Cabra-cega','Pular corda','Pular amarelinha'],correct:0,fb:'A barra mais alta é a de Esconde-esconde (12 votos).',img:'mat_graph_brincadeiras',whyWrong:{1:'Cabra-cega tem 9 votos. Veja: tem barra menor que esconde-esconde.',2:'Pular corda tem só 7 votos — a barra mais baixa entre as quatro.',3:'Pular amarelinha tem 11 — perto, mas esconde-esconde é maior (12).'}},
          {q:'Olhe o gráfico das brincadeiras. Quantas crianças no TOTAL participaram?',type:'num',answer:39,fb:'12 + 9 + 7 + 11 = 39 crianças.',img:'mat_graph_brincadeiras',whyWrong:(u)=>{if(u===12)return 'Esse é só o maior valor. Some TODAS as barras.';if(u===36)return 'Confira: 12+9+7+11=39.';return null;}},
          {q:'Olhe o gráfico. Quantas crianças A MAIS escolheram esconde-esconde do que pular corda?',type:'num',answer:5,fb:'12 − 7 = 5 crianças a mais.',img:'mat_graph_brincadeiras',whyWrong:(u)=>{if(u===19)return 'Você somou. "A mais" é diferença → subtração.';if(u===12)return 'Esse é o total da maior. Faça a diferença: 12−7.';return null;}},
          {q:'Olhe o pictograma. Cada estrela vale 2 votos. Quantos votos teve o sabor MORANGO?',type:'num',answer:10,fb:'5 estrelas × 2 votos cada = 10 votos.',img:'mat_picto_morango',whyWrong:(u)=>{if(u===5)return 'Cada estrela vale 2, não 1. Multiplica: 5 × 2 = 10.';if(u===7)return 'Você somou (5+2). É multiplicação: 5 × 2 = 10.';return null;}},
          {q:'O que devemos LER PRIMEIRO em qualquer gráfico?',opts:['A barra mais alta','O título','As cores','Os números'],correct:1,fb:'O título diz SOBRE O QUE é o gráfico.',whyWrong:{0:'A altura só faz sentido depois de saber o tema.',2:'Cores são só pra diferenciar.',3:'Números sem contexto não dizem nada.'}},
          {q:'Um ano normal tem 365 dias. Quantos dias tem um ano bissexto?',type:'num',answer:366,fb:'No bissexto, fevereiro ganha 1 dia extra (29). 365 + 1 = 366.',whyWrong:(u)=>{if(u===365)return 'Bissexto tem UM dia a mais.';return null;}},
          {q:'Anos bissextos acontecem a cada quantos anos?',type:'num',answer:4,fb:'A cada 4 anos! Ex: 2020, 2024, 2028, 2032...',whyWrong:(u)=>{if(u===2)return 'Bissexto é a cada 4 anos.';return null;}},
          {q:'Complete a sequência (de 5 em 5): 1023, 1028, 1033, 1038, ___',type:'num',answer:1043,fb:'A cada passo soma 5: 1038 + 5 = 1043.',img:'mat_seq_5',whyWrong:(u)=>{if(u===1039)return 'Você somou 1 em vez de 5.';if(u===1048)return 'Você pulou um número. Vai de 5 em 5.';return null;}},
          {q:'Arraste a referência certa para cada lugar do mapa.',type:'dd',pool:['Escola','Mercado','Praça'],targets:[{label:'Onde se estuda',answer:0,placeholder:'?'},{label:'Onde se compra comida',answer:1,placeholder:'?'},{label:'Onde se brinca',answer:2,placeholder:'?'}],fb:'Escola = estudar, mercado = comprar, praça = brincar.'}
        ]}
    ]},

  {id:'math',date:'27/04',day:'Monday',lang:'en',name:'Math Test',icon:'🧮',css:'c-math',badge:'English',
    ref:'<p>📖 Prime Math: pp.20–22 (Add/Sub no regrouping), 27–31 (Add with regrouping), 37–40 (Sub with regrouping), 44–47 (Word problems), 123 & 125 (Bar graphs), 130–134 (Length, m & cm)</p>',
    topics:[
      {id:'math_place',icon:'🧩',name:'Place Value (H · T · O)',desc:'Hundreds · Tens · Ones',illus:'generic',
        lesson:`<h3>Place Value</h3><p>Each digit has a <span class="hl">place value</span>. From right to left:</p><p><strong>O</strong> = Ones · <strong>T</strong> = Tens · <strong>H</strong> = Hundreds.</p><p>Example: 423 → 4 hundreds, 2 tens, 3 ones.</p><p>📌 Tip: 10 ones = 1 ten. 10 tens = 1 hundred.</p>`,
        quiz:[
          {q:'Look at the place value table. What number is shown?',type:'num',answer:423,fb:'4 (H) · 2 (T) · 3 (O) → 423.',img:'math_pv_423',whyWrong:(u)=>{if(u===324)return 'You wrote it backwards. Hundreds come FIRST (left).';if(u===43)return 'You missed a digit.';return null;}},
          {q:'Look at the table. What is the value of the 4?',type:'num',answer:400,fb:'The 4 is in the hundreds place. Its value is 400.',img:'math_pv_423',whyWrong:(u)=>{if(u===4)return 'The DIGIT is 4, but the VALUE is 400 (hundreds place).';if(u===40)return '40 would be in the tens place. The 4 here is in hundreds.';return null;}},
          {q:'Look at the table. What is the value of the 5 in the tens place?',type:'num',answer:50,fb:'The 5 in the TENS place is worth 50.',img:'math_pv_557',whyWrong:(u)=>{if(u===5)return 'The digit is 5, but the place value is 50.';if(u===500)return '500 is the FIRST 5 (hundreds). The second 5 is tens = 50.';return null;}},
          {q:'How do we write 4 hundreds, 2 tens, and 3 ones as a number?',type:'num',answer:423,fb:'4 hundreds = 400, 2 tens = 20, 3 ones = 3 → 423.',whyWrong:(u)=>{if(u===234)return 'You wrote it backwards. Hundreds first.';if(u===403)return 'You forgot the 2 tens (= 20).';return null;}},
          {q:'Drag each digit of the number 256 to the correct place.',type:'dd',pool:['2','5','6'],targets:[{label:'Hundreds',answer:0,placeholder:'?'},{label:'Tens',answer:1,placeholder:'?'},{label:'Ones',answer:2,placeholder:'?'}],fb:'256 = 2 hundreds + 5 tens + 6 ones.',img:'math_pv_256_blank'},
          {q:'Look at the two numbers. Which is greater?',opts:['521','They are equal','725','We do not know'],correct:2,fb:'725 has 7 hundreds; 521 has only 5 hundreds. So 725 is greater.',img:'math_pv_compare',whyWrong:{0:'521 has fewer hundreds (5 vs 7).',1:'They are different numbers.',3:'We compare hundreds first: 7 > 5.'}},
          {q:'How many tens make 1 hundred?',type:'num',answer:10,fb:'10 tens = 100.',img:'math_money_100',whyWrong:(u)=>{if(u===100)return '100 is the value, not the count. We need 10 tens.';return null;}}
        ]},
      {id:'math_add',icon:'➕',name:'Addition',desc:'With and without regrouping',illus:'generic',
        lesson:`<h3>Addition</h3><p><strong>Without regrouping:</strong> add column by column. Example: 423 + 316 = 739.</p><p><strong>With regrouping (carry):</strong> when a column adds up to MORE than 9, write the ones digit and <span class="hl">carry 1</span> to the next column.</p><p>Example: 47 + 35<br>1) Ones: 7 + 5 = 12. Write 2, carry 1.<br>2) Tens: 4 + 3 + 1 = 8.<br>Result: <strong>82</strong>.</p><p>📌 We write the carry as a small red 1 above the next column!</p>`,
        quiz:[
          {q:'Solve this addition:',type:'num',answer:739,fb:'3+6=9, 2+1=3, 4+3=7 → 739. (No regrouping needed.)',img:'math_add_423_316',imgWrong:'math_add_423_316_solved',whyWrong:(u)=>{if(u===749)return 'Recheck the tens: 2+1=3, not 4.';if(u===839)return 'Recheck the hundreds: 4+3=7, not 8.';return null;}},
          {q:'Solve this addition:',type:'num',answer:95,fb:'8+7=15, write 5, carry 1. 5+3+1=9 → 95.',img:'math_add_58_37',imgWrong:'math_add_58_37_solved',whyWrong:(u)=>{if(u===85)return 'You forgot to CARRY the 1 from 8+7=15.';if(u===815)return 'You wrote the 15 in one column. Write only 5 and carry 1.';return null;}},
          {q:'Solve this addition:',type:'num',answer:232,fb:'7+5=12 (carry 1). 4+8+1=13 (carry 1). 1+1=2. → 232.',img:'math_add_147_85',imgWrong:'math_add_147_85_solved',whyWrong:(u)=>{if(u===222)return 'You forgot one of the carries. Both columns carry here.';if(u===132)return 'You carried only once. Both ones AND tens regroup here.';return null;}},
          {q:'Solve this addition:',type:'num',answer:288,fb:'6+2=8, 7+1=8, 2+0=2 → 288. (No regrouping.)',img:'math_add_276_12',imgWrong:'math_add_276_12_solved'},
          {q:'Solve this addition:',type:'num',answer:902,fb:'6+6=12 (carry 1). 4+5+1=10 (carry 1). 2+6+1=9. → 902.',img:'math_add_246_656',imgWrong:'math_add_246_656_solved',whyWrong:(u)=>{if(u===892)return 'You missed a carry in the tens column.';return null;}},
          {q:'When 7 + 5 = 12, what do we write in that column?',opts:['12','7','2 and carry 1','5 and carry 7'],correct:2,fb:'Write the ones (2) and carry the tens (1) to the next column.',whyWrong:{0:'12 cannot fit in one column.',1:'7 was a number we added, not the answer.',3:'We carry the tens digit (1), not 7.'}},
          {q:'Tom has 45 stickers. He gets 28 more. How many in all?',type:'num',answer:73,fb:'45 + 28 = 73. "How many in all" means add!',img:'math_add_45_28',imgWrong:'math_add_45_28_solved',whyWrong:(u)=>{if(u===17)return 'You subtracted (45−28). But "in all" means add!';if(u===63)return '5+8=13 (carry 1). 4+2+1=7 → 73.';return null;}},
          {q:'When you carry a 1 in addition, where does it go?',opts:['On the next column to the LEFT','At the end of the answer','On the same column','Below the line'],correct:0,fb:'The carry goes ON TOP of the next column to the LEFT.',whyWrong:{1:'The carry must be added in the next column.',2:'The same column already has its answer.',3:'Below the line is where the answer goes.'}}
        ]},
      {id:'math_sub',icon:'➖',name:'Subtraction',desc:'With and without regrouping',illus:'generic',
        lesson:`<h3>Subtraction</h3><p><strong>Without regrouping:</strong> subtract column by column. Example: 557 − 315 = 242.</p><p><strong>With regrouping (borrow):</strong> when the top digit is <span class="hl">smaller</span> than the bottom, we <span class="hl">borrow</span> 1 from the next column.</p><p>Example: 63 − 28<br>1) Ones: 3 − 8? No! Borrow 1 ten → ones become 13. 13 − 8 = 5.<br>2) The tens digit was 6, now it is 5. 5 − 2 = 3.<br>Result: <strong>35</strong>.</p><p>📌 We cross out the digit that lent and write the new value above!</p>`,
        quiz:[
          {q:'Solve this subtraction:',type:'num',answer:242,fb:'7−5=2, 5−1=4, 5−3=2 → 242. (No borrowing.)',img:'math_sub_557_315',imgWrong:'math_sub_557_315_solved'},
          {q:'Solve this subtraction:',type:'num',answer:155,fb:'2 cannot take 7 → borrow 1 ten (becomes 12). 12−7=5. Tens 6 becomes 5. → 155.',img:'math_sub_162_7',imgWrong:'math_sub_162_7_solved',whyWrong:(u)=>{if(u===165)return 'You added instead of subtracting.';if(u===145)return 'After borrowing, the tens 6 becomes 5, not 4.';return null;}},
          {q:'Solve this subtraction:',type:'num',answer:228,fb:'6−8 not enough → borrow (becomes 16). 16−8=8. Tens 5 becomes 4. 4−2=2. → 228.',img:'math_sub_256_28',imgWrong:'math_sub_256_28_solved',whyWrong:(u)=>{if(u===238)return 'You forgot to lower the tens after borrowing.';if(u===232)return 'Recheck: 16−8=8.';return null;}},
          {q:'Solve this subtraction:',type:'num',answer:546,fb:'4−8 not enough → 14−8=6. Tens 6 becomes 5. 5−1=4. → 546.',img:'math_sub_564_18',imgWrong:'math_sub_564_18_solved',whyWrong:(u)=>{if(u===556)return 'You did not lower the tens after borrowing.';return null;}},
          {q:'In 415 − 3, do we need to borrow?',opts:['Yes, from the tens','No, just subtract','Yes, from the hundreds','Yes, from both'],correct:1,fb:'5 − 3 = 2 directly. No borrowing needed!',img:'math_sub_415_3',whyWrong:{0:'We borrow only when the TOP is SMALLER. 5 is bigger than 3.',2:'No borrowing needed at all.',3:'Just a simple subtraction in the ones place.'}},
          {q:'Sara had 60 candies. She gave 24 away. How many are left?',type:'num',answer:36,fb:'60 − 24 = 36. "Gave away" means subtract.',img:'math_sub_60_24',imgWrong:'math_sub_60_24_solved',whyWrong:(u)=>{if(u===84)return 'You added. "Gave away" means take away.';if(u===46)return 'Recheck: 0−4 needs borrow → 10−4=6, then 5−2=3 → 36.';return null;}},
          {q:'Solve this subtraction:',type:'num',answer:622,fb:'Borrow chain through the zero! 0−8 needs help. Tens is also 0, so we borrow from hundreds. → 622.',img:'math_sub_800_178',imgWrong:'math_sub_800_178_solved',whyWrong:(u)=>{if(u===722)return 'You did not borrow from one of the zeros.';if(u===978)return 'You added instead of subtracting.';return null;}},
          {q:'In 256 − 28, after borrowing, what does the tens digit (5) become?',type:'num',answer:4,fb:'It gave 1 to the ones, so it goes from 5 to 4.',img:'math_sub_256_28',imgWrong:'math_sub_256_28_solved',whyWrong:(u)=>{if(u===5)return 'It LENT 1 to the ones, so it must go DOWN by 1.';if(u===6)return 'It went down, not up.';return null;}}
        ]},
      {id:'math_word',icon:'📖',name:'Word Problems',desc:'Understand · Plan · Answer · Check',illus:'generic',
        lesson:`<h3>Word Problems</h3><p>Use 4 steps:</p><p><strong>1. Understand:</strong> What do we know? What do we need to find?</p><p><strong>2. Plan:</strong> "How many in all", "altogether", "more" → ADD. "How many left", "fewer", "give away" → SUBTRACT.</p><p><strong>3. Answer:</strong> do the math.</p><p><strong>4. Check:</strong> does the answer make sense?</p>`,
        quiz:[
          {q:'There are 295 seats on a train. 42 are empty. How many seats are taken?',type:'num',answer:253,fb:'295 − 42 = 253. Total minus empty = taken.',whyWrong:(u)=>{if(u===337)return 'You added. But empty + taken = TOTAL.';return null;}},
          {q:'Ana picked 135 daisies and 150 roses. How many flowers altogether?',type:'num',answer:285,fb:'135 + 150 = 285. "Altogether" means add.',whyWrong:(u)=>{if(u===15)return 'You subtracted. "Altogether" means add!';return null;}},
          {q:'Raul has 266 star stickers. He has 223 MORE stars than circles. How many circle stickers?',type:'num',answer:43,fb:'266 − 223 = 43. "More than" means stars are bigger; subtract to find circles.',whyWrong:(u)=>{if(u===489)return 'You added. But "more than" tells you stars are bigger.';return null;}},
          {q:'Tara baked 124 cookies. She had 56 left after giving some away. How many did she give away?',type:'num',answer:68,fb:'124 − 56 = 68.',whyWrong:(u)=>{if(u===180)return 'You added. "Left" means we subtract from the start.';return null;}},
          {q:'A shop sold 642 phones in March and April. 319 were sold in March. How many in April?',type:'num',answer:323,fb:'642 − 319 = 323.',whyWrong:(u)=>{if(u===961)return 'You added. April = total − March.';return null;}},
          {q:'A farmer harvests 438 carrots. He harvests 153 FEWER turnips than carrots. How many turnips?',type:'num',answer:285,fb:'438 − 153 = 285. "Fewer" means turnips are smaller.',whyWrong:(u)=>{if(u===591)return 'You added. "Fewer" means LESS, so subtract.';return null;}},
          {q:'A factory makes 562 nuts. It makes 275 FEWER bolts than nuts. How many nuts AND bolts in all?',type:'num',answer:849,fb:'Bolts = 562 − 275 = 287. Total = 562 + 287 = 849.',whyWrong:(u)=>{if(u===287)return 'That is just the bolts! The question asks the TOTAL.';if(u===562)return 'That is just the nuts! Add bolts to get the total.';return null;}},
          {q:'Which words usually mean ADD?',opts:['Gave away · left','In all · altogether · more','Fewer · less than','How many are left'],correct:1,fb:'"In all", "altogether", "more" mean ADD.',whyWrong:{0:'"Gave away" and "left" mean SUBTRACT.',2:'"Fewer" and "less than" mean SUBTRACT.',3:'"Left" means SUBTRACT.'}}
        ]},
      {id:'math_meas',icon:'📏',name:'Measurement',desc:'Meters, centimeters, ruler',illus:'generic',
        lesson:`<h3>Length: Meters & Centimeters</h3><p>A <span class="hl">meter (m)</span> is about a big step. A <span class="hl">centimeter (cm)</span> is small.</p><p><strong>1 meter = 100 centimeters.</strong></p><p>📏 To use the ruler:<br>• Always start at the <strong>zero</strong> mark!<br>• Read where the line ENDS.</p>`,
        quiz:[
          {q:'How many centimeters are in 1 meter?',type:'num',answer:100,fb:'1 m = 100 cm.',whyWrong:(u)=>{if(u===10)return '10 cm is small — like a finger.';if(u===1000)return '1.000 cm = 10 meters. Too big.';return null;}},
          {q:'Look at the ruler. How long is the line?',type:'num',answer:6,fb:'The line goes from 0 to 6 → 6 cm.',img:'math_ruler_6',whyWrong:(u)=>{if(u===0)return '0 is where it STARTS. The end is at 6.';return null;}},
          {q:'Look at the ruler. How long is segment PQ?',type:'num',answer:5,fb:'PQ goes from 0 to 5 → 5 cm.',img:'math_ruler_pq'},
          {q:'PQ = 5 cm and RS = 3 cm. PQ is HOW MUCH longer than RS?',type:'num',answer:2,fb:'5 − 3 = 2 cm.',img:'math_ruler_pq_rs',whyWrong:(u)=>{if(u===8)return 'You added. To find DIFFERENCE, subtract.';return null;}},
          {q:'Where should we place the pencil when starting to measure?',opts:['On the number 1','At the zero mark','At the end of the ruler','Anywhere'],correct:1,fb:'Always start at ZERO!',img:'math_ruler_zero',whyWrong:{0:'1 would skip the first centimeter.',2:'The end gives a wrong measure.',3:'Position matters! Always zero.'}},
          {q:'Which is LONGER: 1 meter or 90 cm?',opts:['90 cm','They are the same','1 meter','We cannot tell'],correct:2,fb:'1 m = 100 cm, and 100 > 90.',whyWrong:{0:'90 cm is less than 100 cm.',1:'They are not equal.'}},
          {q:'Drag each object to the best unit to measure it.',type:'dd',pool:['centimeters','meters'],targets:[{label:'Pencil',answer:0,placeholder:'?'},{label:'Classroom',answer:1,placeholder:'?'}],fb:'Small things use cm. Big things use meters.'},
          {q:'About how long is a classroom?',opts:['5 cm','5 meters','50 meters','500 meters'],correct:1,fb:'A classroom is about 5 to 10 meters.',whyWrong:{0:'5 cm is the size of a finger.',2:'50 meters is half a soccer field.',3:'500 m = 5 soccer fields!'}}
        ]},
      {id:'math_graph',icon:'📊',name:'Bar Graphs',desc:'Reading data with scale > 1',illus:'generic',
        lesson:`<h3>Bar Graphs</h3><p>A <span class="hl">bar graph</span> uses bars to show numbers. The taller the bar, the bigger the number!</p><p>The <span class="hl">scale</span> tells how much each line means. Sometimes each line = 1, but it can be 2, 3, or more!</p><p>📌 Always read the <strong>title</strong> first. Then look at the scale.</p>`,
        quiz:[
          {q:'Look at the graph. Which type of cupcake sold the MOST?',opts:['Chocolate','Lemon','Blackberry','Pineapple'],correct:2,fb:'Blackberry has the tallest bar (50 sold).',img:'math_graph_cupcakes',whyWrong:{0:'Chocolate sold 35 — less than blackberry.',1:'Lemon sold 25 — less than blackberry.',3:'Pineapple sold only 10 — the smallest.'}},
          {q:'Look at the cupcake graph. How many MORE blackberry than chocolate were sold?',type:'num',answer:15,fb:'Blackberry 50 − Chocolate 35 = 15.',img:'math_graph_cupcakes',whyWrong:(u)=>{if(u===85)return 'You added. "How many MORE" means subtract.';return null;}},
          {q:'Look at the graph. How many TOTAL hats are in the shop?',type:'num',answer:20,fb:'Blue 8 + Black 4 + Red 4 + Pink 4 = 20.',img:'math_graph_hats',whyWrong:(u)=>{if(u===8)return 'That is just the biggest bar. Add ALL the bars.';return null;}},
          {q:'Look at the hat graph. How many MORE blue hats than red hats?',type:'num',answer:4,fb:'Blue 8 − Red 4 = 4. "How many more" → subtract.',img:'math_graph_hats'},
          {q:'In the pictograph, each apple = 3 votes. How many votes did Apple get?',type:'num',answer:12,fb:'4 apples × 3 votes each = 12.',img:'math_picto_apple',whyWrong:(u)=>{if(u===4)return 'Each apple is worth 3, not 1.';if(u===7)return 'You added 4+3. Multiply: 4 × 3 = 12.';return null;}},
          {q:'In a bar graph, the TALLEST bar means:',opts:['The smallest number','The biggest number','Nothing','A mistake'],correct:1,fb:'Taller = bigger.',whyWrong:{0:'It is the opposite — short bars are small.',2:'The height is the main info!',3:'It is on purpose.'}},
          {q:'What should you read FIRST on a graph?',opts:['The biggest bar','The title','The colors','The smallest number'],correct:1,fb:'The TITLE tells you what the graph is about.',whyWrong:{0:'The bar means nothing without the topic.',2:'Colors only differ; not the topic.',3:'A number alone has no meaning.'}}
        ]}
    ]},

  {id:'portugues',date:'23/04',day:'Terça',lang:'pt',name:'Língua Portuguesa',icon:'📝',css:'c-portugues',badge:'Português',
    ref:'<p>📖 Livro Unidade A · Capítulos 1 e 2</p><p>📓 Registros no caderno</p>',
    topics:[
      {id:'pt_bio',icon:'📖',name:'Biografia e Autobiografia',desc:'Quem escreve? Em qual pessoa?',illus:'generic',
        lesson:`<h3>Biografia e Autobiografia</h3><p>A palavra <span class="hl">biografia</span> vem do grego: <span class="hl">bio</span> = vida + <span class="hl">grafia</span> = escrita. Ou seja, "vida escrita"!</p><p><span class="hl">Biografia</span> = OUTRA pessoa conta a história de alguém. Usa a <span class="hl">3ª pessoa</span>: ele, ela, seu, sua. Ex: "Ele nasceu em 1452 na Itália..."</p><p><span class="hl">Autobiografia</span> = a PRÓPRIA pessoa conta sua história. Usa a <span class="hl">1ª pessoa</span>: eu, meu, minha. Ex: "Desde pequeno fui invadido por livros..."</p><p>📌 Ambas contam <span class="hl">fatos reais</span>: nascimento, infância, conquistas, lugares onde viveu!</p><p>📌 Na biografia aparecem informações como: data de nascimento, onde nasceu, o que fez de importante, profissão.</p>`,
        quiz:[
          {q:'O que significa a palavra "biografia"?',opts:['Livro de receitas','Vida escrita','História inventada','Desenho bonito'],correct:1,fb:'Bio = vida, grafia = escrita → biografia = vida escrita!',img:'pt_genero_0'},
          {q:'Quem escreve uma biografia?',opts:['A própria pessoa','Outra pessoa','Um robô','Ninguém'],correct:1,fb:'Na biografia, OUTRA pessoa conta a história de alguém!',img:'pt_genero_0'},
          {q:'E quem escreve uma autobiografia?',opts:['Outra pessoa','A própria pessoa','Um jornalista','Um professor'],correct:1,fb:'Na autobiografia, a PRÓPRIA pessoa conta sua vida!',img:'pt_genero_1'},
          {q:'"Eu nasci no Rio de Janeiro e adorava ler" é trecho de:',opts:['Biografia','Autobiografia','Fábula','Receita'],correct:1,fb:'Usa "eu" (1ª pessoa) → é autobiografia!',img:'pt_genero_1'},
          {q:'"Ela nasceu em 1990 e se tornou médica" é trecho de:',opts:['Autobiografia','Biografia','Fábula','Poesia'],correct:1,fb:'Usa "ela" (3ª pessoa) → outra pessoa escreveu → biografia!',img:'pt_genero_3'},
          {q:'Biografias e autobiografias contam fatos:',opts:['Inventados','Reais','Mágicos','Do futuro'],correct:1,fb:'Sempre fatos reais da vida de alguém!',img:'pt_genero_2'},
          {q:'A biografia usa qual pessoa para contar a história?',opts:['1ª pessoa (eu, meu)','2ª pessoa (tu, teu)','3ª pessoa (ele, ela, seu)','Nenhuma'],correct:2,fb:'Biografia usa 3ª pessoa: ele, ela, seu, sua!',img:'pt_genero_3'},
          {q:'A autobiografia usa qual pessoa?',opts:['1ª pessoa (eu, meu, minha)','2ª pessoa (tu)','3ª pessoa (ele, ela)','Todas'],correct:0,fb:'Autobiografia usa 1ª pessoa: eu, meu, minha!',img:'pt_genero_1'},
          {q:'Qual informação aparece em biografias?',opts:['Receitas de bolo','Data e local de nascimento','Feitiços mágicos','Previsão do tempo'],correct:1,fb:'Biografias trazem nascimento, infância, conquistas e fatos reais!',img:'pt_genero_4'},
          {q:'"Desde pequeno fui invadido por livros e leituras..." — isso é:',opts:['Biografia','Autobiografia','Fábula','Notícia'],correct:1,fb:'Usa "fui" (1ª pessoa) → a própria pessoa conta → autobiografia!',img:'pt_genero_1'}
        ]},
      {id:'pt_fab',icon:'🦊',name:'Fábulas',desc:'Histórias com animais que ensinam uma lição',illus:'generic',
        lesson:`<h3>Fábulas</h3><p>Uma <span class="hl">fábula</span> é uma história curta, geralmente com <span class="hl">animais que falam e agem como pessoas</span>. No final, sempre tem uma <span class="hl">moral</span> — uma lição de vida!</p><p>📌 <span class="hl">"O Sapo e o Boi"</span> (Esopo): Um sapo viu um boi enorme e ficou com inveja. Começou a se estufar para ficar do mesmo tamanho, até que... estourou! <span class="hl">Moral: seja sempre você mesmo.</span></p><p>📌 <span class="hl">"O Rato do Mato e o Rato da Cidade"</span>: O rato do campo vivia com calma, comendo raízes e ervas. O rato da cidade tinha comida farta, mas vivia com medo de gatos e perigos. <span class="hl">Moral: mais vale uma vida simples com paz do que luxo com perigos.</span></p><p>📌 Fábulas são diferentes de biografias! Fábulas são <span class="hl">histórias inventadas</span> que ensinam algo. Biografias contam <span class="hl">fatos reais</span>.</p>`,
        quiz:[
          {q:'O que é uma fábula?',opts:['A história real de alguém','Uma história com animais que ensina uma lição','Um texto sobre ciências','Uma receita'],correct:1,fb:'Fábulas usam animais que falam e ensinam uma moral!',img:'pt_fab_2'},
          {q:'Toda fábula tem uma:',opts:['Receita','Conta de matemática','Moral (lição)','Música'],correct:2,fb:'No final da fábula sempre tem uma moral — uma lição de vida!',img:'pt_fab_2'},
          {q:'Na fábula "O Sapo e o Boi", o sapo queria:',opts:['Cantar','Ficar do tamanho do boi','Nadar','Dormir'],correct:1,fb:'O sapo ficou com inveja do boi e tentou se estufar para ficar grande!',img:'pt_fab_0'},
          {q:'Qual é a moral de "O Sapo e o Boi"?',opts:['Corra sempre','Seja sempre você mesmo','Coma bastante','Durma cedo'],correct:1,fb:'O sapo se deu mal tentando ser o que não era — seja você mesmo!',img:'pt_fab_0'},
          {q:'Na fábula do Rato do Mato e o Rato da Cidade, o rato do campo preferia:',opts:['A cidade cheia de perigos','Sua vida simples e em paz','Morar com gatos','Comer sozinho'],correct:1,fb:'O rato do campo preferiu sua vida calma, mesmo com pouca comida!',img:'pt_fab_1'},
          {q:'Qual é a moral do Rato do Mato e o Rato da Cidade?',opts:['Cidade é melhor','Mais vale vida simples com paz do que luxo com perigos','Ratos não gostam de queijo','Campo é ruim'],correct:1,fb:'Mais vale paz e sossego do que luxo com preocupações!',img:'pt_fab_1'},
          {q:'Fábulas são diferentes de biografias porque:',opts:['Fábulas contam fatos reais','Fábulas são histórias inventadas com uma moral','Biografias têm animais','São iguais'],correct:1,fb:'Fábulas = inventadas com moral. Biografias = fatos reais!',img:'pt_fab_2'},
          {q:'Os personagens das fábulas geralmente são:',opts:['Pessoas famosas','Animais que falam','Robôs','Plantas'],correct:1,fb:'Nas fábulas, os animais falam e agem como pessoas!',img:'pt_fab_2'},
          {q:'Quem escreveu muitas fábulas famosas?',opts:['Santos Dumont','Esopo','Neymar','Papai Noel'],correct:1,fb:'Esopo é um dos autores mais famosos de fábulas!',img:'pt_fab_0'},
          {q:'O que aconteceu com o sapo que tentou imitar o boi?',opts:['Ficou bonito','Estourou','Virou boi','Ficou amigo do boi'],correct:1,fb:'O sapo se estufou tanto que estourou! Por isso: seja você mesmo.',img:'pt_fab_0'}
        ]},
      {id:'pt_subst',icon:'📦',name:'Substantivos',desc:'Comuns, próprios, primitivos e derivados',illus:'generic',
        lesson:`<h3>Substantivos</h3><p><span class="hl">Substantivo</span> é a palavra que dá nome a objetos, seres, sentimentos e lugares.</p><p>📌 <span class="hl">Substantivo comum</span> = nome geral, escrito com letra <span class="hl">minúscula</span>: escola, país, gato, tristeza, rio, computador.</p><p>📌 <span class="hl">Substantivo próprio</span> = nome específico, SEMPRE com letra <span class="hl">maiúscula</span>: Brasil, São Paulo, Pueri Domus, Nintendo, Rio Amazonas.</p><p>📌 <span class="hl">Primitivo</span> = palavra original (limão, jornal). <span class="hl">Derivado</span> = palavra que vem de outra usando um <span class="hl">sufixo</span>: limão → limo<span class="hl">eiro</span>, jornal → jornal<span class="hl">eiro</span>, casa → cas<span class="hl">inha</span>, livro → livr<span class="hl">ão</span>, dente → dent<span class="hl">inho</span>, motor → motor<span class="hl">ista</span>.</p>`,
        quiz:[
          {q:'O que é um substantivo?',opts:['Uma ação','Palavra que dá nome a coisas','Uma cor','Um número'],correct:1,fb:'Substantivo dá nome a objetos, seres, sentimentos e lugares!',img:'pt_sub_0'},
          {q:'Qual destes é um substantivo próprio?',opts:['escola','gato','Brasil','tristeza'],correct:2,fb:'Brasil é nome específico de um país → substantivo próprio, com maiúscula!',img:'pt_sub_1'},
          {q:'Substantivos próprios são escritos com:',opts:['Letra minúscula','Letra maiúscula','Números','Símbolos'],correct:1,fb:'Substantivos próprios SEMPRE com letra maiúscula!',img:'pt_sub_2'},
          {q:'"Rio" é substantivo comum. E "Rio Amazonas"?',opts:['Comum','Próprio','Adjetivo','Verbo'],correct:1,fb:'Rio Amazonas é o nome específico de um rio → substantivo próprio!',img:'pt_sub_0'},

          {q:'"Motorista" vem de qual palavra primitiva?',opts:['Moto','Motor','Motora','Motorismo'],correct:1,fb:'Motor + sufixo -ista = motorista!',img:'pt_sub_0'},
          {q:'Qual destes é um substantivo COMUM?',opts:['Vanessa','São Paulo','cachorro','Nintendo'],correct:2,fb:'Cachorro é nome geral de um animal → substantivo comum, com minúscula!',img:'pt_sub_1'},

      {id:'pt_adj',icon:'🎨',name:'Adjetivos',desc:'Descrevendo coisas e adjetivos pátrios (-ês/-esa)',illus:'generic',
        lesson:`<h3>Adjetivos</h3><p><span class="hl">Adjetivo</span> é a palavra que dá <span class="hl">característica</span> ao substantivo. Ex: "O cachorro é <span class="hl">bravo</span>." / "A casa é <span class="hl">grande</span>."</p><p>📌 Podemos descrever coisas pela: <span class="hl">Textura</span> (macio, duro, crocante), <span class="hl">Forma</span> (redondo, quadrado, oval), <span class="hl">Cor</span> (vermelho, amarelo, rosa), <span class="hl">Gosto</span> (doce, salgado, azedo).</p><p>📌 <span class="hl">Adjetivos pátrios</span> indicam de onde a pessoa vem. Usam os sufixos <span class="hl">-ÊS</span> (masculino) e <span class="hl">-ESA</span> (feminino):</p><p>Portugal → português / portuguesa<br>França → francês / francesa<br>China → chinês / chinesa<br>Japão → japonês / japonesa<br>Holanda → holandês / holandesa</p>`,
        quiz:[
          {q:'O que é um adjetivo?',opts:['Nome de coisa','Palavra que descreve o substantivo','Uma ação','Um lugar'],correct:1,fb:'Adjetivo dá característica ao substantivo!',img:'pt_adj_0'},
          {q:'Na frase "O gato bonito dormiu", qual é o adjetivo?',opts:['gato','bonito','dormiu','O'],correct:1,fb:'Bonito descreve o gato → é o adjetivo!',img:'pt_adj_1'},
          {q:'"Doce", "salgado" e "azedo" são adjetivos de:',opts:['Cor','Forma','Textura','Gosto'],correct:3,fb:'Doce, salgado e azedo descrevem o gosto!',img:'pt_adj_0'},
          {q:'Uma pessoa que nasceu na França é:',opts:['Francesa','Franciosa','Franciana','Franção'],correct:0,fb:'França + -esa = francesa! É um adjetivo pátrio.',img:'pt_adj_2'},
          {q:'Qual é o masculino de "japonesa"?',opts:['Japoneiro','Japonês','Japônico','Japanês'],correct:1,fb:'Japonesa → japonês! Sufixo -ÊS no masculino.',img:'pt_adj_2'},
          {q:'"Redondo", "quadrado" e "oval" são adjetivos de:',opts:['Gosto','Cor','Forma','Textura'],correct:2,fb:'Eles descrevem a forma das coisas!',img:'pt_adj_0'},
          {q:'Uma comida "crocante" e "macia" está sendo descrita pela:',opts:['Cor','Forma','Textura','Tamanho'],correct:2,fb:'Crocante e macia descrevem a textura!',img:'pt_adj_0'},
          {q:'Na frase "A bola vermelha caiu", qual é o adjetivo?',opts:['bola','vermelha','caiu','A'],correct:1,fb:'Vermelha descreve a bola → é o adjetivo!',img:'pt_adj_1'},
          {q:'Uma pessoa que nasceu na China é:',opts:['Chinesa','Chineira','Chiniosa','Chinalesa'],correct:0,fb:'China + -esa = chinesa! Adjetivo pátrio.',img:'pt_adj_2'},
          {q:'Qual é o feminino de "holandês"?',opts:['Holandeira','Holandesa','Holandisa','Holandosa'],correct:1,fb:'Holandês → holandesa! Masculino -ÊS, feminino -ESA.',img:'pt_adj_2'}
        ]},
      {id:'pt_ss',icon:'🔤',name:'Ortografia S/SS',desc:'Quando usar S ou SS entre vogais',illus:'generic',
        lesson:`<h3>Uso do S e SS</h3><p>📌 <span class="hl">S no início da palavra</span> = som de S: <span class="hl">s</span>apo, <span class="hl">s</span>opa, <span class="hl">s</span>ol.</p><p>📌 <span class="hl">S entre duas vogais</span> = som de <span class="hl">Z</span>: ca<span class="hl">s</span>a, me<span class="hl">s</span>a, ro<span class="hl">s</span>a, Bra<span class="hl">s</span>il, de<span class="hl">s</span>ejo.</p><p>📌 <span class="hl">SS entre duas vogais</span> = som de <span class="hl">S</span>: pa<span class="hl">ss</span>arinho, gira<span class="hl">ss</span>ol, pá<span class="hl">ss</span>aro, a<span class="hl">ss</span>ombrada, carro<span class="hl">ss</span>el.</p><p>⚠️ <span class="hl">Nenhuma palavra começa com SS!</span></p><p>📌 Dica rápida: se o som é de Z entre vogais → um S só. Se o som é de S entre vogais → dois SS.</p>`,
        quiz:[
          {q:'A letra S entre duas vogais tem som de:',opts:['S','Z','X','R'],correct:1,fb:'S entre vogais soa como Z: casa, mesa, rosa!',img:'pt_ss_0'},
          {q:'Qual é o correto?',opts:['Ssapo','Çapo','Sapo','Ssapu'],correct:2,fb:'Nenhuma palavra começa com SS! O correto é Sapo.',img:'pt_ss_1'},
          {q:'Qual é o correto?',opts:['Pasaro','Pássaro','Passaru','Pásaro'],correct:1,fb:'PáSSaro — SS entre vogais com som de S!',img:'pt_ss_1'},
          {q:'Qual é o correto?',opts:['Cassa','Caza','Casa','Kasa'],correct:2,fb:'Casa tem S entre vogais (som de Z). Não é SS!',img:'pt_ss_2'},
          {q:'Qual é o correto?',opts:['Girasol','Girassol','Girazol','Jirassol'],correct:1,fb:'GiraSSol — SS entre vogais com som de S!',img:'pt_ss_0'},
          {q:'Qual é o correto?',opts:['Meza','Messa','Mesa','Meça'],correct:2,fb:'Mesa tem S entre vogais = som de Z. Não é SS nem Z!',img:'pt_ss_2'},
          {q:'Qual regra está CERTA?',opts:['Palavras podem começar com SS','S entre vogais tem som de S','SS entre vogais tem som de S','SS entre vogais tem som de Z'],correct:2,fb:'SS entre vogais = som de S. E nenhuma palavra começa com SS!',img:'pt_ss_0'},
          {q:'Qual é o correto?',opts:['Pesoa','Pessoa','Pessa','Peçoa'],correct:1,fb:'PeSSoa — SS entre vogais com som de S!',img:'pt_ss_1'},
          {q:'Qual é o correto?',opts:['Passeio','Paseio','Paçeio','Pazeio'],correct:0,fb:'PaSSeio — SS entre vogais com som de S!',img:'pt_ss_2'},
          {q:'Qual é o correto?',opts:['Dinosauro','Dinossauro','Dinossauru','Dinozauro'],correct:1,fb:'DinoSSauro — SS entre vogais com som de S!',img:'pt_ss_0'}
        ]},
      {id:'pt_lh',icon:'✏️',name:'Ortografia LHA/LHO/LIA/LIO',desc:'Palavras terminadas em LHA, LHO, LIA e LIO',illus:'generic',
        lesson:`<h3>LHA / LHO / LIA / LIO</h3><p>Muitas palavras terminam com sons parecidos, mas a escrita é diferente!</p><p>📌 Palavras com <span class="hl">LHO</span>: coe<span class="hl">lho</span>, repo<span class="hl">lho</span>, mi<span class="hl">lho</span>, joe<span class="hl">lho</span>, choca<span class="hl">lho</span>, espe<span class="hl">lho</span>.</p><p>📌 Palavras com <span class="hl">LHA</span>: mura<span class="hl">lha</span>, fo<span class="hl">lha</span>, toa<span class="hl">lha</span>, sobrance<span class="hl">lha</span>, ervi<span class="hl">lha</span>, miga<span class="hl">lha</span>.</p><p>📌 Palavras com <span class="hl">LIA</span>: famí<span class="hl">lia</span>, mobi<span class="hl">lia</span>, Emí<span class="hl">lia</span>, sandá<span class="hl">lia</span>.</p><p>📌 Palavras com <span class="hl">LIO</span>: cí<span class="hl">lio</span>, domicí<span class="hl">lio</span>, utensí<span class="hl">lio</span>.</p><p>⚠️ Dica: LHA/LHO tem o som do "LH" (como em "filho"). LIA/LIO tem som de "LI" separado (como em "Júlia").</p>`,
        quiz:[
          {q:'Qual é o correto?',opts:['Coelho','Coelio','Coelha','Coelia'],correct:0,fb:'Coelho — com LHO! 🐰',img:'pt_lh_0'},
          {q:'Qual é o correto?',opts:['Familha','Famílio','Família','Familho'],correct:2,fb:'Família — com LIA! 👨‍👩‍👧',img:'pt_lh_1'},
          {q:'Qual é o correto?',opts:['Folia','Folio','Folha','Folho'],correct:2,fb:'Folha — com LHA! 🌿',img:'pt_lh_0'},
          {q:'Qual é o correto?',opts:['Toalia','Toalio','Toalho','Toalha'],correct:3,fb:'Toalha — com LHA! 🧣',img:'pt_lh_1'},
          {q:'Qual é o correto?',opts:['Domicílha','Domicílio','Domicílho','Domicilha'],correct:1,fb:'Domicílio — com LIO! 🏠',img:'pt_lh_2'},
          {q:'Qual é o correto?',opts:['Sobrancelia','Sobrancelha','Sobrancelio','Sobrancelho'],correct:1,fb:'Sobrancelha — com LHA! 👁️',img:'pt_lh_0'},
          {q:'Qual é o correto?',opts:['Joelha','Joelia','Joelio','Joelho'],correct:3,fb:'Joelho — com LHO! 🦵',img:'pt_lh_1'},
          {q:'Qual é o correto?',opts:['Sandálha','Sandálho','Sandália','Sandálio'],correct:2,fb:'Sandália — com LIA! 👡',img:'pt_lh_2'},
          {q:'Qual é o correto?',opts:['Espelio','Espelia','Espelho','Espelha'],correct:2,fb:'Espelho — com LHO! 🪞',img:'pt_lh_2'},
          {q:'Qual é o correto?',opts:['Mobílha','Mobília','Mobílho','Mobílio'],correct:1,fb:'Mobília — com LIA! 🛋️',img:'pt_lh_0'}
        ]},
      {id:'pt_mn',icon:'🔡',name:'Ortografia M/N antes de consoantes',desc:'Quando usar M ou N antes de outras letras',illus:'generic',
        lesson:`<h3>M ou N antes de consoantes?</h3><p>📌 Antes de <span class="hl">P</span> e <span class="hl">B</span> → sempre <span class="hl">M</span>:</p><p>bo<span class="hl">mb</span>eiro, la<span class="hl">mp</span>arina, ta<span class="hl">mb</span>or, co<span class="hl">mp</span>utador, so<span class="hl">mb</span>rinha, lâ<span class="hl">mp</span>ada, ca<span class="hl">mp</span>o.</p><p>📌 Antes de <span class="hl">outras consoantes</span> (T, D, G, Q, C...) → sempre <span class="hl">N</span>:</p><p>bri<span class="hl">n</span>quedo, ca<span class="hl">n</span>tiga, po<span class="hl">n</span>te, de<span class="hl">n</span>te, li<span class="hl">n</span>do, ba<span class="hl">n</span>co.</p><p>⚠️ Erro comum: escrever "brimquedo" (errado!) em vez de "brinquedo" (certo!). Q não é P nem B, então usa N!</p><p>📌 Dica fácil: veja a letra que vem DEPOIS. Se for P ou B → M. Se for qualquer outra → N.</p>`,
        quiz:[
          {q:'Antes de P e B, usamos:',opts:['N','M','S','L'],correct:1,fb:'Antes de P e B → sempre M! Exemplo: tambor, computador.',img:'pt_mn_0'},
          {q:'Qual é o correto?',opts:['Brimquedo','Brinquedo','Brimcedo','Brinkedo'],correct:1,fb:'BriNquedo! Q não é P nem B, então usa N.',img:'pt_mn_2'},
          {q:'Qual é o correto?',opts:['Lanparina','Lamparina','Lanpanina','Lampanina'],correct:1,fb:'LaMParina → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Conputador','Computador','Comnutador','Conpotador'],correct:1,fb:'CoMPutador → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Tanpor','Tanbor','Tambor','Tampor'],correct:2,fb:'TaMBor → antes de B = M!',img:'pt_mn_0'},
          {q:'Qual é o correto?',opts:['Sonbrinha','Sombrinha','Sombrimha','Sonbrimha'],correct:1,fb:'SoMBrinha → antes de B = M!',img:'pt_mn_0'},
          {q:'Qual está escrito ERRADO?',opts:['Bombeiro','Cantiga','Lanpada','Sombra'],correct:2,fb:'O correto é lâMPada! Antes de P → M, não N.',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Pomte','Ponte','Ponpe','Pompe'],correct:1,fb:'PoNTe → T não é P nem B, então usa N!',img:'pt_mn_2'},
          {q:'Qual é o correto?',opts:['Canpo','Campo','Camno','Canmo'],correct:1,fb:'CaMPo → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Bamco','Banco','Banpo','Bampo'],correct:1,fb:'BaNCo → C não é P nem B, então usa N!',img:'pt_mn_2'}
        ]},
      {id:'pt_mai',icon:'🔠',name:'Letra Maiúscula e Interpretação',desc:'Quando usar maiúscula e entender textos',illus:'generic',
        lesson:`<h3>Letra Maiúscula e Interpretação de Texto</h3><p>📌 Usamos <span class="hl">letra maiúscula</span>:</p><p>• No <span class="hl">início de frases</span>: "O menino correu."</p><p>• Em <span class="hl">nomes próprios</span> de pessoas: Benício, Vanessa</p><p>• Em nomes de <span class="hl">lugares</span>: Brasil, São Paulo, Rio Amazonas</p><p>• Em nomes de <span class="hl">marcas</span>: Nintendo, Faber Castel</p><p>📌 <span class="hl">Interpretação de texto</span>: ao ler um texto, preste atenção em:</p><p>• <span class="hl">Quem?</span> (personagens)</p><p>• <span class="hl">O quê?</span> (o que aconteceu)</p><p>• <span class="hl">Onde?</span> (lugar)</p><p>• <span class="hl">Quando?</span> (tempo)</p><p>• <span class="hl">Por quê?</span> (motivo)</p>`,
        quiz:[
          {q:'Quando usamos letra maiúscula?',opts:['No meio das palavras','No início de frases e nomes próprios','Nunca','Só em números'],correct:1,fb:'Maiúscula no início de frases e em nomes próprios!',img:'pt_mai_0'},
          {q:'Qual frase está escrita corretamente?',opts:['o Brasil é grande.','O brasil é grande.','O Brasil é grande.','o brasil é grande.'],correct:2,fb:'O (início de frase) e Brasil (nome próprio) com maiúscula!',img:'pt_mai_0'},
          {q:'Por que "São Paulo" é escrito com maiúscula?',opts:['É uma palavra bonita','É nome próprio de um lugar','Tem duas palavras','Começa com S'],correct:1,fb:'São Paulo é nome próprio de uma cidade → maiúscula!',img:'pt_mai_0'},
          {q:'Ao ler um texto, "Quem?" nos ajuda a encontrar:',opts:['O lugar','Os personagens','O tempo','A moral'],correct:1,fb:'Quem = os personagens da história!',img:'pt_mai_0'},
          {q:'Na fábula do rato do campo, "Onde?" a história acontece?',opts:['Na escola','No campo e na cidade','No espaço','No mar'],correct:1,fb:'A história acontece no campo e na cidade!',img:'pt_mai_0'},
          {q:'Qual destas palavras NÃO precisa de maiúscula?',opts:['Benício','Nintendo','escola','São Paulo'],correct:2,fb:'Escola é substantivo comum → minúscula! Os outros são próprios.',img:'pt_mai_0'}
        ]}
    ]},

  {id:'langarts',date:'29/04',day:'Wednesday',lang:'en',name:'Language Arts',icon:'📖',css:'c-langarts',badge:'English',
    ref:'<p>📖 Language Arts Booklet pp.5-7, 9-10, 13-15</p><p>📖 Cornerstone pp.18-19, 34-35</p>',
    topics:[
      {id:'la_present',icon:'⏰',name:'Simple Present Tense',desc:'Adding -s, -es and -ies to verbs',illus:'generic',
        lesson:`<h3>Simple Present Tense</h3><p>When we talk about things that happen every day or are always true, we use the <span class="hl">simple present</span>.</p><p>📌 With <span class="hl">he, she, it</span> we add something to the verb:</p><p>Most verbs → add <span class="hl">-s</span>: he play<span class="hl">s</span>, she read<span class="hl">s</span>, it rain<span class="hl">s</span></p><p>Verbs ending in s, sh, ch, x, o → add <span class="hl">-es</span>: she wash<span class="hl">es</span>, he watch<span class="hl">es</span>, it go<span class="hl">es</span></p><p>Verbs ending in consonant + y → change y to <span class="hl">-ies</span>: she carr<span class="hl">ies</span>, he stud<span class="hl">ies</span>, it fl<span class="hl">ies</span></p><p>📌 With <span class="hl">I, you, we, they</span> → the verb stays the same: I play, they read, we go.</p>`,
        quiz:[
          {q:'She ___ to school every day.',opts:['go','goes','gos','going'],correct:1,fb:'She + go → goes! (ends in O → add -es)',img:'la_verb_0'},
          {q:'He ___ TV after dinner.',opts:['watch','watchs','watches','watching'],correct:2,fb:'He + watch → watches! (ends in CH → add -es)',img:'la_verb_2'},
          {q:'My cat ___ milk every morning.',opts:['drink','drinks','drinkes','drinkies'],correct:1,fb:'It (my cat) + drink → drinks! (most verbs → add -s)',img:'la_verb_2'},
          {q:'She ___ her homework every day.',opts:['study','studys','studies','studyes'],correct:2,fb:'She + study → studies! (consonant + Y → change to -ies)',img:'la_verb_1'},
          {q:'They ___ soccer on Saturdays.',opts:['plays','play','playes','plais'],correct:1,fb:'They + play → play! (with they, the verb stays the same)',img:'la_verb_0'},
          {q:'He ___ his teeth before bed.',opts:['brush','brushs','brushes','brushies'],correct:2,fb:'He + brush → brushes! (ends in SH → add -es)',img:'la_verb_2'},
          {q:'The baby ___ a lot.',opts:['cry','crys','cries','cryes'],correct:2,fb:'It (the baby) + cry → cries! (consonant + Y → -ies)',img:'la_verb_1'}
        ]},
      {id:'la_wh',icon:'❓',name:'Wh- Questions',desc:'What, Where, Who, When, Why',illus:'generic',
        lesson:`<h3>Wh- Questions</h3><p>We use question words to ask for information:</p><p>📌 <span class="hl">What</span> = asks about a thing or action. "What is your name?"</p><p>📌 <span class="hl">Where</span> = asks about a place. "Where do you live?"</p><p>📌 <span class="hl">Who</span> = asks about a person. "Who is your teacher?"</p><p>📌 <span class="hl">When</span> = asks about time. "When is your birthday?"</p><p>📌 <span class="hl">Why</span> = asks about a reason. "Why are you happy?"</p><p>📌 <span class="hl">How</span> = asks about the way something happens. "How do you go to school?"</p>`,
        quiz:[
          {q:'___ is your name? My name is Ben.',opts:['Where','What','When','Who'],correct:1,fb:'What asks about a thing → What is your name?',img:'la_wh_0'},
          {q:'___ do you live? I live in São Paulo.',opts:['What','Who','Where','When'],correct:2,fb:'Where asks about a place!',img:'la_wh_0'},
          {q:'___ is your best friend? It is Tom.',opts:['Where','When','What','Who'],correct:3,fb:'Who asks about a person!',img:'la_wh_0'},
          {q:'___ is your birthday? It is in March.',opts:['Who','What','Where','When'],correct:3,fb:'When asks about time!',img:'la_wh_0'},
          {q:'___ are you sad? Because I lost my toy.',opts:['What','Where','When','Why'],correct:3,fb:'Why asks about a reason!',img:'la_wh_0'},
          {q:'___ do you go to school? I go by bus.',opts:['Why','What','How','Who'],correct:2,fb:'How asks about the way something happens!',img:'la_wh_1'},
          {q:'___ do you eat for lunch? I eat rice and beans.',opts:['Who','What','When','Where'],correct:1,fb:'What asks about a thing → What do you eat?',img:'la_wh_0'}
        ]},
      {id:'la_read',icon:'📚',name:'Reading & Writing',desc:'Finding information and writing complete sentences',illus:'generic',
        lesson:`<h3>Reading & Writing</h3><p>📌 When you read a text, look for the <span class="hl">key details</span>:</p><p><span class="hl">Who</span> is in the story?</p><p><span class="hl">What</span> happens?</p><p><span class="hl">When</span> does it happen?</p><p><span class="hl">Where</span> does it happen?</p><p><span class="hl">Why</span> does it happen?</p><p>📌 When you write, make <span class="hl">complete sentences</span>:</p><p>✅ Good: "<span class="hl">The cat sleeps on the bed.</span>" (has a subject + verb + details)</p><p>❌ Not complete: "Sleeps on the bed." (who sleeps?)</p><p>❌ Not complete: "The cat." (what does the cat do?)</p><p>📌 Always stay on the <span class="hl">topic</span> — write about what was asked!</p>`,
        quiz:[
          {q:'Which is a COMPLETE sentence?',opts:['The big dog.','Runs very fast.','The big dog runs fast.','Fast dog big.'],correct:2,fb:'A complete sentence needs WHO + WHAT THEY DO!',img:'la_read_0'},
          {q:'When reading a story, "Who?" helps you find:',opts:['The place','The people in the story','The time','The reason'],correct:1,fb:'Who = the people or characters in the story!',img:'la_read_1'},
          {q:'Which sentence stays on the topic "My Pet"?',opts:['I like math.','My dog is brown and playful.','The sky is blue.','Pizza is good.'],correct:1,fb:'Only "My dog is brown and playful" is about the pet!',img:'la_read_0'},
          {q:'"Where?" helps you find:',opts:['The people','The time','The place','The reason'],correct:2,fb:'Where = the place where things happen!',img:'la_read_1'},
          {q:'What is missing? "Eats a banana every morning."',opts:['A place','A verb','A subject (who?)','A time'],correct:2,fb:'Who eats? We need a subject! Example: "She eats a banana."',img:'la_read_0'},
          {q:'Which is NOT a complete sentence?',opts:['I go to school.','She likes ice cream.','The tall tree.','We play soccer.'],correct:2,fb:'"The tall tree" — what about it? It needs a verb!',img:'la_read_0'}
        ]}

let curExam=null,curTopic=null,curQuiz=[],qIdx=0,score=0,skipped=0;
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

// ===================== HOME =====================
function renderHome(){
  const list=document.getElementById('examList');
  const sorted=[...EXAMS].sort((a,b)=>{const[da,ma]=a.date.split('/').map(Number);const[db,mb]=b.date.split('/').map(Number);return(ma*100+da)-(mb*100+db)});
  list.innerHTML=sorted.map(e=>`<div class="exam-card ${e.css}" onclick="openExam('${e.id}')"><div class="exam-icon">${e.icon}</div><div class="exam-info"><div class="exam-name">${e.name}</div><div class="exam-meta"><span class="tag">📅 ${e.date} · ${e.day}</span><span class="tag">${e.badge==='English'?'🇺🇸':'🇧🇷'} ${e.badge}</span></div></div><div class="exam-arrow">›</div></div>`).join('')}

// ===================== TOPICS =====================
function openExam(id){
  curExam=EXAMS.find(e=>e.id===id);
  document.getElementById('topicsTitle').textContent=curExam.name;
  document.getElementById('topicsBadge').textContent=`${curExam.lang==='en'?'🇺🇸':'🇧🇷'} ${curExam.badge} · 📅 ${curExam.date}`;
  const c=['var(--cyan)','var(--orange)','var(--pink)','var(--green)'];
  document.getElementById('topicGrid').innerHTML=curExam.topics.map((t,i)=>`<div class="topic-card" onclick="openTopic('${t.id}')"><div class="topic-icon">${t.icon}</div><div class="topic-name">${t.name}</div><div class="topic-desc">${t.desc}</div></div>`).join('');
  document.getElementById('studyRef').innerHTML=`<div class="study-ref-title">📚 ${curExam.lang==='pt'?'Instrumentos de Estudo':'Study Tools'}</div>${curExam.ref}`;
  go('topics')}

function openTopic(id){
  curTopic=curExam.topics.find(t=>t.id===id);
  document.getElementById('lessonTitle').textContent=curTopic.name;
  document.getElementById('lessonIllus').innerHTML=LILLUS[curTopic.illus]||LILLUS.generic;
