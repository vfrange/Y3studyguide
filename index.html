          {q:'Para medir o comprimento de um lápis, qual instrumento é melhor?',opts:['Balança','Régua','Termômetro','Relógio'],correct:1,fb:'Régua é para medir comprimento de coisas pequenas.',whyWrong:{0:'Balança mede peso (quilos), não comprimento.',2:'Termômetro mede temperatura.',3:'Relógio mede tempo.'}},
          {q:'O ponteiro grande do relógio analógico mostra:',opts:['Horas','Minutos','Segundos','Dias'],correct:1,fb:'O ponteiro GRANDE mostra os minutos. O pequeno mostra as horas.',whyWrong:{0:'O ponteiro das horas é o PEQUENO.',2:'O dos segundos costuma ser o mais fino e rápido.',3:'Dias se contam no calendário, não no relógio.'}},
          {q:'Quantos minutos tem 1 hora?',type:'num',answer:60,fb:'1 hora = 60 minutos. 1 minuto = 60 segundos.',whyWrong:(u)=>{if(u===100)return 'Quase confundindo com cm! Tempo é em base 60: 1 hora = 60 min.';if(u===24)return '24 são as HORAS do dia, não os minutos da hora.';return null;}},
          {q:'No relógio, o número 3 representa quantos minutos?',type:'num',answer:15,fb:'Os números marcam minutos de 5 em 5: 1=5, 2=10, 3=15, 4=20...',whyWrong:(u)=>{if(u===3)return 'O ALGARISMO é 3, mas como minutos representa 15 (3 × 5).';if(u===30)return '30 minutos é no número 6 (no meio do relógio).';return null;}},
          {q:'O ponteiro grande está no 6. Quantos minutos passaram?',type:'num',answer:30,fb:'O 6 fica no meio: 6 × 5 = 30 minutos. É o famoso "e meia"!',whyWrong:(u)=>{if(u===6)return 'O algarismo é 6, mas como minutos é 30 (6 × 5).';if(u===60)return '60 minutos seria voltar ao 12. O 6 fica na metade.';return null;}},
          {q:'Qual é maior: 1 metro ou 80 centímetros?',opts:['80 cm','São iguais','1 metro','Depende'],correct:2,fb:'1 m = 100 cm, e 100 > 80. Então 1 metro é maior.',whyWrong:{0:'80 cm é menor que 100 cm.',1:'Não são iguais: 1 m = 100 cm, não 80 cm.',3:'Não depende — comprimento é fixo.'}},
          {q:'Para medir a altura de uma porta, é melhor usar:',opts:['Milímetros','Centímetros','Metros','Gramas'],correct:2,fb:'Uma porta tem cerca de 2 metros. Usar mm ou cm daria um número muito grande!',whyWrong:{0:'2 metros = 2.000 mm. Um número difícil de ler.',1:'2 metros = 200 cm. Dá pra usar, mas metros é mais simples.',3:'Gramas é peso, não altura.'}},
          {q:'Quantos segundos tem 1 minuto?',type:'num',answer:60,fb:'1 minuto = 60 segundos. Igual horas: 1 h = 60 min.',whyWrong:(u)=>{if(u===100)return 'Tempo usa base 60, não 100.';if(u===3600)return '3.600 é segundos em UMA HORA, não em um minuto.';return null;}},
          {q:'O ponteiro grande está no 9. Quantos minutos passaram?',type:'num',answer:45,fb:'9 × 5 = 45 minutos. É 15 minutos antes da hora cheia.',whyWrong:(u)=>{if(u===9)return 'O 9 vale 45 minutos (9 × 5).';if(u===90)return 'Você multiplicou por 10. Os números marcam de 5 em 5.';return null;}}
        ]},
      {id:'mat_geo',icon:'📊',name:'Gráficos, Trajetos e Calendário',desc:'Ler dados, mapas e datas',illus:'generic',
        lesson:`<h3>Gráficos, Trajetos e Calendário</h3><p><strong>Gráfico de barras:</strong> a barra MAIS ALTA mostra o MAIOR valor. Sempre leia o TÍTULO primeiro.</p><p><strong>Pictograma:</strong> usa figurinhas. Cada figurinha pode valer mais de 1 (a legenda diz quanto).</p><p><strong>Tabela:</strong> organiza dados em linhas e colunas.</p><p><strong>Trajetos / Mapas:</strong> usamos referências (escola, mercado, praça) e direções (esquerda, direita, frente). Mapas ajudam a saber onde estamos e aonde queremos chegar.</p><p><strong>Calendário:</strong> instrumento que mostra dias, semanas e meses. Um ano tem 365 dias. <span class="hl">Ano bissexto</span> tem 366 dias e fevereiro com 29 — acontece a cada <strong>4 anos</strong>!</p><p>📅 Bissextos próximos: 2020, 2024, 2028, 2032...</p>`,
        quiz:[
          {q:'Num gráfico de barras, a barra MAIS ALTA significa:',opts:['Menos quantidade','Mais quantidade','A mesma quantidade','Não significa nada'],correct:1,fb:'Quanto mais alta, MAIOR o número que ela representa.',whyWrong:{0:'É o contrário: alta = mais, baixa = menos.',2:'Cada barra mostra um valor diferente.',3:'A altura é a informação principal!'}},
          {q:'Cada ⭐ vale 2 votos. Um sabor recebeu 5 estrelas. Quantos votos teve?',type:'num',answer:10,fb:'5 × 2 = 10. Em pictograma, multiplica a quantidade pela legenda!',whyWrong:(u)=>{if(u===5)return 'Você contou só as estrelas. Cada uma vale 2 votos!';if(u===7)return 'Você somou em vez de multiplicar. 5 × 2 = 10.';return null;}},
          {q:'O que devemos LER PRIMEIRO em qualquer gráfico?',opts:['A barra mais alta','O título','As cores','Os números'],correct:1,fb:'O título diz SOBRE O QUE é o gráfico. Sem isso, os números não fazem sentido.',whyWrong:{0:'A altura só faz sentido depois de saber o tema.',2:'Cores são só para diferenciar.',3:'Números sem contexto não dizem nada.'}},
          {q:'"Vire à direita e siga até a próxima esquina" é um exemplo de:',opts:['Gráfico','Medida','Trajeto','Pictograma'],correct:2,fb:'Trajeto = caminho a seguir, com direções e referências.',whyWrong:{0:'Gráfico mostra dados, não caminhos.',1:'Medida é distância ou tamanho.',3:'Pictograma usa figurinhas, não direções.'}},
          {q:'Um ano normal tem 365 dias. Quantos dias tem um ano bissexto?',type:'num',answer:366,fb:'No bissexto, fevereiro ganha 1 dia extra (29 de fevereiro). 365 + 1 = 366.',whyWrong:(u)=>{if(u===365)return 'Bissexto tem UM dia a mais que o normal. 365 + 1 = 366.';if(u===364)return 'Bissexto tem MAIS dias, não menos.';return null;}},
          {q:'Anos bissextos acontecem a cada quantos anos?',type:'num',answer:4,fb:'A cada 4 anos! Ex: 2020, 2024, 2028, 2032...',whyWrong:(u)=>{if(u===2)return 'Bissexto é a cada 4 anos, não 2.';if(u===10)return 'A cada 10 seria muito espaçado. É a cada 4.';return null;}},
          {q:'Complete a sequência (de 5 em 5): 1023, 1028, 1033, 1038, ___',type:'num',answer:1043,fb:'A cada passo soma 5: 1038 + 5 = 1043.',whyWrong:(u)=>{if(u===1039)return 'Você somou 1 em vez de 5.';if(u===1048)return 'Você pulou um número. Vai de 5 em 5, não de 10 em 10.';return null;}},
          {q:'Um calendário serve para:',opts:['Medir comprimento','Saber dias, meses e semanas','Pesar coisas','Contar dinheiro'],correct:1,fb:'Calendário organiza o tempo em dias, semanas e meses.',whyWrong:{0:'Comprimento mede-se com régua/trena.',2:'Peso mede-se com balança.',3:'Dinheiro conta-se com cédulas e moedas.'}},
          {q:'Arraste a referência certa para cada lugar do mapa.',type:'dd',pool:['Escola','Mercado','Praça'],targets:[{label:'Onde se estuda',answer:0,placeholder:'?'},{label:'Onde se compra comida',answer:1,placeholder:'?'},{label:'Onde se brinca',answer:2,placeholder:'?'}],fb:'Cada lugar tem uma função: escola = estudar, mercado = comprar, praça = brincar.'}
        ]}
    ]},

  {id:'math',date:'27/04',day:'Monday',lang:'en',name:'Math Test',icon:'🧮',css:'c-math',badge:'English',
    ref:'<p>📖 Prime Math: pp.20–22 (Add/Sub no regrouping), 27–31 (Add with regrouping), 37–40 (Sub with regrouping), 44–47 (Word problems), 123 & 125 (Bar graphs), 130–134 (Length, m & cm)</p>',
    topics:[
      {id:'math_place',icon:'🧩',name:'Place Value (H · T · O)',desc:'Hundreds · Tens · Ones',illus:'generic',
        lesson:`<h3>Place Value</h3><p>Each digit has a <span class="hl">place value</span>. From right to left:</p><p><strong>O</strong> = Ones · <strong>T</strong> = Tens · <strong>H</strong> = Hundreds.</p><p>Examples:<br>423 → 4 hundreds, 2 tens, 3 ones<br>739 → 7 hundreds, 3 tens, 9 ones</p><p>📌 Tip: 10 ones = 1 ten. 10 tens = 1 hundred.</p>`,
        quiz:[
          {q:'In the number 423, what is the value of the 4?',type:'num',answer:400,fb:'The 4 is in the hundreds place. Its value is 400.',whyWrong:(u)=>{if(u===4)return 'The DIGIT is 4, but the VALUE is 400 (it is in the hundreds place).';if(u===40)return '40 would be the tens place. The 4 here is in the hundreds.';return null;}},
          {q:'In the number 557, the digit 5 in the tens place has the value of:',type:'num',answer:50,fb:'557: the second 5 is in the TENS place. Its value is 50.',whyWrong:(u)=>{if(u===5)return 'The digit is 5, but its place value is 50.';if(u===500)return '500 is the FIRST 5 (hundreds). The second 5 is tens = 50.';return null;}},
          {q:'How do we write 4 hundreds, 2 tens, and 3 ones as one number?',type:'num',answer:423,fb:'4 hundreds = 400, 2 tens = 20, 3 ones = 3 → 400 + 20 + 3 = 423.',whyWrong:(u)=>{if(u===234)return 'You wrote it backwards! Hundreds come first.';if(u===403)return 'You forgot the 2 tens (= 20).';return null;}},
          {q:'Drag each digit of the number 256 to the correct place.',type:'dd',pool:['2','5','6'],targets:[{label:'Hundreds',answer:0,placeholder:'?'},{label:'Tens',answer:1,placeholder:'?'},{label:'Ones',answer:2,placeholder:'?'}],fb:'256 = 2 hundreds + 5 tens + 6 ones.'},
          {q:'Which number is GREATER: 725 or 521?',opts:['521','They are equal','725','We cannot tell'],correct:2,fb:'725 has 7 hundreds; 521 has only 5 hundreds. So 725 is greater.',whyWrong:{0:'521 has fewer hundreds (5 vs 7).',1:'They are different numbers.',3:'We compare hundreds first: 7 > 5.'}},
          {q:'How many tens are equal to 1 hundred?',type:'num',answer:10,fb:'10 tens = 100 (1 hundred).',whyWrong:(u)=>{if(u===100)return '100 is the value, not the count. We need 10 tens to make 100.';if(u===1)return '1 ten = 10, not 100.';return null;}},
          {q:'What is the number that has 7 hundreds and 5 tens (no ones)?',type:'num',answer:750,fb:'7 hundreds = 700, 5 tens = 50, 0 ones. → 750.',whyWrong:(u)=>{if(u===75)return 'You used 7 and 5 only. Hundreds means 700, not 7.';if(u===705)return 'You wrote 5 in the ones place. The 5 is in the tens place.';return null;}}
        ]},
      {id:'math_add',icon:'➕',name:'Addition',desc:'With and without regrouping',illus:'generic',
        lesson:`<h3>Addition</h3><p><strong>Without regrouping:</strong> add column by column. Example: 423 + 316. Add ones (3+6=9), add tens (2+1=3), add hundreds (4+3=7) → 739.</p><p><strong>With regrouping (carry):</strong> when a column adds up to MORE than 9, write the ones digit and <span class="hl">carry 1</span> to the next column.</p><p>Example: 147 + 85<br>1) Ones: 7 + 5 = 12. Write 2, carry 1.<br>2) Tens: 4 + 8 + 1 = 13. Write 3, carry 1.<br>3) Hundreds: 1 + 1 = 2.<br>Result: <strong>232</strong>.</p>`,
        quiz:[
          {q:'What is 423 + 316? (no regrouping)',type:'num',answer:739,fb:'3+6=9, 2+1=3, 4+3=7 → 739.',whyWrong:(u)=>{if(u===749)return 'You added the tens wrong: 2+1=3, not 4.';if(u===839)return 'You added the hundreds wrong: 4+3=7, not 8.';return null;}},
          {q:'What is 58 + 37? (with regrouping)',type:'num',answer:95,fb:'8+7=15, write 5 carry 1. 5+3+1=9 → 95.',whyWrong:(u)=>{if(u===85)return 'You forgot to CARRY the 1 from 8+7=15.';if(u===815)return 'You wrote the 15 in one column. Write only the 5 and carry the 1.';return null;}},
          {q:'What is 147 + 85?',type:'num',answer:232,fb:'7+5=12 (carry 1). 4+8+1=13 (carry 1). 1+1=2. → 232.',whyWrong:(u)=>{if(u===222)return 'You forgot one of the carries. Both columns need to carry.';if(u===132)return 'You carried only once. Both ones AND tens columns regroup here.';return null;}},
          {q:'When 7 + 5 = 12, what do we write in that column?',opts:['12','7','2 and carry 1','5 and carry 7'],correct:2,fb:'Write the ones (2) and carry the tens (1) to the next column.',whyWrong:{0:'12 cannot fit in one column. Each column holds one digit.',1:'7 was a number we added, not the answer.',3:'We carry the tens digit (1), not 7.'}},
          {q:'What is 276 + 12? (no regrouping)',type:'num',answer:288,fb:'6+2=8, 7+1=8, 2+0=2 → 288.',whyWrong:(u)=>{if(u===278)return 'You added wrong: 7+1=8, not 7.';if(u===298)return 'You added wrong: 2+0=2, not 2 plus a carry.';return null;}},
          {q:'What is 246 + 656?',type:'num',answer:902,fb:'6+6=12 (carry 1). 4+5+1=10 (carry 1). 2+6+1=9. → 902.',whyWrong:(u)=>{if(u===892)return 'You missed a carry in the tens column.';if(u===812)return 'Recheck the hundreds: 2+6+carry = 9.';return null;}},
          {q:'Tom has 45 stickers. He gets 28 more. How many in all?',type:'num',answer:73,fb:'45 + 28 = 73. "How many in all" means add!',whyWrong:(u)=>{if(u===17)return 'You subtracted (45−28). But "in all" means add!';if(u===63)return 'Almost. 5+8=13 (carry 1). 4+2+1=7 → 73.';return null;}},
          {q:'When you carry a 1 in addition, where does it go?',opts:['On the next column to the LEFT','At the end of the answer','On the same column','Below the line'],correct:0,fb:'The carry goes ON TOP of the next column to the LEFT.',whyWrong:{1:'The carry must be added in the next column, not at the end.',2:'The same column already has its answer.',3:'Below the line is where the answer goes.'}}
        ]},
      {id:'math_sub',icon:'➖',name:'Subtraction',desc:'With and without regrouping',illus:'generic',
        lesson:`<h3>Subtraction</h3><p><strong>Without regrouping:</strong> subtract column by column. Example: 557 − 315 = 242.</p><p><strong>With regrouping (borrow):</strong> when the top digit is <span class="hl">smaller</span> than the bottom, we <span class="hl">borrow</span> 1 from the next column.</p><p>Example: 256 − 28<br>1) Ones: 6 − 8? No! Borrow 1 ten → ones become 16. 16 − 8 = 8.<br>2) The tens digit was 5, now it is 4. 4 − 2 = 2.<br>3) Hundreds: 2 − 0 = 2.<br>Result: <strong>228</strong>.</p>`,
        quiz:[
          {q:'What is 557 − 315? (no regrouping)',type:'num',answer:242,fb:'7−5=2, 5−1=4, 5−3=2 → 242.',whyWrong:(u)=>{if(u===232)return 'Recheck the tens: 5−1=4, not 3.';if(u===342)return 'Recheck the hundreds: 5−3=2, not 3.';return null;}},
          {q:'What is 162 − 7? Do you need to borrow?',type:'num',answer:155,fb:'2 cannot take 7 → borrow 1 ten (becomes 12). 12−7=5. Tens 6 becomes 5. → 155.',whyWrong:(u)=>{if(u===165)return 'You added instead of subtracting.';if(u===145)return 'After borrowing, the tens 6 becomes 5, not 4.';return null;}},
          {q:'What is 256 − 28?',type:'num',answer:228,fb:'6−8 not enough → borrow (becomes 16). 16−8=8. Tens 5 becomes 4. 4−2=2. → 228.',whyWrong:(u)=>{if(u===238)return 'You forgot to lower the tens after borrowing.';if(u===232)return 'Recheck the ones: 16−8=8, not 2.';return null;}},
          {q:'In 415 − 3, do we need to borrow?',opts:['Yes, from the tens','No, just subtract','Yes, from the hundreds','Yes, from both'],correct:1,fb:'5 − 3 = 2 directly. No borrowing needed!',whyWrong:{0:'We borrow only when the TOP is SMALLER. 5 is bigger than 3.',2:'No borrowing needed at all.',3:'Just a simple subtraction in the ones place.'}},
          {q:'What is 564 − 18?',type:'num',answer:546,fb:'4−8 not enough → 14−8=6. Tens 6 becomes 5. 5−1=4. → 546.',whyWrong:(u)=>{if(u===556)return 'You did not lower the tens after borrowing.';if(u===544)return 'Recheck the ones: 14−8=6.';return null;}},
          {q:'In 256 − 28, after borrowing, what does the tens digit (5) become?',type:'num',answer:4,fb:'It gave 1 to the ones, so it goes from 5 to 4.',whyWrong:(u)=>{if(u===5)return 'It LENT 1 to the ones, so it must go DOWN by 1.';if(u===6)return 'It went down, not up. It lent 1, did not receive.';return null;}},
          {q:'Sara had 60 candies. She gave 24 away. How many are left?',type:'num',answer:36,fb:'60 − 24 = 36. "Gave away" means we subtract.',whyWrong:(u)=>{if(u===84)return 'You added instead. "Gave away" means take away.';if(u===46)return 'Recheck: 0−4 needs borrowing → 10−4=6, then 5−2=3 → 36.';return null;}},
          {q:'What is 800 − 178?',type:'num',answer:622,fb:'We need to borrow many times because of the zeros! 0−8 needs help. Tens is also 0, so we borrow from the hundreds (8 becomes 7). Step by step: 10−8=2, 9−7=2, 7−1=6. → 622.',whyWrong:(u)=>{if(u===722)return 'You did not borrow from one of the zeros. 800−178=622.';if(u===632)return 'Almost! Recheck the hundreds: 8 became 7 after lending.';if(u===978)return 'You added instead of subtracting.';return null;}}
        ]},
      {id:'math_word',icon:'📖',name:'Word Problems',desc:'Understand · Plan · Answer · Check',illus:'generic',
        lesson:`<h3>Word Problems</h3><p>Use 4 steps:</p><p><strong>1. Understand:</strong> read carefully. What do we know? What do we need to find?</p><p><strong>2. Plan:</strong> add or subtract? "How many in all", "altogether", "more" → ADD. "How many left", "fewer", "give away" → SUBTRACT.</p><p><strong>3. Answer:</strong> do the math.</p><p><strong>4. Check:</strong> does the answer make sense? Reread the question.</p><p>📌 Tip: keywords help, but always think about the SITUATION!</p>`,
        quiz:[
          {q:'There are 295 seats on a train. 42 are empty. How many seats are taken?',type:'num',answer:253,fb:'295 − 42 = 253. Total minus empty = taken.',whyWrong:(u)=>{if(u===337)return 'You added. But empty + taken = TOTAL, so taken = total − empty.';if(u===263)return 'Recheck: 95−42=53, then 295−42 has hundreds 2.';return null;}},
          {q:'Ana picked 135 daisies and 150 roses. How many flowers altogether?',type:'num',answer:285,fb:'135 + 150 = 285. "Altogether" means add.',whyWrong:(u)=>{if(u===15)return 'You subtracted. "Altogether" means add!';if(u===275)return 'Recheck: 5+0=5, 3+5=8, 1+1=2 → 285.';return null;}},
          {q:'Raul has 266 star stickers. He has 223 MORE stars than circles. How many circle stickers?',type:'num',answer:43,fb:'Stars − 223 = circles. 266 − 223 = 43. "More than" means stars are bigger, so subtract to find circles.',whyWrong:(u)=>{if(u===489)return 'You added. But "more than" tells you stars are bigger — subtract to find the smaller group.';if(u===53)return 'Recheck: 266−223. 6−3=3, 6−2=4, 2−2=0 → 43.';return null;}},
          {q:'Tara baked 124 almond cookies. She gave some away and had 56 left. How many did she give away?',type:'num',answer:68,fb:'Started − left = given away. 124 − 56 = 68.',whyWrong:(u)=>{if(u===180)return 'You added 124+56. But "left" means we subtract from the start.';if(u===58)return 'Recheck: 4−6 needs borrow → 14−6=8, then 11−5=6 → 68.';return null;}},
          {q:'A shop sold 642 mobile phones in March and April. 319 were sold in March. How many in April?',type:'num',answer:323,fb:'Total − March = April. 642 − 319 = 323.',whyWrong:(u)=>{if(u===961)return 'You added. But March + April = total, so April = total − March.';if(u===333)return 'Recheck: borrow needed in the tens.';return null;}},
          {q:'A farmer harvests 438 carrots. He harvests 153 FEWER turnips than carrots. How many turnips?',type:'num',answer:285,fb:'Carrots − 153 = turnips. 438 − 153 = 285. "Fewer" means turnips are smaller.',whyWrong:(u)=>{if(u===591)return 'You added. "Fewer" means turnips are LESS, so subtract.';if(u===325)return 'Recheck: 8−3=5, 13−5=8 (borrow), 3−1=2 → 285.';return null;}},
          {q:'A factory makes 562 nuts in an hour. It makes 275 FEWER bolts than nuts. How many nuts AND bolts in an hour?',type:'num',answer:849,fb:'Bolts = 562 − 275 = 287. Total = 562 + 287 = 849.',whyWrong:(u)=>{if(u===287)return 'That is just the bolts! The question asks the TOTAL of nuts AND bolts.';if(u===562)return 'That is just the nuts! Add bolts (287) to get the total: 849.';return null;}},
          {q:'Which words usually mean ADD?',opts:['Gave away · left','In all · altogether · more','Fewer · less than','How many are left'],correct:1,fb:'"In all", "altogether" and "more" mean ADD. The others mean subtract.',whyWrong:{0:'"Gave away" and "left" mean SUBTRACT.',2:'"Fewer" and "less than" mean SUBTRACT.',3:'"Left" means what is left over — that is SUBTRACT.'}}
        ]},
      {id:'math_meas',icon:'📏',name:'Measurement',desc:'Meters, centimeters, ruler',illus:'generic',
        lesson:`<h3>Length: Meters & Centimeters</h3><p>A <span class="hl">meter (m)</span> is about a big step. A <span class="hl">centimeter (cm)</span> is small — about the tip of your finger.</p><p><strong>1 meter = 100 centimeters.</strong></p><p>📏 To use the ruler:<br>• Always start at the <strong>zero</strong> mark!<br>• Read where the line ENDS.</p><p>For drawing: place pencil at zero and draw until you reach the right number.</p><p>To compare lengths: longer = more cm. Shorter = fewer cm.</p>`,
        quiz:[
          {q:'How many centimeters are in 1 meter?',type:'num',answer:100,fb:'1 m = 100 cm. About a big step!',whyWrong:(u)=>{if(u===10)return '10 cm is small — like a finger.';if(u===1000)return '1.000 cm = 10 meters. Too big.';return null;}},
          {q:'A line goes from 0 to 6 on the ruler. How long is it (in cm)?',type:'num',answer:6,fb:'It is 6 cm long. Always start at zero!',whyWrong:(u)=>{if(u===0)return '0 is where it STARTS. The end is at 6.';if(u===60)return 'Look at cm, not mm. The line is 6 cm.';return null;}},
          {q:'Where should we place the pencil when measuring with a ruler?',opts:['On the number 1','At the zero mark','At the end of the ruler','Anywhere'],correct:1,fb:'Always start at ZERO — that is the rule!',whyWrong:{0:'1 would skip the first centimeter.',2:'The end of the ruler would give a wrong measure.',3:'Position matters! Always zero.'}},
          {q:'PQ = 5 cm and RS = 3 cm. PQ is HOW MUCH longer than RS?',type:'num',answer:2,fb:'5 − 3 = 2 cm. PQ is 2 cm longer.',whyWrong:(u)=>{if(u===8)return 'You added. To find DIFFERENCE, subtract.';if(u===5)return 'You gave the length of PQ, not the difference.';return null;}},
          {q:'YZ = 6 cm and WX = 4 cm. WX is HOW MUCH shorter than YZ?',type:'num',answer:2,fb:'6 − 4 = 2 cm. WX is 2 cm shorter.',whyWrong:(u)=>{if(u===10)return 'You added. Use subtraction for difference.';if(u===4)return 'That is the length of WX, not the difference.';return null;}},
          {q:'Which is LONGER: 1 meter or 90 cm?',opts:['90 cm','They are the same','1 meter','We cannot tell'],correct:2,fb:'1 m = 100 cm, and 100 > 90. So 1 m is longer.',whyWrong:{0:'90 cm is less than 100 cm.',1:'They are not equal: 100 ≠ 90.',3:'Length is fixed — we can compare.'}},
          {q:'Drag each object to the best unit to measure it.',type:'dd',pool:['centimeters','meters'],targets:[{label:'Pencil',answer:0,placeholder:'?'},{label:'Classroom',answer:1,placeholder:'?'}],fb:'Small things use cm. Big things use meters.'},
          {q:'About how long is a classroom?',opts:['5 cm','5 meters','50 meters','500 meters'],correct:1,fb:'A classroom is about 5 to 10 meters long.',whyWrong:{0:'5 cm is the size of a finger — way too small for a classroom.',2:'50 meters is half a soccer field — too big.',3:'500 m is 5 soccer fields! Way too big.'}}
        ]},
      {id:'math_graph',icon:'📊',name:'Bar Graphs',desc:'Reading data with scale > 1',illus:'generic',
        lesson:`<h3>Bar Graphs</h3><p>A <span class="hl">bar graph</span> uses bars to show numbers. The taller the bar, the bigger the number!</p><p>The <span class="hl">scale</span> tells how much each line means. Sometimes each line = 1, but it can be 2, 3, 5, 10!</p><p>📌 Always read the <strong>title</strong> first. Then look at the scale.</p><p>You can compare: how many MORE? How many FEWER? Which is the MOST? Which is the LEAST?</p>`,
        quiz:[
          {q:'In a bar graph, the TALLEST bar means:',opts:['The smallest number','The biggest number','Nothing','A mistake'],correct:1,fb:'Taller = bigger. Shorter = smaller.',whyWrong:{0:'It is the opposite — short bars are small.',2:'The height is the main information!',3:'It is on purpose, not a mistake.'}},
          {q:'The graph shows hats: blue=8, black=4, red=4, pink=4. How many MORE blue hats than red hats?',type:'num',answer:4,fb:'Blue 8 − Red 4 = 4. "How many more" means subtract.',whyWrong:(u)=>{if(u===12)return 'You added. "How many MORE" means difference, so subtract.';if(u===8)return 'That is just the blue hats. Subtract red to find the difference.';return null;}},
          {q:'In a pictograph, each 🍎 = 3 votes. There are 4 apples. How many votes?',type:'num',answer:12,fb:'4 × 3 = 12. Multiply the count by the value per picture.',whyWrong:(u)=>{if(u===4)return 'Each apple is worth more than 1! Each = 3 votes.';if(u===7)return 'You added 4+3. The pictograph rule is multiply: 4 × 3 = 12.';return null;}},
          {q:'What should you read FIRST on a graph?',opts:['The biggest bar','The title','The colors','The smallest number'],correct:1,fb:'The TITLE tells you what the graph is about.',whyWrong:{0:'The bar means nothing without knowing the topic.',2:'Colors only differ; they are not the topic.',3:'A number alone has no meaning.'}},
          {q:'Bar graphs are good for:',opts:['Telling stories','Comparing numbers','Drawing pictures','Measuring length'],correct:1,fb:'Bar graphs let us COMPARE quantities side by side.',whyWrong:{0:'Stories use words, not bars.',2:'Drawings are art, not data.',3:'Length uses a ruler.'}},
          {q:'A graph shows zoo animals. Each square on the scale = 3 animals. A bar is 5 squares tall. How many animals does it show?',type:'num',answer:15,fb:'5 squares × 3 animals each = 15 animals.',whyWrong:(u)=>{if(u===5)return 'Each square is worth 3, not 1. So 5 × 3 = 15.';if(u===8)return 'You added 5+3. We need to multiply: 5 × 3 = 15.';return null;}},
          {q:'Cupcake sales: chocolate=35, lemon=25, blackberry=50, pineapple=10. Which sold the MOST?',opts:['Chocolate','Lemon','Blackberry','Pineapple'],correct:2,fb:'50 is the biggest number. Blackberry was the most popular!',whyWrong:{0:'35 is less than 50.',1:'25 is less than 50.',3:'10 is the smallest, not the biggest.'}}
        ]}
    ]},

  {id:'portugues',date:'23/04',day:'Terça',lang:'pt',name:'Língua Portuguesa',icon:'📝',css:'c-portugues',badge:'Português',
    ref:'<p>📖 Livro Unidade A · Capítulos 1 e 2</p><p>📓 Registros no caderno</p>',
    topics:[
      {id:'pt_bio',icon:'📖',name:'Biografia e Autobiografia',desc:'Quem escreve? Em qual pessoa?',illus:'generic',
        lesson:`<h3>Biografia e Autobiografia</h3><p>A palavra <span class="hl">biografia</span> vem do grego: <span class="hl">bio</span> = vida + <span class="hl">grafia</span> = escrita. Ou seja, "vida escrita"!</p><p><span class="hl">Biografia</span> = OUTRA pessoa conta a história de alguém. Usa a <span class="hl">3ª pessoa</span>: ele, ela, seu, sua. Ex: "Ele nasceu em 1452 na Itália..."</p><p><span class="hl">Autobiografia</span> = a PRÓPRIA pessoa conta sua história. Usa a <span class="hl">1ª pessoa</span>: eu, meu, minha. Ex: "Desde pequeno fui invadido por livros..."</p><p>📌 Ambas contam <span class="hl">fatos reais</span>: nascimento, infância, conquistas, lugares onde viveu!</p><p>📌 Na biografia aparecem informações como: data de nascimento, onde nasceu, o que fez de importante, profissão.</p>`,
        quiz:[
          {q:'O que significa a palavra "biografia"?',opts:['Livro de receitas','Vida escrita','História inventada','Desenho bonito'],correct:1,fb:'Bio = vida, grafia = escrita → biografia = vida escrita!',img:'pt_genero_0'},
          {q:'Quem escreve uma biografia?',opts:['A própria pessoa','Outra pessoa','Um robô','Ninguém'],correct:1,fb:'Na biografia, OUTRA pessoa conta a história de alguém!',img:'pt_genero_0'},
          {q:'E quem escreve uma autobiografia?',opts:['Outra pessoa','A própria pessoa','Um jornalista','Um professor'],correct:1,fb:'Na autobiografia, a PRÓPRIA pessoa conta sua vida!',img:'pt_genero_1'},
          {q:'"Eu nasci no Rio de Janeiro e adorava ler" é trecho de:',opts:['Biografia','Autobiografia','Fábula','Receita'],correct:1,fb:'Usa "eu" (1ª pessoa) → é autobiografia!',img:'pt_genero_1'},
          {q:'"Ela nasceu em 1990 e se tornou médica" é trecho de:',opts:['Autobiografia','Biografia','Fábula','Poesia'],correct:1,fb:'Usa "ela" (3ª pessoa) → outra pessoa escreveu → biografia!',img:'pt_genero_3'},
          {q:'Biografias e autobiografias contam fatos:',opts:['Inventados','Reais','Mágicos','Do futuro'],correct:1,fb:'Sempre fatos reais da vida de alguém!',img:'pt_genero_2'},
          {q:'A biografia usa qual pessoa para contar a história?',opts:['1ª pessoa (eu, meu)','2ª pessoa (tu, teu)','3ª pessoa (ele, ela, seu)','Nenhuma'],correct:2,fb:'Biografia usa 3ª pessoa: ele, ela, seu, sua!',img:'pt_genero_3'},
          {q:'A autobiografia usa qual pessoa?',opts:['1ª pessoa (eu, meu, minha)','2ª pessoa (tu)','3ª pessoa (ele, ela)','Todas'],correct:0,fb:'Autobiografia usa 1ª pessoa: eu, meu, minha!',img:'pt_genero_1'},
          {q:'Qual informação aparece em biografias?',opts:['Receitas de bolo','Data e local de nascimento','Feitiços mágicos','Previsão do tempo'],correct:1,fb:'Biografias trazem nascimento, infância, conquistas e fatos reais!',img:'pt_genero_4'},
          {q:'"Desde pequeno fui invadido por livros e leituras..." — isso é:',opts:['Biografia','Autobiografia','Fábula','Notícia'],correct:1,fb:'Usa "fui" (1ª pessoa) → a própria pessoa conta → autobiografia!',img:'pt_genero_1'}
        ]},
      {id:'pt_fab',icon:'🦊',name:'Fábulas',desc:'Histórias com animais que ensinam uma lição',illus:'generic',
        lesson:`<h3>Fábulas</h3><p>Uma <span class="hl">fábula</span> é uma história curta, geralmente com <span class="hl">animais que falam e agem como pessoas</span>. No final, sempre tem uma <span class="hl">moral</span> — uma lição de vida!</p><p>📌 <span class="hl">"O Sapo e o Boi"</span> (Esopo): Um sapo viu um boi enorme e ficou com inveja. Começou a se estufar para ficar do mesmo tamanho, até que... estourou! <span class="hl">Moral: seja sempre você mesmo.</span></p><p>📌 <span class="hl">"O Rato do Mato e o Rato da Cidade"</span>: O rato do campo vivia com calma, comendo raízes e ervas. O rato da cidade tinha comida farta, mas vivia com medo de gatos e perigos. <span class="hl">Moral: mais vale uma vida simples com paz do que luxo com perigos.</span></p><p>📌 Fábulas são diferentes de biografias! Fábulas são <span class="hl">histórias inventadas</span> que ensinam algo. Biografias contam <span class="hl">fatos reais</span>.</p>`,
        quiz:[
          {q:'O que é uma fábula?',opts:['A história real de alguém','Uma história com animais que ensina uma lição','Um texto sobre ciências','Uma receita'],correct:1,fb:'Fábulas usam animais que falam e ensinam uma moral!',img:'pt_fab_2'},
          {q:'Toda fábula tem uma:',opts:['Receita','Conta de matemática','Moral (lição)','Música'],correct:2,fb:'No final da fábula sempre tem uma moral — uma lição de vida!',img:'pt_fab_2'},
          {q:'Na fábula "O Sapo e o Boi", o sapo queria:',opts:['Cantar','Ficar do tamanho do boi','Nadar','Dormir'],correct:1,fb:'O sapo ficou com inveja do boi e tentou se estufar para ficar grande!',img:'pt_fab_0'},
          {q:'Qual é a moral de "O Sapo e o Boi"?',opts:['Corra sempre','Seja sempre você mesmo','Coma bastante','Durma cedo'],correct:1,fb:'O sapo se deu mal tentando ser o que não era — seja você mesmo!',img:'pt_fab_0'},
          {q:'Na fábula do Rato do Mato e o Rato da Cidade, o rato do campo preferia:',opts:['A cidade cheia de perigos','Sua vida simples e em paz','Morar com gatos','Comer sozinho'],correct:1,fb:'O rato do campo preferiu sua vida calma, mesmo com pouca comida!',img:'pt_fab_1'},
          {q:'Qual é a moral do Rato do Mato e o Rato da Cidade?',opts:['Cidade é melhor','Mais vale vida simples com paz do que luxo com perigos','Ratos não gostam de queijo','Campo é ruim'],correct:1,fb:'Mais vale paz e sossego do que luxo com preocupações!',img:'pt_fab_1'},
          {q:'Fábulas são diferentes de biografias porque:',opts:['Fábulas contam fatos reais','Fábulas são histórias inventadas com uma moral','Biografias têm animais','São iguais'],correct:1,fb:'Fábulas = inventadas com moral. Biografias = fatos reais!',img:'pt_fab_2'},
          {q:'Os personagens das fábulas geralmente são:',opts:['Pessoas famosas','Animais que falam','Robôs','Plantas'],correct:1,fb:'Nas fábulas, os animais falam e agem como pessoas!',img:'pt_fab_2'},
          {q:'Quem escreveu muitas fábulas famosas?',opts:['Santos Dumont','Esopo','Neymar','Papai Noel'],correct:1,fb:'Esopo é um dos autores mais famosos de fábulas!',img:'pt_fab_0'},
          {q:'O que aconteceu com o sapo que tentou imitar o boi?',opts:['Ficou bonito','Estourou','Virou boi','Ficou amigo do boi'],correct:1,fb:'O sapo se estufou tanto que estourou! Por isso: seja você mesmo.',img:'pt_fab_0'}
        ]},
      {id:'pt_subst',icon:'📦',name:'Substantivos',desc:'Comuns, próprios, primitivos e derivados',illus:'generic',
        lesson:`<h3>Substantivos</h3><p><span class="hl">Substantivo</span> é a palavra que dá nome a objetos, seres, sentimentos e lugares.</p><p>📌 <span class="hl">Substantivo comum</span> = nome geral, escrito com letra <span class="hl">minúscula</span>: escola, país, gato, tristeza, rio, computador.</p><p>📌 <span class="hl">Substantivo próprio</span> = nome específico, SEMPRE com letra <span class="hl">maiúscula</span>: Brasil, São Paulo, Pueri Domus, Nintendo, Rio Amazonas.</p><p>📌 <span class="hl">Primitivo</span> = palavra original (limão, jornal). <span class="hl">Derivado</span> = palavra que vem de outra usando um <span class="hl">sufixo</span>: limão → limo<span class="hl">eiro</span>, jornal → jornal<span class="hl">eiro</span>, casa → cas<span class="hl">inha</span>, livro → livr<span class="hl">ão</span>, dente → dent<span class="hl">inho</span>, motor → motor<span class="hl">ista</span>.</p>`,
        quiz:[
          {q:'O que é um substantivo?',opts:['Uma ação','Palavra que dá nome a coisas','Uma cor','Um número'],correct:1,fb:'Substantivo dá nome a objetos, seres, sentimentos e lugares!',img:'pt_sub_0'},
          {q:'Qual destes é um substantivo próprio?',opts:['escola','gato','Brasil','tristeza'],correct:2,fb:'Brasil é nome específico de um país → substantivo próprio, com maiúscula!',img:'pt_sub_1'},
          {q:'Substantivos próprios são escritos com:',opts:['Letra minúscula','Letra maiúscula','Números','Símbolos'],correct:1,fb:'Substantivos próprios SEMPRE com letra maiúscula!',img:'pt_sub_2'},
          {q:'"Rio" é substantivo comum. E "Rio Amazonas"?',opts:['Comum','Próprio','Adjetivo','Verbo'],correct:1,fb:'Rio Amazonas é o nome específico de um rio → substantivo próprio!',img:'pt_sub_0'},
          {q:'A palavra "limoeiro" é derivada de:',opts:['Limeira','Limão','Limonada','Lima'],correct:1,fb:'Limão + sufixo -eiro = limoeiro! É um substantivo derivado.',img:'pt_sub_1'},
          {q:'Qual é o sufixo na palavra "casinha"?',opts:['-casa','-inha','-sinha','-asin'],correct:1,fb:'Casa + -inha = casinha. O sufixo -inha indica tamanho pequeno!',img:'pt_sub_2'},
          {q:'"Motorista" vem de qual palavra primitiva?',opts:['Moto','Motor','Motora','Motorismo'],correct:1,fb:'Motor + sufixo -ista = motorista!',img:'pt_sub_0'},
          {q:'Qual destes é um substantivo COMUM?',opts:['Vanessa','São Paulo','cachorro','Nintendo'],correct:2,fb:'Cachorro é nome geral de um animal → substantivo comum, com minúscula!',img:'pt_sub_1'},
          {q:'O sufixo -ão na palavra "livrão" indica:',opts:['Tamanho pequeno','Tamanho grande','Uma cor','Uma pessoa'],correct:1,fb:'Livrão = livro grande! O sufixo -ão indica aumento (aumentativo).',img:'pt_sub_2'},
          {q:'"Bananeira" é um substantivo derivado de:',opts:['Bana','Banana','Banano','Banho'],correct:1,fb:'Banana + sufixo -eira = bananeira!',img:'pt_sub_0'}
        ]},
      {id:'pt_adj',icon:'🎨',name:'Adjetivos',desc:'Descrevendo coisas e adjetivos pátrios (-ês/-esa)',illus:'generic',
        lesson:`<h3>Adjetivos</h3><p><span class="hl">Adjetivo</span> é a palavra que dá <span class="hl">característica</span> ao substantivo. Ex: "O cachorro é <span class="hl">bravo</span>." / "A casa é <span class="hl">grande</span>."</p><p>📌 Podemos descrever coisas pela: <span class="hl">Textura</span> (macio, duro, crocante), <span class="hl">Forma</span> (redondo, quadrado, oval), <span class="hl">Cor</span> (vermelho, amarelo, rosa), <span class="hl">Gosto</span> (doce, salgado, azedo).</p><p>📌 <span class="hl">Adjetivos pátrios</span> indicam de onde a pessoa vem. Usam os sufixos <span class="hl">-ÊS</span> (masculino) e <span class="hl">-ESA</span> (feminino):</p><p>Portugal → português / portuguesa<br>França → francês / francesa<br>China → chinês / chinesa<br>Japão → japonês / japonesa<br>Holanda → holandês / holandesa</p>`,
        quiz:[
          {q:'O que é um adjetivo?',opts:['Nome de coisa','Palavra que descreve o substantivo','Uma ação','Um lugar'],correct:1,fb:'Adjetivo dá característica ao substantivo!',img:'pt_adj_0'},
          {q:'Na frase "O gato bonito dormiu", qual é o adjetivo?',opts:['gato','bonito','dormiu','O'],correct:1,fb:'Bonito descreve o gato → é o adjetivo!',img:'pt_adj_1'},
          {q:'"Doce", "salgado" e "azedo" são adjetivos de:',opts:['Cor','Forma','Textura','Gosto'],correct:3,fb:'Doce, salgado e azedo descrevem o gosto!',img:'pt_adj_0'},
          {q:'Uma pessoa que nasceu na França é:',opts:['Francesa','Franciosa','Franciana','Franção'],correct:0,fb:'França + -esa = francesa! É um adjetivo pátrio.',img:'pt_adj_2'},
          {q:'Qual é o masculino de "japonesa"?',opts:['Japoneiro','Japonês','Japônico','Japanês'],correct:1,fb:'Japonesa → japonês! Sufixo -ÊS no masculino.',img:'pt_adj_2'},
          {q:'"Redondo", "quadrado" e "oval" são adjetivos de:',opts:['Gosto','Cor','Forma','Textura'],correct:2,fb:'Eles descrevem a forma das coisas!',img:'pt_adj_0'},
          {q:'Uma comida "crocante" e "macia" está sendo descrita pela:',opts:['Cor','Forma','Textura','Tamanho'],correct:2,fb:'Crocante e macia descrevem a textura!',img:'pt_adj_0'},
          {q:'Na frase "A bola vermelha caiu", qual é o adjetivo?',opts:['bola','vermelha','caiu','A'],correct:1,fb:'Vermelha descreve a bola → é o adjetivo!',img:'pt_adj_1'},
          {q:'Uma pessoa que nasceu na China é:',opts:['Chinesa','Chineira','Chiniosa','Chinalesa'],correct:0,fb:'China + -esa = chinesa! Adjetivo pátrio.',img:'pt_adj_2'},
          {q:'Qual é o feminino de "holandês"?',opts:['Holandeira','Holandesa','Holandisa','Holandosa'],correct:1,fb:'Holandês → holandesa! Masculino -ÊS, feminino -ESA.',img:'pt_adj_2'}
        ]},
      {id:'pt_ss',icon:'🔤',name:'Ortografia S/SS',desc:'Quando usar S ou SS entre vogais',illus:'generic',
        lesson:`<h3>Uso do S e SS</h3><p>📌 <span class="hl">S no início da palavra</span> = som de S: <span class="hl">s</span>apo, <span class="hl">s</span>opa, <span class="hl">s</span>ol.</p><p>📌 <span class="hl">S entre duas vogais</span> = som de <span class="hl">Z</span>: ca<span class="hl">s</span>a, me<span class="hl">s</span>a, ro<span class="hl">s</span>a, Bra<span class="hl">s</span>il, de<span class="hl">s</span>ejo.</p><p>📌 <span class="hl">SS entre duas vogais</span> = som de <span class="hl">S</span>: pa<span class="hl">ss</span>arinho, gira<span class="hl">ss</span>ol, pá<span class="hl">ss</span>aro, a<span class="hl">ss</span>ombrada, carro<span class="hl">ss</span>el.</p><p>⚠️ <span class="hl">Nenhuma palavra começa com SS!</span></p><p>📌 Dica rápida: se o som é de Z entre vogais → um S só. Se o som é de S entre vogais → dois SS.</p>`,
        quiz:[
          {q:'A letra S entre duas vogais tem som de:',opts:['S','Z','X','R'],correct:1,fb:'S entre vogais soa como Z: casa, mesa, rosa!',img:'pt_ss_0'},
          {q:'Qual é o correto?',opts:['Ssapo','Çapo','Sapo','Ssapu'],correct:2,fb:'Nenhuma palavra começa com SS! O correto é Sapo.',img:'pt_ss_1'},
          {q:'Qual é o correto?',opts:['Pasaro','Pássaro','Passaru','Pásaro'],correct:1,fb:'PáSSaro — SS entre vogais com som de S!',img:'pt_ss_1'},
          {q:'Qual é o correto?',opts:['Cassa','Caza','Casa','Kasa'],correct:2,fb:'Casa tem S entre vogais (som de Z). Não é SS!',img:'pt_ss_2'},
          {q:'Qual é o correto?',opts:['Girasol','Girassol','Girazol','Jirassol'],correct:1,fb:'GiraSSol — SS entre vogais com som de S!',img:'pt_ss_0'},
          {q:'Qual é o correto?',opts:['Meza','Messa','Mesa','Meça'],correct:2,fb:'Mesa tem S entre vogais = som de Z. Não é SS nem Z!',img:'pt_ss_2'},
          {q:'Qual regra está CERTA?',opts:['Palavras podem começar com SS','S entre vogais tem som de S','SS entre vogais tem som de S','SS entre vogais tem som de Z'],correct:2,fb:'SS entre vogais = som de S. E nenhuma palavra começa com SS!',img:'pt_ss_0'},
          {q:'Qual é o correto?',opts:['Pesoa','Pessoa','Pessa','Peçoa'],correct:1,fb:'PeSSoa — SS entre vogais com som de S!',img:'pt_ss_1'},
          {q:'Qual é o correto?',opts:['Passeio','Paseio','Paçeio','Pazeio'],correct:0,fb:'PaSSeio — SS entre vogais com som de S!',img:'pt_ss_2'},
          {q:'Qual é o correto?',opts:['Dinosauro','Dinossauro','Dinossauru','Dinozauro'],correct:1,fb:'DinoSSauro — SS entre vogais com som de S!',img:'pt_ss_0'}
        ]},
      {id:'pt_lh',icon:'✏️',name:'Ortografia LHA/LHO/LIA/LIO',desc:'Palavras terminadas em LHA, LHO, LIA e LIO',illus:'generic',
        lesson:`<h3>LHA / LHO / LIA / LIO</h3><p>Muitas palavras terminam com sons parecidos, mas a escrita é diferente!</p><p>📌 Palavras com <span class="hl">LHO</span>: coe<span class="hl">lho</span>, repo<span class="hl">lho</span>, mi<span class="hl">lho</span>, joe<span class="hl">lho</span>, choca<span class="hl">lho</span>, espe<span class="hl">lho</span>.</p><p>📌 Palavras com <span class="hl">LHA</span>: mura<span class="hl">lha</span>, fo<span class="hl">lha</span>, toa<span class="hl">lha</span>, sobrance<span class="hl">lha</span>, ervi<span class="hl">lha</span>, miga<span class="hl">lha</span>.</p><p>📌 Palavras com <span class="hl">LIA</span>: famí<span class="hl">lia</span>, mobi<span class="hl">lia</span>, Emí<span class="hl">lia</span>, sandá<span class="hl">lia</span>.</p><p>📌 Palavras com <span class="hl">LIO</span>: cí<span class="hl">lio</span>, domicí<span class="hl">lio</span>, utensí<span class="hl">lio</span>.</p><p>⚠️ Dica: LHA/LHO tem o som do "LH" (como em "filho"). LIA/LIO tem som de "LI" separado (como em "Júlia").</p>`,
        quiz:[
          {q:'Qual é o correto?',opts:['Coelho','Coelio','Coelha','Coelia'],correct:0,fb:'Coelho — com LHO! 🐰',img:'pt_lh_0'},
          {q:'Qual é o correto?',opts:['Familha','Famílio','Família','Familho'],correct:2,fb:'Família — com LIA! 👨‍👩‍👧',img:'pt_lh_1'},
          {q:'Qual é o correto?',opts:['Folia','Folio','Folha','Folho'],correct:2,fb:'Folha — com LHA! 🌿',img:'pt_lh_0'},
          {q:'Qual é o correto?',opts:['Toalia','Toalio','Toalho','Toalha'],correct:3,fb:'Toalha — com LHA! 🧣',img:'pt_lh_1'},
          {q:'Qual é o correto?',opts:['Domicílha','Domicílio','Domicílho','Domicilha'],correct:1,fb:'Domicílio — com LIO! 🏠',img:'pt_lh_2'},
          {q:'Qual é o correto?',opts:['Sobrancelia','Sobrancelha','Sobrancelio','Sobrancelho'],correct:1,fb:'Sobrancelha — com LHA! 👁️',img:'pt_lh_0'},
          {q:'Qual é o correto?',opts:['Joelha','Joelia','Joelio','Joelho'],correct:3,fb:'Joelho — com LHO! 🦵',img:'pt_lh_1'},
          {q:'Qual é o correto?',opts:['Sandálha','Sandálho','Sandália','Sandálio'],correct:2,fb:'Sandália — com LIA! 👡',img:'pt_lh_2'},
          {q:'Qual é o correto?',opts:['Espelio','Espelia','Espelho','Espelha'],correct:2,fb:'Espelho — com LHO! 🪞',img:'pt_lh_2'},
          {q:'Qual é o correto?',opts:['Mobílha','Mobília','Mobílho','Mobílio'],correct:1,fb:'Mobília — com LIA! 🛋️',img:'pt_lh_0'}
        ]},
      {id:'pt_mn',icon:'🔡',name:'Ortografia M/N antes de consoantes',desc:'Quando usar M ou N antes de outras letras',illus:'generic',
        lesson:`<h3>M ou N antes de consoantes?</h3><p>📌 Antes de <span class="hl">P</span> e <span class="hl">B</span> → sempre <span class="hl">M</span>:</p><p>bo<span class="hl">mb</span>eiro, la<span class="hl">mp</span>arina, ta<span class="hl">mb</span>or, co<span class="hl">mp</span>utador, so<span class="hl">mb</span>rinha, lâ<span class="hl">mp</span>ada, ca<span class="hl">mp</span>o.</p><p>📌 Antes de <span class="hl">outras consoantes</span> (T, D, G, Q, C...) → sempre <span class="hl">N</span>:</p><p>bri<span class="hl">n</span>quedo, ca<span class="hl">n</span>tiga, po<span class="hl">n</span>te, de<span class="hl">n</span>te, li<span class="hl">n</span>do, ba<span class="hl">n</span>co.</p><p>⚠️ Erro comum: escrever "brimquedo" (errado!) em vez de "brinquedo" (certo!). Q não é P nem B, então usa N!</p><p>📌 Dica fácil: veja a letra que vem DEPOIS. Se for P ou B → M. Se for qualquer outra → N.</p>`,
        quiz:[
          {q:'Antes de P e B, usamos:',opts:['N','M','S','L'],correct:1,fb:'Antes de P e B → sempre M! Exemplo: tambor, computador.',img:'pt_mn_0'},
          {q:'Qual é o correto?',opts:['Brimquedo','Brinquedo','Brimcedo','Brinkedo'],correct:1,fb:'BriNquedo! Q não é P nem B, então usa N.',img:'pt_mn_2'},
          {q:'Qual é o correto?',opts:['Lanparina','Lamparina','Lanpanina','Lampanina'],correct:1,fb:'LaMParina → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Conputador','Computador','Comnutador','Conpotador'],correct:1,fb:'CoMPutador → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Tanpor','Tanbor','Tambor','Tampor'],correct:2,fb:'TaMBor → antes de B = M!',img:'pt_mn_0'},
          {q:'Qual é o correto?',opts:['Sonbrinha','Sombrinha','Sombrimha','Sonbrimha'],correct:1,fb:'SoMBrinha → antes de B = M!',img:'pt_mn_0'},
          {q:'Qual está escrito ERRADO?',opts:['Bombeiro','Cantiga','Lanpada','Sombra'],correct:2,fb:'O correto é lâMPada! Antes de P → M, não N.',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Pomte','Ponte','Ponpe','Pompe'],correct:1,fb:'PoNTe → T não é P nem B, então usa N!',img:'pt_mn_2'},
          {q:'Qual é o correto?',opts:['Canpo','Campo','Camno','Canmo'],correct:1,fb:'CaMPo → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é o correto?',opts:['Bamco','Banco','Banpo','Bampo'],correct:1,fb:'BaNCo → C não é P nem B, então usa N!',img:'pt_mn_2'}
        ]},
      {id:'pt_mai',icon:'🔠',name:'Letra Maiúscula e Interpretação',desc:'Quando usar maiúscula e entender textos',illus:'generic',
        lesson:`<h3>Letra Maiúscula e Interpretação de Texto</h3><p>📌 Usamos <span class="hl">letra maiúscula</span>:</p><p>• No <span class="hl">início de frases</span>: "O menino correu."</p><p>• Em <span class="hl">nomes próprios</span> de pessoas: Benício, Vanessa</p><p>• Em nomes de <span class="hl">lugares</span>: Brasil, São Paulo, Rio Amazonas</p><p>• Em nomes de <span class="hl">marcas</span>: Nintendo, Faber Castel</p><p>📌 <span class="hl">Interpretação de texto</span>: ao ler um texto, preste atenção em:</p><p>• <span class="hl">Quem?</span> (personagens)</p><p>• <span class="hl">O quê?</span> (o que aconteceu)</p><p>• <span class="hl">Onde?</span> (lugar)</p><p>• <span class="hl">Quando?</span> (tempo)</p><p>• <span class="hl">Por quê?</span> (motivo)</p>`,
        quiz:[
          {q:'Quando usamos letra maiúscula?',opts:['No meio das palavras','No início de frases e nomes próprios','Nunca','Só em números'],correct:1,fb:'Maiúscula no início de frases e em nomes próprios!',img:'pt_mai_0'},
          {q:'Qual frase está escrita corretamente?',opts:['o Brasil é grande.','O brasil é grande.','O Brasil é grande.','o brasil é grande.'],correct:2,fb:'O (início de frase) e Brasil (nome próprio) com maiúscula!',img:'pt_mai_0'},
          {q:'Por que "São Paulo" é escrito com maiúscula?',opts:['É uma palavra bonita','É nome próprio de um lugar','Tem duas palavras','Começa com S'],correct:1,fb:'São Paulo é nome próprio de uma cidade → maiúscula!',img:'pt_mai_0'},
          {q:'Ao ler um texto, "Quem?" nos ajuda a encontrar:',opts:['O lugar','Os personagens','O tempo','A moral'],correct:1,fb:'Quem = os personagens da história!',img:'pt_mai_0'},
          {q:'Na fábula do rato do campo, "Onde?" a história acontece?',opts:['Na escola','No campo e na cidade','No espaço','No mar'],correct:1,fb:'A história acontece no campo e na cidade!',img:'pt_mai_0'},
          {q:'Qual destas palavras NÃO precisa de maiúscula?',opts:['Benício','Nintendo','escola','São Paulo'],correct:2,fb:'Escola é substantivo comum → minúscula! Os outros são próprios.',img:'pt_mai_0'}
        ]}
    ]},

  {id:'langarts',date:'29/04',day:'Wednesday',lang:'en',name:'Language Arts',icon:'📖',css:'c-langarts',badge:'English',
    ref:'<p>📖 Language Arts Booklet pp.5-7, 9-10, 13-15</p><p>📖 Cornerstone pp.18-19, 34-35</p>',
    topics:[
      {id:'la_present',icon:'⏰',name:'Simple Present Tense',desc:'Adding -s, -es and -ies to verbs',illus:'generic',
        lesson:`<h3>Simple Present Tense</h3><p>When we talk about things that happen every day or are always true, we use the <span class="hl">simple present</span>.</p><p>📌 With <span class="hl">he, she, it</span> we add something to the verb:</p><p>Most verbs → add <span class="hl">-s</span>: he play<span class="hl">s</span>, she read<span class="hl">s</span>, it rain<span class="hl">s</span></p><p>Verbs ending in s, sh, ch, x, o → add <span class="hl">-es</span>: she wash<span class="hl">es</span>, he watch<span class="hl">es</span>, it go<span class="hl">es</span></p><p>Verbs ending in consonant + y → change y to <span class="hl">-ies</span>: she carr<span class="hl">ies</span>, he stud<span class="hl">ies</span>, it fl<span class="hl">ies</span></p><p>📌 With <span class="hl">I, you, we, they</span> → the verb stays the same: I play, they read, we go.</p>`,
        quiz:[
          {q:'She ___ to school every day.',opts:['go','goes','gos','going'],correct:1,fb:'She + go → goes! (ends in O → add -es)',img:'la_verb_0'},
          {q:'He ___ TV after dinner.',opts:['watch','watchs','watches','watching'],correct:2,fb:'He + watch → watches! (ends in CH → add -es)',img:'la_verb_2'},
          {q:'My cat ___ milk every morning.',opts:['drink','drinks','drinkes','drinkies'],correct:1,fb:'It (my cat) + drink → drinks! (most verbs → add -s)',img:'la_verb_2'},
          {q:'She ___ her homework every day.',opts:['study','studys','studies','studyes'],correct:2,fb:'She + study → studies! (consonant + Y → change to -ies)',img:'la_verb_1'},
          {q:'They ___ soccer on Saturdays.',opts:['plays','play','playes','plais'],correct:1,fb:'They + play → play! (with they, the verb stays the same)',img:'la_verb_0'},
          {q:'He ___ his teeth before bed.',opts:['brush','brushs','brushes','brushies'],correct:2,fb:'He + brush → brushes! (ends in SH → add -es)',img:'la_verb_2'},
          {q:'The baby ___ a lot.',opts:['cry','crys','cries','cryes'],correct:2,fb:'It (the baby) + cry → cries! (consonant + Y → -ies)',img:'la_verb_1'}
        ]},
      {id:'la_wh',icon:'❓',name:'Wh- Questions',desc:'What, Where, Who, When, Why',illus:'generic',
        lesson:`<h3>Wh- Questions</h3><p>We use question words to ask for information:</p><p>📌 <span class="hl">What</span> = asks about a thing or action. "What is your name?"</p><p>📌 <span class="hl">Where</span> = asks about a place. "Where do you live?"</p><p>📌 <span class="hl">Who</span> = asks about a person. "Who is your teacher?"</p><p>📌 <span class="hl">When</span> = asks about time. "When is your birthday?"</p><p>📌 <span class="hl">Why</span> = asks about a reason. "Why are you happy?"</p><p>📌 <span class="hl">How</span> = asks about the way something happens. "How do you go to school?"</p>`,
        quiz:[
          {q:'___ is your name? My name is Ben.',opts:['Where','What','When','Who'],correct:1,fb:'What asks about a thing → What is your name?',img:'la_wh_0'},
          {q:'___ do you live? I live in São Paulo.',opts:['What','Who','Where','When'],correct:2,fb:'Where asks about a place!',img:'la_wh_0'},
          {q:'___ is your best friend? It is Tom.',opts:['Where','When','What','Who'],correct:3,fb:'Who asks about a person!',img:'la_wh_0'},
          {q:'___ is your birthday? It is in March.',opts:['Who','What','Where','When'],correct:3,fb:'When asks about time!',img:'la_wh_0'},
          {q:'___ are you sad? Because I lost my toy.',opts:['What','Where','When','Why'],correct:3,fb:'Why asks about a reason!',img:'la_wh_0'},
          {q:'___ do you go to school? I go by bus.',opts:['Why','What','How','Who'],correct:2,fb:'How asks about the way something happens!',img:'la_wh_1'},
          {q:'___ do you eat for lunch? I eat rice and beans.',opts:['Who','What','When','Where'],correct:1,fb:'What asks about a thing → What do you eat?',img:'la_wh_0'}
        ]},
      {id:'la_read',icon:'📚',name:'Reading & Writing',desc:'Finding information and writing complete sentences',illus:'generic',
        lesson:`<h3>Reading & Writing</h3><p>📌 When you read a text, look for the <span class="hl">key details</span>:</p><p><span class="hl">Who</span> is in the story?</p><p><span class="hl">What</span> happens?</p><p><span class="hl">When</span> does it happen?</p><p><span class="hl">Where</span> does it happen?</p><p><span class="hl">Why</span> does it happen?</p><p>📌 When you write, make <span class="hl">complete sentences</span>:</p><p>✅ Good: "<span class="hl">The cat sleeps on the bed.</span>" (has a subject + verb + details)</p><p>❌ Not complete: "Sleeps on the bed." (who sleeps?)</p><p>❌ Not complete: "The cat." (what does the cat do?)</p><p>📌 Always stay on the <span class="hl">topic</span> — write about what was asked!</p>`,
        quiz:[
          {q:'Which is a COMPLETE sentence?',opts:['The big dog.','Runs very fast.','The big dog runs fast.','Fast dog big.'],correct:2,fb:'A complete sentence needs WHO + WHAT THEY DO!',img:'la_read_0'},
          {q:'When reading a story, "Who?" helps you find:',opts:['The place','The people in the story','The time','The reason'],correct:1,fb:'Who = the people or characters in the story!',img:'la_read_1'},
          {q:'Which sentence stays on the topic "My Pet"?',opts:['I like math.','My dog is brown and playful.','The sky is blue.','Pizza is good.'],correct:1,fb:'Only "My dog is brown and playful" is about the pet!',img:'la_read_0'},
          {q:'"Where?" helps you find:',opts:['The people','The time','The place','The reason'],correct:2,fb:'Where = the place where things happen!',img:'la_read_1'},
          {q:'What is missing? "Eats a banana every morning."',opts:['A place','A verb','A subject (who?)','A time'],correct:2,fb:'Who eats? We need a subject! Example: "She eats a banana."',img:'la_read_0'},
          {q:'Which is NOT a complete sentence?',opts:['I go to school.','She likes ice cream.','The tall tree.','We play soccer.'],correct:2,fb:'"The tall tree" — what about it? It needs a verb!',img:'la_read_0'}
        ]}
    ]},

  {id:'historia',date:'16/04',day:'Quinta',lang:'pt',name:'História e Geografia',icon:'🌍',css:'c-historia',badge:'Português',
    ref:'<p>📓 Caderno de História e Geografia</p><p>📖 My Projects · pp.35-37</p>',
    topics:[
      {id:'hist_cult',icon:'🎭',name:'Cultura e Diversidade',desc:'Influências indígenas, africanas, portuguesas e italianas',illus:'generic',
        lesson:`<h3>Herança Brasileira — Quem contribuiu?</h3><p>🏹 <span class="hl">Indígenas:</span> mandioca, milho, tapioca, pipoca, rede de dormir, tomar banho todos os dias, andar descalço, brincar de peteca, cesto de palha. Palavras: abacaxi, tatu, jacaré, Iguaçu, Pará.</p><p>🌍 <span class="hl">Africanos:</span> capoeira, samba, congada, maracatu, reisado. Instrumentos: berimbau, agogô, reco-reco, atabaque. Comidas: acarajé, vatapá, inhame, feijoada. Palavras: caçula, dengo, batuque.</p><p>⛵ <span class="hl">Portugueses:</span> língua portuguesa, azulejos, festas juninas, bacalhau, religião católica.</p><p>🇮🇹 <span class="hl">Italianos:</span> macarrão e outras comidas!</p><p>📌 A <span class="hl">diversidade cultural</span> é a mistura dessas influências que faz o Brasil um país tão rico e especial!</p>`,
        quiz:[
          {q:'A mandioca, o milho e a pipoca são heranças de qual povo?',opts:['Portugueses','Africanos','Indígenas','Italianos'],correct:2,fb:'Os povos indígenas cultivavam mandioca, milho, pipoca e muito mais!',img:'hist_cult_0'},
          {q:'A capoeira é uma dança/luta que tem origem:',opts:['Indígena','Africana','Portuguesa','Italiana'],correct:1,fb:'A capoeira foi criada pelos africanos trazidos ao Brasil!',img:'hist_cult_1'},
          {q:'A língua que falamos no Brasil veio de qual povo?',opts:['Indígenas','Africanos','Portugueses','Italianos'],correct:2,fb:'Falamos português porque os colonizadores portugueses trouxeram sua língua!',img:'hist_cult_2'},
          {q:'A feijoada e o samba são contribuições do povo:',opts:['Indígena','Africano','Português','Italiano'],correct:1,fb:'A feijoada e o samba são parte da rica herança africana no Brasil!',img:'hist_cult_4'},
          {q:'Tomar banho todos os dias e dormir em redes são hábitos que vieram dos:',opts:['Portugueses','Africanos','Indígenas','Italianos'],correct:2,fb:'Os indígenas já tomavam banho diariamente e dormiam em redes!',img:'hist_cult_0'},
          {q:'O que significa "diversidade cultural"?',opts:['Todo mundo é igual','Diferentes culturas contribuindo juntas','Só uma cultura existe','Não ter cultura'],correct:1,fb:'Diversidade = muitas culturas juntas, e cada uma contribuiu para o Brasil!',img:'hist_cult_3'},
          {q:'Por que a cultura brasileira é tão rica e variada?',opts:['Porque só tem um povo','Porque recebeu influências de vários povos diferentes','Porque copiou tudo de um país','Porque não tem tradições'],correct:1,fb:'Indígenas, africanos, portugueses, italianos e outros — cada povo trouxe algo especial!',img:'hist_cult_3'}
        ]}
    ]},

  {id:'social',date:'15/04',day:'Wednesday',lang:'en',name:'Social Studies',icon:'🗺️',css:'c-social',badge:'English',
    ref:'<p>📓 Social Studies notebook</p><p>📖 Cornerstone pp.6-7 — Kids\' Stories from around the World</p>',
    topics:[
      {id:'soc_cult',icon:'🌎',name:'Cultures & Traditions',desc:'How people live around the world',illus:'generic',
        lesson:`<h3>Cultures & Traditions</h3><p><span class="hl">Culture</span> = how a group of people live: their food, music, clothes, language, and parties!</p><p><span class="hl">Tradition</span> = something families do again and again, like celebrating a holiday every year. Parents teach traditions to their children!</p><p>📌 <span class="hl">People live in different places:</span></p><p>🏘️ A <span class="hl">suburb</span> has many houses near a big city.</p><p>🏔️ A <span class="hl">small town</span> can be far from the city, sometimes in the mountains.</p><p>🏙️ A <span class="hl">big city</span> has tall buildings and many people.</p><p>🌾 A <span class="hl">farm</span> is in the countryside. Families grow food there.</p><p>📌 Kids everywhere go to school, play, and have families — even if they live in very different places! We should <span class="hl">respect</span> all cultures. 🌈</p>`,
        quiz:[
          {q:'What is a "culture"?',opts:['A kind of food','How a group of people live','The name of a country','A type of dance'],correct:1,fb:'Culture is how people live: food, music, clothes, language, and parties!',img:'soc_cult_0'},
          {q:'What is a "tradition"?',opts:['Something new','Something you do only one time','Something families do again and again','A type of drawing'],correct:2,fb:'A tradition is something families repeat — like celebrating a holiday every year!',img:'soc_cult_1'},
          {q:'A place with many houses near a big city is called a:',opts:['Farm','Suburb','Mountain','Island'],correct:1,fb:'A suburb has many houses and is close to a big city!',img:'soc_cult_2'},
          {q:'How should we treat people from different cultures?',opts:['Laugh at them','Be afraid','Respect them','Ignore them'],correct:2,fb:'We should respect all cultures — being different is what makes the world beautiful!',img:'soc_cult_3'},
          {q:'What do all kids around the world have in common?',opts:['They live in the same place','They go to school and have families','They eat the same food','They speak the same language'],correct:1,fb:'All kids go to school, play, and have families — no matter where they live!',img:'soc_cult_4'},
          {q:'Which one is a tradition?',opts:['Doing homework today','Celebrating Christmas every year','Watching a new movie','Playing a new game'],correct:1,fb:'Christmas is celebrated every year — that is a tradition!',img:'soc_cult_0'},
          {q:'A family that grows food in the countryside lives on a:',opts:['Suburb','Tall building','Farm','Shopping mall'],correct:2,fb:'Farms are in the countryside where families grow food!',img:'soc_cult_4'}
        ]}
    ]},

  {id:'ciencias_som',date:'14/04',day:'Terça',lang:'pt',name:'Ciências — Som',icon:'🔊',css:'c-ciencias',badge:'Português',
    ref:'<p>📖 My Projects · pp.95, 96, 99, 100</p><p>📓 Caderno</p>',
    topics:[
      {id:'som',icon:'🔊',name:'O Som',desc:'Vibração, propagação, características e experiência',illus:'sound',
        lesson:`<h3>O que é o Som?</h3><p>Som é uma <span class="hl">vibração</span> que chega aos nossos ouvidos por meio de ondas sonoras.</p><p>📌 <span class="hl">Características do som:</span> Altura (grave/agudo), Intensidade (forte/fraco), Duração (longo/curto) e Timbre (cada instrumento tem o seu!).</p><p>O som viaja pelo ar, pela água e por sólidos. No vácuo (espaço), NÃO tem som!</p><p>🧪 <span class="hl">Experiência:</span> Celular dentro de um pote de vidro coberto com filme PVC e grãos de arroz em cima. Quando o celular toca, o arroz pula! As vibrações do som se propagam pelo pote e transferem para os grãos. 🍚</p><p>📌 Num concerto, ouvimos sons de flautas, violino, piano, tambor, vozes e aplausos — cada um produz vibrações diferentes!</p>`,
        quiz:[
          {q:'O som é produzido quando um objeto:',opts:['Fica parado','Vibra','Derrete','Congela'],correct:1,fb:'Som = vibração!',img:'som_0'},
          {q:'O som pode viajar pelo:',opts:['Ar, água e sólidos','Só ar','Só água','Pelo vácuo'],correct:0,fb:'Ar, água e sólidos — mas não pelo vácuo!',img:'som_1'},
          {q:'Por que não há som no espaço?',opts:['Muito frio','Sem gravidade','Sem ar (vácuo)','Muito grande'],correct:2,fb:'Sem ar = sem som! O som precisa de um meio para viajar.',img:'som_2'},
          {q:'Na experiência com o celular no pote, por que o arroz pula?',opts:['O arroz está vivo','As vibrações do som se propagam pelo pote','O vento empurra','O filme esquenta'],correct:1,fb:'As vibrações do celular propagam pelo vidro e transferem para os grãos de arroz!',img:'som_4'},
          {q:'Som agudo (como um apito) tem vibrações:',opts:['Lentas','Rápidas','Paradas','Invisíveis'],correct:1,fb:'Vibrações rápidas = som agudo! Lentas = grave.',img:'som_3'},
          {q:'Quando bate num tambor, o que vibra primeiro?',opts:['O ar','A baqueta','A pele do tambor','Seu ouvido'],correct:2,fb:'A pele vibra e faz o ar vibrar, que chega ao ouvido!',img:'som_4'},
          {q:'Qual NÃO é uma característica do som?',opts:['Altura (grave/agudo)','Cor','Intensidade (forte/fraco)','Timbre'],correct:1,fb:'Cor é da luz! As características do som são: altura, intensidade, duração e timbre.',img:'som_0'}
        ]}
    ]},

  {id:'science',date:'13/04',day:'Monday',lang:'en',name:'Science — Light',icon:'💡',css:'c-science',badge:'English',
    ref:'<p>📖 Science Booklet pp.19-33</p><p>📓 Science Notebook</p>',
    topics:[
      {id:'sci_refl',icon:'🪞',name:'Reflection',desc:'When light bounces back',illus:'reflection',
        lesson:`<h3>Reflection</h3><p>When light hits something smooth and shiny, it <span class="hl">bounces back</span>. This is called <span class="hl">reflection</span>!</p><p>It is like throwing a ball at a wall — the ball comes back to you! 🏀</p><p>When light bounces off a mirror, it sends a picture of you back to your eyes. That is why you can see yourself!</p><p>📌 A flat mirror shows you normally. But a curved surface (like the inside of a <span class="hl">spoon</span>) shows you upside down!</p>`,
        quiz:[
          {q:'What happens when light hits a mirror?',opts:['It is absorbed','It is reflected','It stops','It changes color'],correct:1,fb:'Light is reflected — it bounces back from the mirror!',img:'sci_refl_0'},
          {q:'Which one reflects light the best?',opts:['A black shirt','A smooth mirror','A piece of wood','An eraser'],correct:1,fb:'Smooth and shiny things reflect light the best!',img:'sci_refl_1'},
          {q:'Reflection is like throwing a ball at a wall because:',opts:['The ball melts','The ball bounces back','The ball goes away','The wall breaks'],correct:1,fb:'Light bounces back like a ball bouncing off a wall!',img:'sci_refl_2'},
          {q:'When you look at the INSIDE of a spoon, you look:',opts:['Normal','Upside down','Very big','Very small'],correct:1,fb:'The curved inside of a spoon flips your reflection upside down!',img:'sci_refl_3'},
          {q:'Light reflects at the ___ angle it came in.',opts:['A bigger','A smaller','The same','Any'],correct:2,fb:'Light always reflects at the same angle!',img:'sci_refl_4'}
        ]},
      {id:'sci_refr',icon:'🌈',name:'Refraction',desc:'When light bends',illus:'refraction',
        lesson:`<h3>Refraction</h3><p>When light goes from one thing into another (like from air into water), it <span class="hl">bends</span>. This is called <span class="hl">refraction</span>!</p><p>That is why a straw in a glass of water looks broken — but it is not really broken! The light bends when it goes into the water. 🥤</p><p>📌 This is also why you might miss a fish when trying to catch it — the fish is not really where you see it!</p><p>📌 A <span class="hl">rainbow</span> happens when sunlight bends inside rain drops and splits into many colors! 🌈</p>`,
        quiz:[
          {q:'Refraction means light:',opts:['Bounces back','Bends','Breaks things','Gets lost'],correct:1,fb:'Refraction is when light bends!',img:'sci_refr_0'},
          {q:'Why does a straw look broken in water?',opts:['The straw really breaks','Light is refracted in water','The glass is broken','It is magic'],correct:1,fb:'Light is refracted (it bends) when it goes into water!',img:'sci_refr_1'},
          {q:'A rainbow is an example of:',opts:['Absorption','Reflection','Refraction','A shadow'],correct:2,fb:'Sunlight is refracted inside rain drops and splits into colors!',img:'sci_refr_2'},

// ===== NUMERIC INPUT EXERCISE =====
var numAns='';
function renderNum(q,pt){
  numAns='';
  const w=document.getElementById('numWrap');w.style.display='flex';
  const placeholder=pt?'Digite a resposta':'Type the answer';
  const submit=pt?'Conferir':'Check';
  let keys='';
  for(let n=1;n<=9;n++)keys+=`<button class="num-key" onclick="numKey('${n}')">${n}</button>`;
  keys+=`<button class="num-key" onclick="numKey('back')">⌫</button>`;
  keys+=`<button class="num-key" onclick="numKey('0')">0</button>`;
  keys+=`<button class="num-key" onclick="numKey('clear')">C</button>`;
  w.innerHTML=`<div class="num-prompt">${placeholder}</div>
    <input class="num-input" id="numInput" type="text" inputmode="numeric" pattern="[0-9]*" readonly value="">
    <div class="num-keys">${keys}</div>
    <button class="num-submit" id="numSubmit" disabled onclick="checkNum()">${submit}</button>`;
}
function numKey(k){
  const inp=document.getElementById('numInput');if(!inp)return;
  if(k==='clear')numAns='';
  else if(k==='back')numAns=numAns.slice(0,-1);
  else if(numAns.length<6)numAns+=k;
  inp.value=numAns;
  document.getElementById('numSubmit').disabled=numAns==='';
}
function checkNum(){
  const q=curQuiz[qIdx],pt=curExam.lang==='pt';
  const user=parseInt(numAns,10);const ok=user===q.answer;
  const inp=document.getElementById('numInput');inp.classList.add(ok?'ok':'no');
  document.querySelectorAll('.num-key,.num-submit').forEach(b=>b.disabled=true);
  showFb(ok,q,pt,user);
}

// ===== DRAG-DROP EXERCISE =====
var ddState={};
var ddSelected=null;
function renderDD(q,pt){
  ddState={};ddSelected=null;
  const w=document.getElementById('ddWrap');w.style.display='flex';
  const prompt=q.prompt||(pt?'Toque numa peça e depois numa caixa para encaixar.':'Tap a piece, then tap a box to place it.');
  const targetsHTML=q.targets.map((t,i)=>`<div class="dd-target" data-tidx="${i}"><span class="dd-tlabel">${t.label}</span><span class="dd-tval" id="ddTV${i}">${t.placeholder||'___'}</span></div>`).join('');
  const poolHTML=q.pool.map((p,i)=>`<button type="button" class="dd-chip" data-cidx="${i}">${p}</button>`).join('');
  w.innerHTML=`<div class="dd-prompt">${prompt}</div>
    <div class="dd-targets">${targetsHTML}</div>
    <div class="dd-pool">${poolHTML}</div>
    <button type="button" class="num-submit" id="ddSubmit" disabled>${pt?'Conferir':'Check'}</button>`;
  // Attach event listeners
  w.querySelectorAll('.dd-chip').forEach(btn=>{
    const idx=parseInt(btn.getAttribute('data-cidx'),10);
    btn.addEventListener('click',function(ev){ev.preventDefault();ev.stopPropagation();ddPick(idx);});
  });
  w.querySelectorAll('.dd-target').forEach(div=>{
    const idx=parseInt(div.getAttribute('data-tidx'),10);
    div.addEventListener('click',function(ev){ev.preventDefault();ev.stopPropagation();ddPlace(idx);});
  });
  document.getElementById('ddSubmit').addEventListener('click',function(ev){ev.preventDefault();checkDD();});
}
function ddPick(i){
  if(ddSelected===i){ddSelected=null}else{ddSelected=i}
  document.querySelectorAll('.dd-chip').forEach(c=>{
    const idx=parseInt(c.getAttribute('data-cidx'),10);
    c.classList.toggle('sel',idx===ddSelected);
  });
}
function _ddTargetEl(i){return document.querySelector('.dd-target[data-tidx="'+i+'"]')}
function _ddChipEl(i){return document.querySelector('.dd-chip[data-cidx="'+i+'"]')}
function ddPlace(targetIdx){
  const q=curQuiz[qIdx];
  if(ddSelected===null){
    // empty selection: unplace if target is filled
    if(ddState[targetIdx]!==undefined){
      const old=ddState[targetIdx];
      delete ddState[targetIdx];
      document.getElementById('ddTV'+targetIdx).textContent=q.targets[targetIdx].placeholder||'___';
      _ddTargetEl(targetIdx).classList.remove('filled');
      _ddChipEl(old).classList.remove('used');
      updateDDSubmit();
    }
    return;
  }
  // there's a selection
  // 1) if target was filled, free its previous chip
  if(ddState[targetIdx]!==undefined){
    const old=ddState[targetIdx];
    _ddChipEl(old).classList.remove('used');
  }
  // 2) if selected chip was already on another target, clear there
  Object.keys(ddState).forEach(k=>{
    if(ddState[k]===ddSelected){
      delete ddState[k];
      document.getElementById('ddTV'+k).textContent=q.targets[k].placeholder||'___';
      _ddTargetEl(k).classList.remove('filled');
    }
  });
  // 3) place
  ddState[targetIdx]=ddSelected;
  document.getElementById('ddTV'+targetIdx).textContent=q.pool[ddSelected];
  _ddTargetEl(targetIdx).classList.add('filled');
  _ddChipEl(ddSelected).classList.add('used');
  ddSelected=null;
  document.querySelectorAll('.dd-chip').forEach(c=>c.classList.remove('sel'));
  updateDDSubmit();
}
function updateDDSubmit(){
  const q=curQuiz[qIdx];
  const allFilled=q.targets.every((_,i)=>ddState[i]!==undefined);
  document.getElementById('ddSubmit').disabled=!allFilled;
}
function checkDD(){
  const q=curQuiz[qIdx],pt=curExam.lang==='pt';
  let allOk=true;const wrongList=[];
  q.targets.forEach((t,i)=>{
    const tEl=_ddTargetEl(i);
    const placed=ddState[i];const correctIdx=t.answer;
    if(placed===correctIdx){tEl.classList.add('ok')}
    else{tEl.classList.add('no');allOk=false;wrongList.push({label:t.label,gotIdx:placed,wantIdx:correctIdx})}
  });
  document.querySelectorAll('.dd-chip,#ddSubmit').forEach(b=>{b.disabled=true;b.style.pointerEvents='none'});
  document.querySelectorAll('.dd-target').forEach(t=>{t.style.pointerEvents='none'});
  showFb(allOk,q,pt,null,wrongList);
}

// ===== SHOW FEEDBACK (shared) =====
function showFb(ok,q,pt,user,wrongList){
  const fb=document.getElementById('fb');
  if(ok){
    score++;fb.className='fb fb-ok';
    fb.innerHTML=`<strong>${pt?'✅ Correto!':'✅ Correct!'}</strong> ${q.fb||''}`;
  } else {
    fb.className='fb fb-no';
    let correctTxt='';
    if(q.type==='num')correctTxt=String(q.answer);
    else if(q.type==='dd')correctTxt=q.targets.map(t=>`${t.label}: <strong>${q.pool[t.answer]}</strong>`).join(' · ');
    else correctTxt=`<strong>${q.opts[q.correct]}</strong>`;
    let mistake='';
    if(q.type==='num'){
      if(q.whyWrong){mistake=q.whyWrong(user)||'';}
      mistake=mistake||(pt?`Você digitou ${user}, mas a resposta é ${q.answer}.`:`You typed ${user}, but the answer is ${q.answer}.`);
    } else if(q.type==='dd'){
      mistake=wrongList.map(w=>`${pt?'Em':'In'} <strong>${w.label}</strong> ${pt?'você colocou':'you placed'} "${q.pool[w.gotIdx]}" — ${pt?'o certo é':'the correct one is'} "${q.pool[w.wantIdx]}".`).join('<br>');
    }
    const head=pt?'❌ Ops!':'❌ Oops!';
    const ansLbl=pt?'Resposta certa:':'Correct answer:';
    fb.innerHTML=`<strong>${head}</strong> ${ansLbl} ${correctTxt}<br>${mistake?mistake+'<br>':''}<em style="opacity:.85">${q.fb||''}</em>`;
  }
  fb.style.display='block';
  const n=document.getElementById('nxtBtn');n.style.display='block';
  n.textContent=qIdx<curQuiz.length-1?(pt?'Próxima →':'Next →'):(pt?'🏆 Ver resultado':'🏆 See results');
  document.getElementById('skipBtn').style.display='none';
}

function skipQ(){
  skipped++;
  qIdx++;
  if(qIdx<curQuiz.length)renderQ();
  else showResults();
}

function check(sel){
  const q=curQuiz[qIdx],pt=curExam.lang==='pt';
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('dis');if(i===q.correct)b.classList.add('ok');if(i===sel&&sel!==q.correct)b.classList.add('no')});
  const ok=sel===q.correct;
  const fb=document.getElementById('fb');
  if(ok){score++;fb.className='fb fb-ok';fb.innerHTML=`<strong>${pt?'✅ Correto!':'✅ Correct!'}</strong> ${q.fb||''}`}
  else{
    fb.className='fb fb-no';
    let mistake='';
    if(q.whyWrong&&q.whyWrong[sel]){mistake=q.whyWrong[sel]+'<br>';}
    fb.innerHTML=`<strong>${pt?'❌ Ops!':'❌ Oops!'}</strong> ${pt?'Resposta certa:':'Correct answer:'} <strong>${q.opts[q.correct]}</strong><br>${mistake}<em style="opacity:.85">${q.fb||''}</em>`;
  }
  fb.style.display='block';
  const n=document.getElementById('nxtBtn');n.style.display='block';
  n.textContent=qIdx<curQuiz.length-1?(pt?'Próxima →':'Next →'):(pt?'🏆 Ver resultado':'🏆 See results');
  document.getElementById('skipBtn').style.display='none';
}

function nextQ(){qIdx++;if(qIdx<curQuiz.length)renderQ();else showResults()}

function showResults(){
  const pt=curExam.lang==='pt',total=curQuiz.length,answered=total-skipped,pct=score/total;
  const tier=pct<.3?0:pct<.5?1:pct<.7?2:pct<1?3:4;
  document.getElementById('skipBtn').style.display='none';
  go('results');
  document.getElementById('resEmoji').textContent=['😅','🤔','😊','🤩','🏆'][tier];
  document.getElementById('resTitle').textContent=(pt?['Tente de novo!','Quase lá!','Muito bom!','Excelente!','Perfeito! 🎉']:['Try again!','Almost there!','Very good!','Excellent!','Perfect! 🎉'])[tier];
  document.getElementById('resScore').innerHTML=`${score} <span class="tot">/ ${total}</span>`;
  let breakdown='';
  if(skipped>0){
    const wrong=answered-score;
    const lbl=pt?`✅ ${score} acertou · ❌ ${wrong} errou · ⏭️ ${skipped} ${skipped===1?'não respondida':'não respondidas'}`:`✅ ${score} right · ❌ ${wrong} wrong · ⏭️ ${skipped} ${skipped===1?'unanswered':'unanswered'}`;
    breakdown=`<div class="res-breakdown">${lbl}</div>`;
  }
  const msg=(pt?['Continue estudando!','No caminho certo!','Parabéns!','Incrível!','Você é demais! ⭐']:['Keep studying!','On the right track!','Great job!','Amazing!','You\'re a genius! ⭐'])[tier];
  document.getElementById('resMsg').innerHTML=breakdown+`<div>${msg}</div>`;
  const sc=Math.ceil(pct*5);
  document.getElementById('resStars').innerHTML=Array.from({length:5},(_,i)=>`<span style="animation-delay:${i*.12}s;opacity:${i<sc?1:.2}">${i<sc?'⭐':'☆'}</span>`).join('');
  document.getElementById('btnRetry').textContent=pt?'🔄 Tentar de novo':'🔄 Try again';
  document.getElementById('progFill').style.width='100%';
  if(pct>=.7)confetti()}

function confetti(){var c=document.createElement('div');c.className='confetti-c';document.body.appendChild(c);var cols=['#FFD93D','#FF6B35','#FF1493','#00E5FF','#39FF14','#B388FF'];for(var i=0;i<55;i++){var p=document.createElement('div');p.className='conf';p.style.left=Math.random()*100+'%';p.style.background=cols[~~(Math.random()*cols.length)];var dur=(2+Math.random()*2)+'s';p.style.webkitAnimationDuration=dur;p.style.animationDuration=dur;p.style.webkitAnimationDelay=Math.random()*1.5+'s';p.style.animationDelay=Math.random()*1.5+'s';var s=6+Math.random()*8;p.style.width=s+'px';p.style.height=s+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p)}setTimeout(function(){c.remove()},5000)}

renderHome();

<script>
// ===================== LOGIN SYSTEM =====================
var LOGIN_USER='pueri';
var LOGIN_PASS='pueri';
var MAX_ATTEMPTS=5;
var LOCKOUT_MS=3*60*1000; // 3 minutes
var failCount=0;
var lockUntil=0;
var lockTimer=null;

// Check if already authenticated this session
if(window.sessionStorage){try{if(sessionStorage.getItem('sq_auth')==='1'){unlockApp()}}catch(e){}}

// Enter key support
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter'){document.getElementById('loginPass').focus()}});
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter'){tryLogin()}});

function tryLogin(){
  var now=Date.now();
  var errEl=document.getElementById('loginError');
  var attEl=document.getElementById('loginAttempts');
  var btn=document.getElementById('loginBtn');

  // Check lockout
  if(now<lockUntil){
    var secsLeft=Math.ceil((lockUntil-now)/1000);
    errEl.textContent='🔒 Too many attempts. Wait '+secsLeft+'s';
    return;
  }

  var user=document.getElementById('loginUser').value.trim().toLowerCase();
  var pass=document.getElementById('loginPass').value;

  if(user===LOGIN_USER && pass===LOGIN_PASS){
    // Success
    failCount=0;
    if(window.sessionStorage){try{sessionStorage.setItem('sq_auth','1')}catch(e){}}
    unlockApp();
  } else {
    // Fail
    failCount++;
    var remaining=MAX_ATTEMPTS-failCount;

    if(failCount>=MAX_ATTEMPTS){
      lockUntil=now+LOCKOUT_MS;
      errEl.textContent='🔒 Blocked! Too many wrong attempts.';
      attEl.textContent='Try again in 3 minutes';
      btn.disabled=true;
      document.getElementById('loginUser').disabled=true;
      document.getElementById('loginPass').disabled=true;

      // Countdown timer
      if(lockTimer)clearInterval(lockTimer);
      lockTimer=setInterval(function(){
        var left=Math.ceil((lockUntil-Date.now())/1000);
        if(left<=0){
          clearInterval(lockTimer);
          lockTimer=null;
          failCount=0;
          btn.disabled=false;
          document.getElementById('loginUser').disabled=false;
          document.getElementById('loginPass').disabled=false;
          errEl.textContent='';
          attEl.textContent='You can try again now!';
        } else {
          var m=Math.floor(left/60);
          var s=left%60;
          attEl.textContent='⏳ Wait '+m+':'+(s<10?'0':'')+s;
        }
      },1000);
    } else {
      errEl.textContent='❌ Wrong username or password';
      attEl.textContent=remaining+' attempt'+(remaining!==1?'s':'')+' left';
    }

    // Shake animation
    var form=document.querySelector('.login-form');
    form.style.animation='none';
    form.offsetHeight; // trigger reflow
    form.style.webkitAnimation='shake .4s ease';
    form.style.animation='shake .4s ease';

    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  }
}

function unlockApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appWrapper').style.display='block';
}

// Add shake keyframes dynamically (WebView safe)
var shakeStyle=document.createElement('style');
shakeStyle.textContent='@-webkit-keyframes shake{0%,100%{-webkit-transform:translateX(0)}20%{-webkit-transform:translateX(-12px)}40%{-webkit-transform:translateX(12px)}60%{-webkit-transform:translateX(-8px)}80%{-webkit-transform:translateX(8px)}}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}';
document.head.appendChild(shakeStyle);
</script>
