<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Benício's Study Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
:root{--bg1:#0B0E2D;--bg2:#141852;--bg3:#1B1F6A;--yellow:#FFD93D;--orange:#FF6B35;--pink:#FF1493;--cyan:#00E5FF;--green:#39FF14;--purple:#B388FF;--red:#FF4444;--card:rgba(255,255,255,0.06);--card-solid:#1c1f5a;--border:rgba(255,255,255,0.1);--r:18px}
html{height:100%;-webkit-overflow-scrolling:touch}
body{font-family:'Quicksand','Trebuchet MS',Verdana,sans-serif;background:linear-gradient(160deg,#0B0E2D,#141852,#1B1F6A);background-attachment:fixed;color:#fff;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh;padding:20px;padding-top:36px;padding-top:calc(36px + env(safe-area-inset-top,0px));padding-bottom:80px;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));position:relative;-webkit-box-orient:vertical;-webkit-box-direction:normal;flex-direction:column;-webkit-box-align:center;align-items:center}
.screen.active{display:-webkit-box;display:flex}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;-webkit-animation:drift 12s linear infinite;animation:drift 12s linear infinite;opacity:.15}
@-webkit-keyframes drift{0%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}25%{-webkit-transform:translateY(-30px) translateX(15px);transform:translateY(-30px) translateX(15px)}50%{-webkit-transform:translateY(0) translateX(30px);transform:translateY(0) translateX(30px)}75%{-webkit-transform:translateY(30px) translateX(15px);transform:translateY(30px) translateX(15px)}100%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}}
@keyframes drift{0%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}25%{-webkit-transform:translateY(-30px) translateX(15px);transform:translateY(-30px) translateX(15px)}50%{-webkit-transform:translateY(0) translateX(30px);transform:translateY(0) translateX(30px)}75%{-webkit-transform:translateY(30px) translateX(15px);transform:translateY(30px) translateX(15px)}100%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}}
.hdr{width:100%;max-width:420px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:12px;z-index:1;margin-bottom:16px;-webkit-flex-shrink:0;flex-shrink:0}
.hdr>*+*{margin-left:12px}
.hdr-back{width:42px;height:42px;background:#1c1f5a;border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;font-size:18px;cursor:pointer;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-transition:all .2s;transition:all .2s}
.hdr-back:active{-webkit-transform:scale(.93);transform:scale(.93)}
.hdr-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:20px;font-weight:700;-webkit-box-flex:1;flex:1}
.hdr-badge{font-size:11px;background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px;color:rgba(255,255,255,.5);white-space:nowrap}
#home{-webkit-box-pack:center;justify-content:center;gap:24px;text-align:center;z-index:1}
#home>*+*{margin-top:24px}
.logo{width:100px;height:100px;background:-webkit-linear-gradient(315deg,#FFD93D,#FF6B35);background:linear-gradient(135deg,#FFD93D,#FF6B35);border-radius:28px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-size:52px;box-shadow:0 12px 40px rgba(255,107,53,.35);-webkit-animation:bob 3s ease-in-out infinite;animation:bob 3s ease-in-out infinite}
@-webkit-keyframes bob{0%,100%{-webkit-transform:translateY(0) rotate(0);transform:translateY(0) rotate(0)}50%{-webkit-transform:translateY(-8px) rotate(2deg);transform:translateY(-8px) rotate(2deg)}}
@keyframes bob{0%,100%{-webkit-transform:translateY(0) rotate(0);transform:translateY(0) rotate(0)}50%{-webkit-transform:translateY(-8px) rotate(2deg);transform:translateY(-8px) rotate(2deg)}}
.home-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:30px;font-weight:700;background:-webkit-linear-gradient(left,#FFD93D,#00E5FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:linear-gradient(90deg,#FFD93D,#00E5FF);background-clip:text;color:#FFD93D}
.home-sub{color:rgba(255,255,255,.5);font-size:14px;margin-top:-16px}
.exam-list{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:12px;width:100%;max-width:420px}
.exam-list>*+*{margin-top:12px}
.exam-card{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 18px;cursor:pointer;-webkit-transition:all .25s;transition:all .25s;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:14px;position:relative;overflow:hidden;text-align:left}
.exam-card>*+*{margin-left:14px}
.exam-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
.exam-card:active{-webkit-transform:scale(.98);transform:scale(.98);border-color:rgba(255,255,255,.2)}
.exam-icon{font-size:32px;min-width:40px;text-align:center}
.exam-info{-webkit-box-flex:1;flex:1}
.exam-name{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:17px;font-weight:600}
.exam-meta{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;display:-webkit-box;display:flex;gap:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap}
.exam-meta>*+*{margin-left:8px}
.exam-meta .tag{background:rgba(255,255,255,.08);padding:2px 8px;border-radius:8px;display:inline-block}
.exam-arrow{font-size:16px;color:rgba(255,255,255,.3)}
.dedication{position:fixed;top:0;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.45);font-style:italic;pointer-events:none;z-index:50;letter-spacing:.2px;padding:6px 16px;padding-top:calc(6px + env(safe-area-inset-top,0px));background:rgba(11,14,45,.85)}
.c-science::before{background:-webkit-linear-gradient(#00E5FF,#39FF14);background:linear-gradient(#00E5FF,#39FF14)}
.c-ciencias::before{background:-webkit-linear-gradient(#39FF14,#FFD93D);background:linear-gradient(#39FF14,#FFD93D)}
.c-social::before{background:-webkit-linear-gradient(#FF6B35,#FFD93D);background:linear-gradient(#FF6B35,#FFD93D)}
.c-historia::before{background:-webkit-linear-gradient(#FF1493,#FF6B35);background:linear-gradient(#FF1493,#FF6B35)}
.c-portugues::before{background:-webkit-linear-gradient(#B388FF,#FF1493);background:linear-gradient(#B388FF,#FF1493)}
.c-math::before{background:-webkit-linear-gradient(#00E5FF,#B388FF);background:linear-gradient(#00E5FF,#B388FF)}
.c-matematica::before{background:-webkit-linear-gradient(#FFD93D,#FF6B35);background:linear-gradient(#FFD93D,#FF6B35)}
#topics{z-index:1}
.topic-grid{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:12px;width:100%;max-width:420px}
.topic-grid>*+*{margin-top:12px}
.topic-card{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);border-radius:18px;padding:18px;cursor:pointer;-webkit-transition:all .25s;transition:all .25s;position:relative;overflow:hidden}
.topic-card:active{-webkit-transform:scale(.98);transform:scale(.98)}
.topic-icon{font-size:34px;margin-bottom:8px}
.topic-name{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600}
.topic-desc{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;line-height:1.4}
.study-ref{width:100%;max-width:420px;background:rgba(255,217,61,.08);border:1px solid rgba(255,217,61,.2);border-radius:18px;padding:16px;margin-top:8px}
.study-ref-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:15px;color:#FFD93D;margin-bottom:8px}
.study-ref p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6}
#lesson{z-index:1}
.lesson-wrap{width:100%;max-width:420px}
.lesson-illus{width:100%;position:relative;padding-top:62.5%;border-radius:18px;overflow:hidden;margin-bottom:18px}
.lesson-illus svg{position:absolute;top:0;left:0;width:100%;height:100%}
.lesson-body{background:#1c1f5a;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:20px;line-height:1.75;font-size:15px}
.lesson-body h3{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:20px;margin-bottom:10px}
.lesson-body p{margin-bottom:10px;color:rgba(255,255,255,.7)}
.hl{color:#FFD93D;font-weight:700}
.quiz-start{width:100%;max-width:420px;background:-webkit-linear-gradient(315deg,#00E5FF,#B388FF);background:linear-gradient(135deg,#00E5FF,#B388FF);border:none;border-radius:18px;padding:16px;color:#fff;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600;cursor:pointer;margin-top:14px;box-shadow:0 8px 25px rgba(0,229,255,.25);-webkit-transition:-webkit-transform .2s;transition:transform .2s}
.quiz-start:active{-webkit-transform:scale(.97);transform:scale(.97)}
#quiz{z-index:1}
.prog-bar{width:100%;max-width:420px;height:7px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:-webkit-linear-gradient(left,#00E5FF,#39FF14);background:linear-gradient(90deg,#00E5FF,#39FF14);border-radius:10px;-webkit-transition:width .4s;transition:width .4s}
.q-count{font-size:13px;color:rgba(255,255,255,.4);width:100%;max-width:420px;text-align:right;margin-top:4px}
.q-card{width:100%;max-width:420px;background:#1c1f5a;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:22px;margin-bottom:14px}
.q-text{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600;line-height:1.5}
.q-img{width:100%;position:relative;padding-top:60%;border-radius:14px;overflow:hidden;margin-top:14px}
.q-img svg{position:absolute;top:0;left:0;width:100%;height:100%}
.opts{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:10px;width:100%;max-width:420px}
.opts>*+*{margin-top:10px}
.opt{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 16px;color:#fff;font-family:'Quicksand','Trebuchet MS',sans-serif;font-size:15px;font-weight:600;cursor:pointer;-webkit-transition:all .25s;transition:all .25s;text-align:left;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:12px}
.opt>*+*{margin-left:12px}
.opt:active:not(.dis){-webkit-transform:scale(.98);transform:scale(.98)}
.opt-l{width:32px;height:32px;min-width:32px;border-radius:9px;background:rgba(255,255,255,.1);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:15px;font-weight:600}
.opt.ok{border-color:#39FF14;background:rgba(57,255,20,.12)}.opt.ok .opt-l{background:#39FF14;color:#000}
.opt.no{border-color:#FF4444;background:rgba(255,68,68,.12)}.opt.no .opt-l{background:#FF4444;color:#fff}
.opt.dis{pointer-events:none;opacity:.45}.opt.ok.dis,.opt.no.dis{opacity:1}
.fb{width:100%;max-width:420px;border-radius:18px;padding:16px;margin-top:6px;font-size:14px;line-height:1.5;display:none;-webkit-animation:su .3s;animation:su .3s}
@-webkit-keyframes su{from{opacity:0;-webkit-transform:translateY(8px)}to{opacity:1;-webkit-transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fb.fb-ok{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.25)}
.fb.fb-no{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.25)}
.nxt{width:100%;max-width:420px;background:-webkit-linear-gradient(315deg,#B388FF,#FF1493);background:linear-gradient(135deg,#B388FF,#FF1493);border:none;border-radius:18px;padding:15px;color:#fff;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;display:none;-webkit-animation:su .3s;animation:su .3s;-webkit-transition:-webkit-transform .2s;transition:transform .2s}
.nxt:active{-webkit-transform:scale(.97);transform:scale(.97)}
#results{-webkit-box-pack:center;justify-content:center;gap:20px;text-align:center;z-index:1}
#results>*+*{margin-top:20px}
.res-emoji{font-size:72px;-webkit-animation:bob 2s ease-in-out infinite;animation:bob 2s ease-in-out infinite}
.res-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:26px;font-weight:700}
.res-score{font-size:54px;font-weight:800;font-family:'Fredoka','Trebuchet MS',sans-serif}
.res-score .tot{font-size:24px;color:rgba(255,255,255,.4)}
.res-stars{display:-webkit-box;display:flex;gap:6px;font-size:36px}
.res-stars>*+*{margin-left:6px}
.res-stars span{-webkit-animation:pop .3s ease backwards;animation:pop .3s ease backwards}
@-webkit-keyframes pop{from{-webkit-transform:scale(0)}to{-webkit-transform:scale(1)}}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.res-msg{font-size:15px;color:rgba(255,255,255,.5);max-width:280px;line-height:1.5}
.res-btns{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:10px;width:100%;max-width:320px}
.res-btns>*+*{margin-top:10px}
.btn-retry,.btn-home{border:none;border-radius:18px;padding:15px;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:17px;font-weight:600;cursor:pointer;-webkit-transition:all .2s;transition:all .2s}
.btn-retry{background:-webkit-linear-gradient(315deg,#00E5FF,#39FF14);background:linear-gradient(135deg,#00E5FF,#39FF14);color:#000}
.btn-home{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);color:#fff}
.btn-retry:active,.btn-home:active{-webkit-transform:scale(.97);transform:scale(.97)}
.confetti-c{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden}
.conf{position:absolute;top:-20px;-webkit-animation:cfall 3s linear forwards;animation:cfall 3s linear forwards}
@-webkit-keyframes cfall{0%{-webkit-transform:translateY(0) rotate(0);opacity:1}100%{-webkit-transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* === LOGIN === */
#loginScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#0B0E2D,#141852,#1B1F6A);z-index:200;display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;gap:20px;padding:20px;text-align:center}
#loginScreen>*+*{margin-top:20px}
#loginScreen.hidden{display:none}
.login-lock{font-size:64px;-webkit-animation:bob 3s ease-in-out infinite;animation:bob 3s ease-in-out infinite}
.login-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:24px;font-weight:700;background:-webkit-linear-gradient(left,#FFD93D,#00E5FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:linear-gradient(90deg,#FFD93D,#00E5FF);background-clip:text;color:#FFD93D}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);margin-top:-12px}
.login-form{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:12px;width:100%;max-width:300px}
.login-form>*+*{margin-top:12px}
.login-input{width:100%;padding:14px 18px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:#1c1f5a;color:#fff;font-family:'Quicksand','Trebuchet MS',sans-serif;font-size:16px;font-weight:600;outline:none;-webkit-transition:border-color .2s;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.login-input:focus{border-color:rgba(0,229,255,.5)}
.login-input::-webkit-input-placeholder{color:rgba(255,255,255,.25)}
.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;background:-webkit-linear-gradient(315deg,#FFD93D,#FF6B35);background:linear-gradient(135deg,#FFD93D,#FF6B35);color:#000;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600;cursor:pointer;-webkit-transition:all .2s;transition:all .2s;box-shadow:0 8px 25px rgba(255,107,53,.3)}
.login-btn:active{-webkit-transform:scale(.97);transform:scale(.97)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;-webkit-transform:none;transform:none}
.login-error{font-size:13px;color:#FF4444;min-height:20px;-webkit-transition:opacity .2s;transition:opacity .2s}
.login-lockout{font-size:13px;color:#FF6B35;min-height:20px}
.login-attempts{font-size:11px;color:rgba(255,255,255,.25);min-height:16px}
.login-dedication{font-size:11px;color:rgba(255,255,255,.3);font-style:italic;margin-top:10px}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-lock">🔐</div>
  <div class="login-title">Study Quiz</div>
  <div class="login-sub">Enter your credentials to start</div>
  <div class="login-form">
    <input class="login-input" type="text" id="loginUser" placeholder="👤 Username" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <input class="login-input" type="password" id="loginPass" placeholder="🔑 Password">
    <button class="login-btn" id="loginBtn" onclick="tryLogin()">Enter →</button>
  </div>
  <div class="login-error" id="loginError"></div>
  <div class="login-attempts" id="loginAttempts"></div>
  <div class="login-dedication">Study Quiz for Benício, with love, from Daddy. ❤️</div>
</div>
<div id="appWrapper" style="display:none">
<div class="particles" id="particles"></div>
<div class="dedication">Study Quiz for Benício, with love, from Daddy. ❤️</div>
<div class="screen active" id="home">
  <div class="logo">📚</div>
  <div class="home-title">Study Quiz</div>
  <div class="home-sub">Benício's Exam Prep · Y3</div>
  <div class="exam-list" id="examList"></div>
</div>
<div class="screen" id="topics">
  <div class="hdr"><button class="hdr-back" onclick="go('home')">←</button><div class="hdr-title" id="topicsTitle"></div><div class="hdr-badge" id="topicsBadge"></div></div>
  <div class="topic-grid" id="topicGrid"></div>
  <div class="study-ref" id="studyRef"></div>
</div>
<div class="screen" id="lesson">
  <div class="hdr"><button class="hdr-back" onclick="go('topics')">←</button><div class="hdr-title" id="lessonTitle"></div></div>
  <div class="lesson-wrap"><div class="lesson-illus" id="lessonIllus"></div><div class="lesson-body" id="lessonBody"></div></div>
  <button class="quiz-start" id="quizStartBtn" onclick="startQuiz()">🎮 Start Quiz!</button>
</div>
<div class="screen" id="quiz">
  <div class="hdr"><button class="hdr-back" onclick="go('topics')">←</button><div class="hdr-title" id="quizHdrTitle"></div></div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="q-count" id="qCount"></div>
  <div class="q-card"><div class="q-text" id="qText"></div><div class="q-img" id="qImg"></div></div>
  <div class="opts" id="optsList"></div>
  <div class="fb" id="fb"></div>
  <button class="nxt" id="nxtBtn" onclick="nextQ()"></button>
</div>
<div class="screen" id="results">
  <div class="res-emoji" id="resEmoji"></div>
  <div class="res-title" id="resTitle"></div>
  <div class="res-score" id="resScore"></div>
  <div class="res-stars" id="resStars"></div>
  <div class="res-msg" id="resMsg"></div>
  <div class="res-btns"><button class="btn-retry" id="btnRetry" onclick="startQuiz()"></button><button class="btn-home" onclick="go('home')">🏠 Back to Exams</button></div>
</div>

<script>
// ===================== SVG BUILDER HELPERS =====================
function S(w,h,bg,content){return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><defs><filter id="gl"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="${w}" height="${h}" rx="14" fill="${bg}"/>${content}</svg>`}
const W=500,H=300;

// ===================== QUESTION ILLUSTRATIONS (per question) =====================
const QI = {
  // === SCIENCE: REFLECTION ===
  sci_refl_0: ()=>S(W,H,'#0d1b2a',`
    <rect x="230" y="50" width="16" height="200" rx="3" fill="#a8d8ea" opacity=".8"/>
    <circle cx="80" cy="100" r="30" fill="#FFD93D" filter="url(#gl)"/>

  {id:'math',date:'27/04',day:'Monday',lang:'en',name:'Math Test',icon:'🧮',css:'c-math',badge:'English',
    ref:'<p>📖 Prime Math: pp.20-31 (Add), 37-42 (Sub), 44+ (problems), 123&125 (Graphs), 130-134 (m&cm)</p>',

      {id:'math_ops',icon:'➕',name:'Addition & Subtraction',desc:'With and without regrouping',illus:'generic',
        lesson:`<h3>Addition & Subtraction</h3><p><span class="hl">Regrouping:</span> carry when digits add to >9. 48+36 → 8+6=14, write 4 carry 1!</p><p><span class="hl">Subtraction:</span> borrow when needed. 72−45 → borrow to make 12−5=7.</p><p>📌 "altogether?" = add. "left?" = subtract.</p>`,

      {id:'math_meas',icon:'📏',name:'Measurement',desc:'Meters and centimeters',illus:'generic',
        lesson:`<h3>Meters & Centimeters</h3><p>1 meter = 100 cm. Rulers for small, tape for big.</p><p>📌 Start at zero on the ruler!</p>`,

        lesson:`<h3>Graphs & Statistics</h3><p>Bar graph: taller = bigger. Pictograph: pictures = data.</p><p>📌 Read title and labels first!</p>`,

          {q:'If each 🍎 = 3 votes and there are 4 apples, how many votes?',opts:['4','7','12','15'],correct:2,fb:'4×3=12 votes!',img:'math_graph_2'},

          {q:'A bar graph is best for:',opts:['Stories','Comparing amounts','Drawing','Measuring'],correct:1,fb:'Bar graphs compare amounts!',img:'math_graph_4'}

  {id:'historia',date:'16/04',day:'Quinta',lang:'pt',name:'História e Geografia',icon:'🌍',css:'c-historia',badge:'Português',
    ref:'<p>📓 Caderno de História e Geografia</p><p>📖 My Projects · pp.35-37</p>',
    topics:[
      {id:'hist_cult',icon:'🎭',name:'Cultura e Diversidade',desc:'Influências indígenas, africanas, portuguesas e italianas',illus:'generic',
        lesson:`<h3>Herança Brasileira — Quem contribuiu?</h3><p>🏹 <span class="hl">Indígenas:</span> mandioca, milho, tapioca, pipoca, rede de dormir, tomar banho todos os dias, andar descalço, brincar de peteca, cesto de palha. Palavras: abacaxi, tatu, jacaré, Iguaçu, Pará.</p><p>🌍 <span class="hl">Africanos:</span> capoeira, samba, congada, maracatu, reisado. Instrumentos: berimbau, agogô, reco-reco, atabaque. Comidas: acarajé, vatapá, inhame, feijoada. Palavras: caçula, dengo, batuque.</p><p>⛵ <span class="hl">Portugueses:</span> língua portuguesa, azulejos, festas juninas, bacalhau, religião católica.</p><p>🇮🇹 <span class="hl">Italianos:</span> macarrão e outras comidas!</p><p>📌 A <span class="hl">diversidade cultural</span> é a mistura dessas influências que faz o Brasil um país tão rico e especial!</p>`,
        quiz:[
          {q:'A mandioca, o milho e a tapioca são heranças de qual povo?',opts:['Portugueses','Africanos','Indígenas','Italianos'],correct:2,fb:'Os povos indígenas nos deram mandioca, milho, tapioca, pipoca e muito mais!',img:'hist_cult_0'},
          {q:'A capoeira tem origem:',opts:['Indígena','Africana','Portuguesa','Italiana'],correct:1,fb:'A capoeira foi criada pelos africanos no Brasil!',img:'hist_cult_1'},
          {q:'O azulejo é uma contribuição de qual povo?',opts:['Indígenas','Africanos','Portugueses','Italianos'],correct:2,fb:'Os azulejos decorativos são uma herança portuguesa!',img:'hist_cult_2'},
          {q:'O berimbau, o agogô e o atabaque são instrumentos de origem:',opts:['Indígena','Africana','Portuguesa','Italiana'],correct:1,fb:'São instrumentos musicais de herança africana!',img:'hist_cult_4'},
          {q:'O macarrão é contribuição de qual povo?',opts:['Indígena','Africano','Português','Italiano'],correct:3,fb:'O macarrão veio dos italianos para a cultura brasileira!',img:'hist_cult_3'},
          {q:'Tomar banho todos os dias e dormir em redes são hábitos herdados dos:',opts:['Portugueses','Africanos','Indígenas','Italianos'],correct:2,fb:'Os indígenas já tomavam banho diariamente e dormiam em redes!',img:'hist_cult_0'},
          {q:'O que é diversidade cultural?',opts:['Todos são iguais','Diferentes culturas contribuindo juntas','Só uma cultura existe','Não ter cultura'],correct:1,fb:'Diversidade = diferentes culturas juntas fazem o Brasil rico!',img:'hist_cult_3'}
        ]}
    ]},

  {id:'social',date:'15/04',day:'Wednesday',lang:'en',name:'Social Studies',icon:'🗺️',css:'c-social',badge:'English',
    ref:'<p>📓 Social Studies notebook</p><p>📖 Cornerstone pp.6-7 — Kids\' Stories from around the World</p>',
    topics:[
      {id:'soc_cult',icon:'🌎',name:'Cultures & Traditions',desc:'Kids\' stories from around the world, different communities',illus:'generic',
        lesson:`<h3>Cultures & Traditions — Kids Around the World</h3><p><span class="hl">Culture</span> = how people live: food, music, clothes, language, celebrations!</p><p><span class="hl">Tradition</span> = something passed down from parents to children, repeated again and again.</p><p>📌 <span class="hl">Kids\' Stories:</span></p><p>🇺🇸 <span class="hl">Chris</span> lives in a suburb near a big city in Illinois, USA. He takes a yellow bus to school. Kids play outside in the afternoon.</p><p>🇨🇱 <span class="hl">Lucia</span> lives in a small town in the Andes mountains in Chile. Her school is 30 miles away!</p><p>🇨🇳 <span class="hl">Gen</span> lives in Shanghai, China in a tall apartment building. The city is busy in the morning.</p><p>🇿🇦 <span class="hl">Mandisa</span> lives on a farm in South Africa. Kids get together to walk to school. They grow strawberries.</p><p>📌 Different places, different lives — but all kids go to school, play, and have families! Respect all cultures. 🌈</p>`,
        quiz:[
          {q:'What is a "culture"?',opts:['A food type','How a group of people live','A country name','A kind of music'],correct:1,fb:'Culture = food + music + clothes + language + celebrations!',img:'soc_cult_0'},
          {q:'Where does Chris live?',opts:['A farm in Africa','A suburb in Illinois, USA','Mountains in Chile','A city in China'],correct:1,fb:'Chris lives in a suburb near a big city in Illinois!',img:'soc_cult_1'},
          {q:'What is special about Lucia\'s school?',opts:['It is very big','It is 30 miles away in another town','It is on a farm','It is in a tall building'],correct:1,fb:'Lucia lives in the Andes in Chile and her school is 30 miles away!',img:'soc_cult_2'},
          {q:'Where does Gen live?',opts:['A farm','A small town','A tall apartment in Shanghai, China','A suburb'],correct:2,fb:'Gen lives in a tall apartment building in Shanghai, China!',img:'soc_cult_3'},
          {q:'What does Mandisa\'s family grow on their farm?',opts:['Rice','Corn','Strawberries','Wheat'],correct:2,fb:'Mandisa\'s family grows strawberries on their farm in South Africa!',img:'soc_cult_4'},
          {q:'What do all these kids have in common?',opts:['They all live in cities','They all go to school','They all live on farms','They all speak English'],correct:1,fb:'Different places, but all kids go to school, play, and have families!',img:'soc_cult_0'},
          {q:'How should we treat cultures different from ours?',opts:['Ignore them','Make fun','Respect them','Be afraid'],correct:2,fb:'Respect differences — they make the world beautiful!',img:'soc_cult_3'}
        ]}
    ]},

  {id:'ciencias_som',date:'14/04',day:'Terça',lang:'pt',name:'Ciências — Som',icon:'🔊',css:'c-ciencias',badge:'Português',
    ref:'<p>📖 My Projects · pp.95, 96, 99, 100</p><p>📓 Caderno</p>',
    topics:[
      {id:'som',icon:'🔊',name:'O Som',desc:'Vibração, propagação, características e experiência',illus:'sound',
        lesson:`<h3>O que é o Som?</h3><p>Som é uma <span class="hl">vibração</span> que chega aos nossos ouvidos por meio de ondas sonoras.</p><p>📌 <span class="hl">Características do som:</span> Altura (grave/agudo), Intensidade (forte/fraco), Duração (longo/curto) e Timbre (cada instrumento tem o seu!).</p><p>O som viaja pelo ar, pela água e por sólidos. No vácuo (espaço), NÃO tem som!</p><p>🧪 <span class="hl">Experiência:</span> Celular dentro de um pote de vidro coberto com filme PVC e grãos de arroz em cima. Quando o celular toca, o arroz pula! As vibrações do som se propagam pelo pote e transferem para os grãos. 🍚</p><p>📌 Num concerto, ouvimos sons de flautas, violino, piano, tambor, vozes e aplausos — cada um produz vibrações diferentes!</p>`,
        quiz:[
          {q:'O som é produzido quando um objeto:',opts:['Fica parado','Vibra','Derrete','Congela'],correct:1,fb:'Som = vibração!',img:'som_0'},
          {q:'O som pode viajar pelo:',opts:['Ar, água e sólidos','Só ar','Só água','Pelo vácuo'],correct:0,fb:'Ar, água e sólidos — mas não pelo vácuo!',img:'som_1'},
          {q:'Por que não há som no espaço?',opts:['Muito frio','Sem gravidade','Sem ar (vácuo)','Muito grande'],correct:2,fb:'Sem ar = sem som! O som precisa de um meio para viajar.',img:'som_2'},
          {q:'Na experiência com o celular no pote, por que o arroz pula?',opts:['O arroz está vivo','As vibrações do som se propagam pelo pote','O vento empurra','O filme esquenta'],correct:1,fb:'As vibrações do celular propagam pelo vidro e transferem para os grãos de arroz!',img:'som_4'},
          {q:'Som agudo (como um apito) tem vibrações:',opts:['Lentas','Rápidas','Paradas','Invisíveis'],correct:1,fb:'Vibrações rápidas = som agudo! Lentas = grave.',img:'som_3'},
          {q:'Quando bate num tambor, o que vibra primeiro?',opts:['O ar','A baqueta','A pele do tambor','Seu ouvido'],correct:2,fb:'A pele vibra e faz o ar vibrar, que chega ao ouvido!',img:'som_4'},
          {q:'Qual NÃO é uma característica do som?',opts:['Altura (grave/agudo)','Cor','Intensidade (forte/fraco)','Timbre'],correct:1,fb:'Cor é da luz! As características do som são: altura, intensidade, duração e timbre.',img:'som_0'}
        ]}
    ]},

  {id:'science',date:'13/04',day:'Monday',lang:'en',name:'Science — Light',icon:'💡',css:'c-science',badge:'English',
    ref:'<p>📖 Science Booklet pp.19-33</p><p>📓 Science Notebook</p>',
    topics:[
      {id:'sci_refl',icon:'🪞',name:'Reflection',desc:'Light bouncing off surfaces',illus:'reflection',
        lesson:`<h3>Reflection</h3><p>Light hits a smooth surface → <span class="hl">bounces back</span> = reflection! Like throwing a ball at a wall — it bounces back to you. 🏀</p><p>When light bounces off a shiny surface like a mirror, it <span class="hl">sends an image of yourself back to your eyes</span>.</p><p>📌 Flat mirrors give a clear image. Curved surfaces (like a <span class="hl">spoon</span>) distort the reflection — the inside of a spoon shows you upside down!</p><p>📌 Same angle in = same angle out!</p>`,
        quiz:[
          {q:'What happens when light hits a mirror?',opts:['Absorbed','Reflected','Disappears','Changes color'],correct:1,fb:'Mirrors reflect light back — that\'s why we see our reflection!',img:'sci_refl_0'},
          {q:'Which reflects light best?',opts:['Black shirt','Smooth mirror','Wood','Eraser'],correct:1,fb:'Smooth + shiny = best reflection!',img:'sci_refl_1'},
          {q:'Reflection is like throwing a ball at a wall because:',opts:['The ball melts','The ball bounces back','The ball disappears','The wall breaks'],correct:1,fb:'Light bounces back just like a ball off a wall!',img:'sci_refl_2'},
          {q:'When you look at the INSIDE of a spoon, your reflection is:',opts:['Normal','Upside down','Invisible','Colored'],correct:1,fb:'The curved inside surface flips your image upside down!',img:'sci_refl_3'},
          {q:'Light reflects at the ___ angle it arrived.',opts:['A bigger','A smaller','The same','A random'],correct:2,fb:'Same angle in = same angle out!',img:'sci_refl_4'}
        ]},
      {id:'sci_refr',icon:'🌈',name:'Refraction',desc:'Light bending between materials',illus:'refraction',
        lesson:`<h3>Refraction</h3><p>Refraction is the <span class="hl">bending of light</span> as it passes from one transparent material to another — like from air into water or glass.</p><p>Light changes speed in different materials, so it <span class="hl">changes direction</span>. A straw in water looks broken because of this! 🥤</p><p>📌 That\'s also why you might miss a fish when spearfishing — the fish isn\'t exactly where it looks!</p><p>📌 Examples: rainbows, eyeglasses, magnifying glasses.</p>`,
        quiz:[
          {q:'Refraction is the ___ of light.',opts:['Bouncing','Bending','Breaking','Blocking'],correct:1,fb:'Refraction = bending of light between materials!',img:'sci_refr_0'},
          {q:'Why does a straw look broken in water?',opts:['Straw bends','Light refracts in water','Glass is curved','Magic'],correct:1,fb:'Light changes speed entering water, bending the image!',img:'sci_refr_1'},
          {q:'A rainbow is an example of:',opts:['Absorption','Reflection','Refraction','Shadow'],correct:2,fb:'Sunlight refracts through raindrops and splits into colors!',img:'sci_refr_2'},
          {q:'Why might you miss a fish when spearfishing?',opts:['Fish is too fast','Refraction makes the fish look in a different spot','Water is dark','Fish hides'],correct:1,fb:'Refraction bends the light, so the fish isn\'t where it appears!',img:'sci_refr_3'},
          {q:'Refraction happens because light changes:',opts:['Color only','Speed between materials','Weight','Temperature'],correct:1,fb:'Speed change → direction change → bending!',img:'sci_refr_4'}
        ]},
      {id:'sci_abs',icon:'🖤',name:'Absorption',desc:'Objects absorbing light → heat',illus:'absorption',
        lesson:`<h3>Absorption</h3><p>When light hits an object and <span class="hl">doesn\'t come back</span>, it\'s been absorbed! The object turns light into heat. 🌡️</p><p>Black absorbs most light. White reflects most light.</p><p>📌 A red apple absorbs all colors except red — that\'s the only color that bounces to your eyes! 🍎</p>`,
        quiz:[
          {q:'When an object absorbs light, it:',opts:['Glows','Heats up','Becomes transparent','Reflects all'],correct:1,fb:'Absorbed light → heat!',img:'sci_abs_0'},
          {q:'Why do black clothes get hotter?',opts:['Heavier','Absorb more light','Reflect more','Different fabric'],correct:1,fb:'Black absorbs almost all light!',img:'sci_abs_1'},
          {q:'A red apple absorbs which colors?',opts:['Only red','All except red','None','Only green'],correct:1,fb:'Absorbs all, reflects only red to our eyes!',img:'sci_abs_2'},
          {q:'Which color stays coolest?',opts:['Black','Dark blue','White','Brown'],correct:2,fb:'White reflects most light, absorbing less heat!',img:'sci_abs_3'},
          {q:'Solar panels work because of:',opts:['Reflection','Refraction','Absorption','Transparency'],correct:2,fb:'Absorb sunlight → turn into electricity!',img:'sci_abs_4'}
        ]},
      {id:'sci_trans',icon:'🔍',name:'Transparent, Translucent & Opaque',desc:'How light passes through materials',illus:'transparent',
        lesson:`<h3>Transparent, Translucent & Opaque</h3><p><span class="hl">Transparent:</span> ALL light passes through — you can see clearly! Examples: glass beaker, clear glass bottle, plastic wrap. 🪟</p><p><span class="hl">Translucent:</span> SOME light passes through, things look blurry. Examples: thin plastic bag, frosted glass, vegetable oil. 🧊</p><p><span class="hl">Opaque:</span> NO light passes through! Examples: wooden table, brick wall, trainers, a penguin! 🧱</p><p>📌 Opaque objects make <span class="hl">shadows</span> because they block light!</p>`,
        quiz:[
          {q:'A clear glass bottle is:',opts:['Opaque','Translucent','Transparent','Absorbent'],correct:2,fb:'Clear glass = transparent — all light passes through!',img:'sci_trans_0'},
          {q:'A thin plastic carrier bag is:',opts:['Transparent','Translucent','Opaque','Reflective'],correct:1,fb:'Some light passes through a plastic bag but things look blurry = translucent!',img:'sci_trans_1'},

// ===================== STATE =====================
let curExam=null,curTopic=null,curQuiz=[],qIdx=0,score=0;
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

// ===================== HOME =====================
function renderHome(){
  const list=document.getElementById('examList');
  const sorted=[...EXAMS].sort((a,b)=>{const[da,ma]=a.date.split('/').map(Number);const[db,mb]=b.date.split('/').map(Number);return(ma*100+da)-(mb*100+db)});
  list.innerHTML=sorted.map(e=>`<div class="exam-card ${e.css}" onclick="openExam('${e.id}')"><div class="exam-icon">${e.icon}</div><div class="exam-info"><div class="exam-name">${e.name}</div><div class="exam-meta"><span class="tag">📅 ${e.date} · ${e.day}</span><span class="tag">${e.badge==='English'?'🇺🇸':'🇧🇷'} ${e.badge}</span></div></div><div class="exam-arrow">›</div></div>`).join('')}

// ===================== TOPICS =====================
function openExam(id){
  curExam=EXAMS.find(e=>e.id===id);
  document.getElementById('topicsTitle').textContent=curExam.name;
  document.getElementById('topicsBadge').textContent=`${curExam.lang==='en'?'🇺🇸':'🇧🇷'} ${curExam.badge} · 📅 ${curExam.date}`;
  const c=['var(--cyan)','var(--orange)','var(--pink)','var(--green)'];
  document.getElementById('topicGrid').innerHTML=curExam.topics.map((t,i)=>`<div class="topic-card" onclick="openTopic('${t.id}')"><div class="topic-icon">${t.icon}</div><div class="topic-name">${t.name}</div><div class="topic-desc">${t.desc}</div></div>`).join('');
  document.getElementById('studyRef').innerHTML=`<div class="study-ref-title">📚 ${curExam.lang==='pt'?'Instrumentos de Estudo':'Study Tools'}</div>${curExam.ref}`;
  go('topics')}

function openTopic(id){
  curTopic=curExam.topics.find(t=>t.id===id);
  document.getElementById('lessonTitle').textContent=curTopic.name;
  document.getElementById('lessonIllus').innerHTML=LILLUS[curTopic.illus]||LILLUS.generic;
  document.getElementById('lessonBody').innerHTML=curTopic.lesson;
  document.getElementById('quizStartBtn').textContent=curExam.lang==='pt'?'🎮 Começar o Quiz!':'🎮 Start the Quiz!';
  go('lesson')}

// ===================== QUIZ =====================
function startQuiz(){curQuiz=[...curTopic.quiz].sort(()=>Math.random()-.5);qIdx=0;score=0;document.getElementById('quizHdrTitle').textContent=curTopic.icon+' Quiz';go('quiz');renderQ()}

function renderQ(){
  const q=curQuiz[qIdx],total=curQuiz.length,pt=curExam.lang==='pt';
  document.getElementById('progFill').style.width=(qIdx/total*100)+'%';
  document.getElementById('qCount').textContent=`${qIdx+1} ${pt?'de':'of'} ${total}`;
  document.getElementById('qText').textContent=q.q;
  const imgEl=document.getElementById('qImg');
  if(q.img&&QI[q.img]){imgEl.innerHTML=QI[q.img]();imgEl.style.display='block'}else{imgEl.style.display='none'}
  const L=['A','B','C','D'];
  document.getElementById('optsList').innerHTML=q.opts.map((o,i)=>`<button class="opt" onclick="check(${i})"><span class="opt-l">${L[i]}</span><span>${o}</span></button>`).join('');
  document.getElementById('fb').style.display='none';document.getElementById('fb').className='fb';document.getElementById('nxtBtn').style.display='none'}

function check(sel){
  const q=curQuiz[qIdx],pt=curExam.lang==='pt';
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('dis');if(i===q.correct)b.classList.add('ok');if(i===sel&&sel!==q.correct)b.classList.add('no')});
  const fb=document.getElementById('fb');
  if(sel===q.correct){score++;fb.className='fb fb-ok';fb.innerHTML=`${pt?'✅ Correto!':'✅ Correct!'} ${q.fb}`}
  else{fb.className='fb fb-no';fb.innerHTML=`${pt?'❌ Ops! Resposta: ':'❌ Oops! Answer: '}<strong>${q.opts[q.correct]}</strong><br>${q.fb}`}
  fb.style.display='block';
  const n=document.getElementById('nxtBtn');n.style.display='block';n.textContent=qIdx<curQuiz.length-1?(pt?'Próxima →':'Next →'):(pt?'🏆 Ver resultado':'🏆 See results')}

function nextQ(){qIdx++;if(qIdx<curQuiz.length)renderQ();else showResults()}

function showResults(){
  const pt=curExam.lang==='pt',total=curQuiz.length,pct=score/total;
  const tier=pct<.3?0:pct<.5?1:pct<.7?2:pct<1?3:4;
  go('results');
  document.getElementById('resEmoji').textContent=['😅','🤔','😊','🤩','🏆'][tier];
  document.getElementById('resTitle').textContent=(pt?['Tente de novo!','Quase lá!','Muito bom!','Excelente!','Perfeito! 🎉']:['Try again!','Almost there!','Very good!','Excellent!','Perfect! 🎉'])[tier];
  document.getElementById('resScore').innerHTML=`${score} <span class="tot">/ ${total}</span>`;
  document.getElementById('resMsg').textContent=(pt?['Continue estudando!','No caminho certo!','Parabéns!','Incrível!','Você é demais! ⭐']:['Keep studying!','On the right track!','Great job!','Amazing!','You\'re a genius! ⭐'])[tier];
  const sc=Math.ceil(pct*5);
  document.getElementById('resStars').innerHTML=Array.from({length:5},(_,i)=>`<span style="animation-delay:${i*.12}s;opacity:${i<sc?1:.2}">${i<sc?'⭐':'☆'}</span>`).join('');
  document.getElementById('btnRetry').textContent=pt?'🔄 Tentar de novo':'🔄 Try again';
  document.getElementById('progFill').style.width='100%';
  if(pct>=.7)confetti()}

function confetti(){var c=document.createElement('div');c.className='confetti-c';document.body.appendChild(c);var cols=['#FFD93D','#FF6B35','#FF1493','#00E5FF','#39FF14','#B388FF'];for(var i=0;i<55;i++){var p=document.createElement('div');p.className='conf';p.style.left=Math.random()*100+'%';p.style.background=cols[~~(Math.random()*cols.length)];var dur=(2+Math.random()*2)+'s';p.style.webkitAnimationDuration=dur;p.style.animationDuration=dur;p.style.webkitAnimationDelay=Math.random()*1.5+'s';p.style.animationDelay=Math.random()*1.5+'s';var s=6+Math.random()*8;p.style.width=s+'px';p.style.height=s+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p)}setTimeout(function(){c.remove()},5000)}

// BG particles
(function(){var c=document.getElementById('particles');var cols=['#FFD93D','#00E5FF','#FF1493','#39FF14','#B388FF'];for(var i=0;i<25;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';var s=4+Math.random()*10;p.style.width=s+'px';p.style.height=s+'px';p.style.background=cols[~~(Math.random()*cols.length)];var dur=(8+Math.random()*15)+'s';p.style.webkitAnimationDuration=dur;p.style.animationDuration=dur;p.style.webkitAnimationDelay=Math.random()*5+'s';p.style.animationDelay=Math.random()*5+'s';c.appendChild(p)}})();

renderHome();
</script>

<script>
// ===================== LOGIN SYSTEM =====================
var LOGIN_USER='pueri';
var LOGIN_PASS='pueri';
var MAX_ATTEMPTS=5;
var LOCKOUT_MS=3*60*1000; // 3 minutes
var failCount=0;
var lockUntil=0;
var lockTimer=null;

// Check if already authenticated this session
if(window.sessionStorage){try{if(sessionStorage.getItem('sq_auth')==='1'){unlockApp()}}catch(e){}}

// Enter key support
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter'){document.getElementById('loginPass').focus()}});
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter'){tryLogin()}});

function tryLogin(){
  var now=Date.now();
  var errEl=document.getElementById('loginError');
  var attEl=document.getElementById('loginAttempts');
  var btn=document.getElementById('loginBtn');

  // Check lockout
  if(now<lockUntil){
    var secsLeft=Math.ceil((lockUntil-now)/1000);
    errEl.textContent='🔒 Too many attempts. Wait '+secsLeft+'s';
    return;
  }

  var user=document.getElementById('loginUser').value.trim().toLowerCase();
  var pass=document.getElementById('loginPass').value;

  if(user===LOGIN_USER && pass===LOGIN_PASS){
    // Success
    failCount=0;
    if(window.sessionStorage){try{sessionStorage.setItem('sq_auth','1')}catch(e){}}
    unlockApp();
  } else {
    // Fail
    failCount++;
    var remaining=MAX_ATTEMPTS-failCount;

    if(failCount>=MAX_ATTEMPTS){
      lockUntil=now+LOCKOUT_MS;
      errEl.textContent='🔒 Blocked! Too many wrong attempts.';
      attEl.textContent='Try again in 3 minutes';
      btn.disabled=true;
      document.getElementById('loginUser').disabled=true;
      document.getElementById('loginPass').disabled=true;

      // Countdown timer
      if(lockTimer)clearInterval(lockTimer);
      lockTimer=setInterval(function(){
        var left=Math.ceil((lockUntil-Date.now())/1000);
        if(left<=0){
          clearInterval(lockTimer);
          lockTimer=null;
          failCount=0;
          btn.disabled=false;
          document.getElementById('loginUser').disabled=false;
          document.getElementById('loginPass').disabled=false;
          errEl.textContent='';
          attEl.textContent='You can try again now!';
        } else {
          var m=Math.floor(left/60);
          var s=left%60;
          attEl.textContent='⏳ Wait '+m+':'+(s<10?'0':'')+s;
        }
      },1000);
    } else {
      errEl.textContent='❌ Wrong username or password';
      attEl.textContent=remaining+' attempt'+(remaining!==1?'s':'')+' left';
    }

    // Shake animation
    var form=document.querySelector('.login-form');
    form.style.animation='none';
    form.offsetHeight; // trigger reflow
    form.style.webkitAnimation='shake .4s ease';
    form.style.animation='shake .4s ease';

    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  }
}

function unlockApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appWrapper').style.display='block';
}

// Add shake keyframes dynamically (WebView safe)
var shakeStyle=document.createElement('style');
shakeStyle.textContent='@-webkit-keyframes shake{0%,100%{-webkit-transform:translateX(0)}20%{-webkit-transform:translateX(-12px)}40%{-webkit-transform:translateX(12px)}60%{-webkit-transform:translateX(-8px)}80%{-webkit-transform:translateX(8px)}}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}';
document.head.appendChild(shakeStyle);
</script>
