<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Benício's Study Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
:root{--bg1:#0B0E2D;--bg2:#141852;--bg3:#1B1F6A;--yellow:#FFD93D;--orange:#FF6B35;--pink:#FF1493;--cyan:#00E5FF;--green:#39FF14;--purple:#B388FF;--red:#FF4444;--card:rgba(255,255,255,0.06);--card-solid:#1c1f5a;--border:rgba(255,255,255,0.1);--r:18px}
html{height:100%;-webkit-overflow-scrolling:touch}
body{font-family:'Quicksand','Trebuchet MS',Verdana,sans-serif;background:linear-gradient(160deg,#0B0E2D,#141852,#1B1F6A);background-attachment:fixed;color:#fff;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh;padding:20px;padding-top:36px;padding-top:calc(36px + env(safe-area-inset-top,0px));padding-bottom:80px;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));position:relative;-webkit-box-orient:vertical;-webkit-box-direction:normal;flex-direction:column;-webkit-box-align:center;align-items:center}
.screen.active{display:-webkit-box;display:flex}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;-webkit-animation:drift 12s linear infinite;animation:drift 12s linear infinite;opacity:.15}
@-webkit-keyframes drift{0%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}25%{-webkit-transform:translateY(-30px) translateX(15px);transform:translateY(-30px) translateX(15px)}50%{-webkit-transform:translateY(0) translateX(30px);transform:translateY(0) translateX(30px)}75%{-webkit-transform:translateY(30px) translateX(15px);transform:translateY(30px) translateX(15px)}100%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}}
@keyframes drift{0%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}25%{-webkit-transform:translateY(-30px) translateX(15px);transform:translateY(-30px) translateX(15px)}50%{-webkit-transform:translateY(0) translateX(30px);transform:translateY(0) translateX(30px)}75%{-webkit-transform:translateY(30px) translateX(15px);transform:translateY(30px) translateX(15px)}100%{-webkit-transform:translateY(0) translateX(0);transform:translateY(0) translateX(0)}}
.hdr{width:100%;max-width:420px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:12px;z-index:1;margin-bottom:16px;-webkit-flex-shrink:0;flex-shrink:0}
.hdr>*+*{margin-left:12px}
.hdr-back{width:42px;height:42px;background:#1c1f5a;border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;font-size:18px;cursor:pointer;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-transition:all .2s;transition:all .2s}
.hdr-back:active{-webkit-transform:scale(.93);transform:scale(.93)}
.hdr-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:20px;font-weight:700;-webkit-box-flex:1;flex:1}
.hdr-badge{font-size:11px;background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px;color:rgba(255,255,255,.5);white-space:nowrap}
#home{-webkit-box-pack:center;justify-content:center;gap:24px;text-align:center;z-index:1}
#home>*+*{margin-top:24px}
.logo{width:100px;height:100px;background:-webkit-linear-gradient(315deg,#FFD93D,#FF6B35);background:linear-gradient(135deg,#FFD93D,#FF6B35);border-radius:28px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-size:52px;box-shadow:0 12px 40px rgba(255,107,53,.35);-webkit-animation:bob 3s ease-in-out infinite;animation:bob 3s ease-in-out infinite}
@-webkit-keyframes bob{0%,100%{-webkit-transform:translateY(0) rotate(0);transform:translateY(0) rotate(0)}50%{-webkit-transform:translateY(-8px) rotate(2deg);transform:translateY(-8px) rotate(2deg)}}
@keyframes bob{0%,100%{-webkit-transform:translateY(0) rotate(0);transform:translateY(0) rotate(0)}50%{-webkit-transform:translateY(-8px) rotate(2deg);transform:translateY(-8px) rotate(2deg)}}
.home-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:30px;font-weight:700;background:-webkit-linear-gradient(left,#FFD93D,#00E5FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:linear-gradient(90deg,#FFD93D,#00E5FF);background-clip:text;color:#FFD93D}
.home-sub{color:rgba(255,255,255,.5);font-size:14px;margin-top:-16px}
.exam-list{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:12px;width:100%;max-width:420px}
.exam-list>*+*{margin-top:12px}
.exam-card{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 18px;cursor:pointer;-webkit-transition:all .25s;transition:all .25s;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:14px;position:relative;overflow:hidden;text-align:left}
.exam-card>*+*{margin-left:14px}
.exam-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
.exam-card:active{-webkit-transform:scale(.98);transform:scale(.98);border-color:rgba(255,255,255,.2)}
.exam-icon{font-size:32px;min-width:40px;text-align:center}
.exam-info{-webkit-box-flex:1;flex:1}
.exam-name{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:17px;font-weight:600}
.exam-meta{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;display:-webkit-box;display:flex;gap:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap}
.exam-meta>*+*{margin-left:8px}
.exam-meta .tag{background:rgba(255,255,255,.08);padding:2px 8px;border-radius:8px;display:inline-block}
.exam-arrow{font-size:16px;color:rgba(255,255,255,.3)}
.dedication{position:fixed;top:0;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.65);font-style:italic;pointer-events:none;z-index:50;letter-spacing:.3px;padding:7px 16px;padding-top:calc(7px + env(safe-area-inset-top,0px));background:rgba(11,14,45,.9);border-bottom:1px solid rgba(255,255,255,.08)}
.c-science::before{background:-webkit-linear-gradient(#00E5FF,#39FF14);background:linear-gradient(#00E5FF,#39FF14)}
.c-ciencias::before{background:-webkit-linear-gradient(#39FF14,#FFD93D);background:linear-gradient(#39FF14,#FFD93D)}
.c-social::before{background:-webkit-linear-gradient(#FF6B35,#FFD93D);background:linear-gradient(#FF6B35,#FFD93D)}
.c-historia::before{background:-webkit-linear-gradient(#FF1493,#FF6B35);background:linear-gradient(#FF1493,#FF6B35)}
.c-portugues::before{background:-webkit-linear-gradient(#B388FF,#FF1493);background:linear-gradient(#B388FF,#FF1493)}
.c-math::before{background:-webkit-linear-gradient(#00E5FF,#B388FF);background:linear-gradient(#00E5FF,#B388FF)}
.c-matematica::before{background:-webkit-linear-gradient(#FFD93D,#FF6B35);background:linear-gradient(#FFD93D,#FF6B35)}
.c-langarts::before{background:-webkit-linear-gradient(#00E5FF,#FFD93D);background:linear-gradient(#00E5FF,#FFD93D)}
#topics{z-index:1}
.topic-grid{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:12px;width:100%;max-width:420px}
.topic-grid>*+*{margin-top:12px}
.topic-card{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);border-radius:18px;padding:18px;cursor:pointer;-webkit-transition:all .25s;transition:all .25s;position:relative;overflow:hidden}
.topic-card:active{-webkit-transform:scale(.98);transform:scale(.98)}
.topic-icon{font-size:34px;margin-bottom:8px}
.topic-name{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600}
.topic-desc{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;line-height:1.4}
.study-ref{width:100%;max-width:420px;background:rgba(255,217,61,.08);border:1px solid rgba(255,217,61,.2);border-radius:18px;padding:16px;margin-top:8px}
.study-ref-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:15px;color:#FFD93D;margin-bottom:8px}
.study-ref p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6}
#lesson{z-index:1}
.lesson-wrap{width:100%;max-width:420px}
.lesson-illus{width:100%;position:relative;padding-top:62.5%;border-radius:18px;overflow:hidden;margin-bottom:18px}
.lesson-illus svg{position:absolute;top:0;left:0;width:100%;height:100%}
.lesson-body{background:#1c1f5a;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:20px;line-height:1.75;font-size:15px}
.lesson-body h3{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:20px;margin-bottom:10px}
.lesson-body p{margin-bottom:10px;color:rgba(255,255,255,.7)}
.hl{color:#FFD93D;font-weight:700}
.quiz-start{width:100%;max-width:420px;background:-webkit-linear-gradient(315deg,#00E5FF,#B388FF);background:linear-gradient(135deg,#00E5FF,#B388FF);border:none;border-radius:18px;padding:16px;color:#fff;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600;cursor:pointer;margin-top:14px;box-shadow:0 8px 25px rgba(0,229,255,.25);-webkit-transition:-webkit-transform .2s;transition:transform .2s}
.quiz-start:active{-webkit-transform:scale(.97);transform:scale(.97)}
#quiz{z-index:1}
.prog-bar{width:100%;max-width:420px;height:7px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:-webkit-linear-gradient(left,#00E5FF,#39FF14);background:linear-gradient(90deg,#00E5FF,#39FF14);border-radius:10px;-webkit-transition:width .4s;transition:width .4s}
.q-count{font-size:13px;color:rgba(255,255,255,.4);width:100%;max-width:420px;text-align:right;margin-top:4px}
.q-card{width:100%;max-width:420px;background:#1c1f5a;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:22px;margin-bottom:14px}
.q-text{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600;line-height:1.5}
.q-img{width:100%;position:relative;padding-top:60%;border-radius:14px;overflow:hidden;margin-top:14px}
.q-img svg{position:absolute;top:0;left:0;width:100%;height:100%}
.opts{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:10px;width:100%;max-width:420px}
.opts>*+*{margin-top:10px}
.opt{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 16px;color:#fff;font-family:'Quicksand','Trebuchet MS',sans-serif;font-size:15px;font-weight:600;cursor:pointer;-webkit-transition:all .25s;transition:all .25s;text-align:left;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:12px}
.opt>*+*{margin-left:12px}
.opt:active:not(.dis){-webkit-transform:scale(.98);transform:scale(.98)}
.opt-l{width:32px;height:32px;min-width:32px;border-radius:9px;background:rgba(255,255,255,.1);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:15px;font-weight:600}
.opt.ok{border-color:#39FF14;background:rgba(57,255,20,.12)}.opt.ok .opt-l{background:#39FF14;color:#000}
.opt.no{border-color:#FF4444;background:rgba(255,68,68,.12)}.opt.no .opt-l{background:#FF4444;color:#fff}
.opt.dis{pointer-events:none;opacity:.45}.opt.ok.dis,.opt.no.dis{opacity:1}
.fb{width:100%;max-width:420px;border-radius:18px;padding:16px;margin-top:6px;font-size:14px;line-height:1.5;display:none;-webkit-animation:su .3s;animation:su .3s}
@-webkit-keyframes su{from{opacity:0;-webkit-transform:translateY(8px)}to{opacity:1;-webkit-transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fb.fb-ok{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.25)}
.fb.fb-no{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.25)}
.nxt{width:100%;max-width:420px;background:-webkit-linear-gradient(315deg,#B388FF,#FF1493);background:linear-gradient(135deg,#B388FF,#FF1493);border:none;border-radius:18px;padding:15px;color:#fff;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;display:none;-webkit-animation:su .3s;animation:su .3s;-webkit-transition:-webkit-transform .2s;transition:transform .2s}
.nxt:active{-webkit-transform:scale(.97);transform:scale(.97)}
#results{-webkit-box-pack:center;justify-content:center;gap:20px;text-align:center;z-index:1}
#results>*+*{margin-top:20px}
.res-emoji{font-size:72px;-webkit-animation:bob 2s ease-in-out infinite;animation:bob 2s ease-in-out infinite}
.res-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:26px;font-weight:700}
.res-score{font-size:54px;font-weight:800;font-family:'Fredoka','Trebuchet MS',sans-serif}
.res-score .tot{font-size:24px;color:rgba(255,255,255,.4)}
.res-stars{display:-webkit-box;display:flex;gap:6px;font-size:36px}
.res-stars>*+*{margin-left:6px}
.res-stars span{-webkit-animation:pop .3s ease backwards;animation:pop .3s ease backwards}
@-webkit-keyframes pop{from{-webkit-transform:scale(0)}to{-webkit-transform:scale(1)}}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.res-msg{font-size:15px;color:rgba(255,255,255,.5);max-width:280px;line-height:1.5}
.res-btns{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:10px;width:100%;max-width:320px}
.res-btns>*+*{margin-top:10px}
.btn-retry,.btn-home{border:none;border-radius:18px;padding:15px;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:17px;font-weight:600;cursor:pointer;-webkit-transition:all .2s;transition:all .2s}
.btn-retry{background:-webkit-linear-gradient(315deg,#00E5FF,#39FF14);background:linear-gradient(135deg,#00E5FF,#39FF14);color:#000}
.btn-home{background:#1c1f5a;border:2px solid rgba(255,255,255,.1);color:#fff}
.btn-retry:active,.btn-home:active{-webkit-transform:scale(.97);transform:scale(.97)}
.confetti-c{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden}
.conf{position:absolute;top:-20px;-webkit-animation:cfall 3s linear forwards;animation:cfall 3s linear forwards}
@-webkit-keyframes cfall{0%{-webkit-transform:translateY(0) rotate(0);opacity:1}100%{-webkit-transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* === LOGIN === */
#loginScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#0B0E2D,#141852,#1B1F6A);z-index:200;display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;gap:20px;padding:20px;text-align:center}
#loginScreen>*+*{margin-top:20px}
#loginScreen.hidden{display:none}
.login-lock{font-size:64px;-webkit-animation:bob 3s ease-in-out infinite;animation:bob 3s ease-in-out infinite}
.login-title{font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:24px;font-weight:700;background:-webkit-linear-gradient(left,#FFD93D,#00E5FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:linear-gradient(90deg,#FFD93D,#00E5FF);background-clip:text;color:#FFD93D}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);margin-top:-12px}
.login-form{display:-webkit-box;display:flex;-webkit-box-orient:vertical;flex-direction:column;gap:12px;width:100%;max-width:300px}
.login-form>*+*{margin-top:12px}
.login-input{width:100%;padding:14px 18px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:#1c1f5a;color:#fff;font-family:'Quicksand','Trebuchet MS',sans-serif;font-size:16px;font-weight:600;outline:none;-webkit-transition:border-color .2s;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.login-input:focus{border-color:rgba(0,229,255,.5)}
.login-input::-webkit-input-placeholder{color:rgba(255,255,255,.25)}
.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;background:-webkit-linear-gradient(315deg,#FFD93D,#FF6B35);background:linear-gradient(135deg,#FFD93D,#FF6B35);color:#000;font-family:'Fredoka','Trebuchet MS',sans-serif;font-size:18px;font-weight:600;cursor:pointer;-webkit-transition:all .2s;transition:all .2s;box-shadow:0 8px 25px rgba(255,107,53,.3)}
.login-btn:active{-webkit-transform:scale(.97);transform:scale(.97)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;-webkit-transform:none;transform:none}
.login-error{font-size:13px;color:#FF4444;min-height:20px;-webkit-transition:opacity .2s;transition:opacity .2s}
.login-lockout{font-size:13px;color:#FF6B35;min-height:20px}
.login-attempts{font-size:11px;color:rgba(255,255,255,.25);min-height:16px}
.login-dedication{font-size:11px;color:rgba(255,255,255,.3);font-style:italic;margin-top:10px}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-lock">🔐</div>
  <div class="login-title">Study Quiz</div>
  <div class="login-sub">Enter your credentials to start</div>
  <div class="login-form">
    <input class="login-input" type="text" id="loginUser" placeholder="👤 Username" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <input class="login-input" type="password" id="loginPass" placeholder="🔑 Password">
    <button class="login-btn" id="loginBtn" onclick="tryLogin()">Enter →</button>
  </div>
  <div class="login-error" id="loginError"></div>
  <div class="login-attempts" id="loginAttempts"></div>
  <div class="login-dedication">Study Quiz for Benício, with love, from Daddy. ❤️</div>
</div>
<div id="appWrapper" style="display:none">
<div class="particles" id="particles"></div>
<div class="dedication">Study Quiz for Benício, with love, from Daddy. ❤️</div>
<div class="screen active" id="home">
  <div class="logo">📚</div>
  <div class="home-title">Study Quiz</div>
  <div class="home-sub">Benício's Exam Prep · Y3</div>
  <div class="exam-list" id="examList"></div>
</div>
<div class="screen" id="topics">
  <div class="hdr"><button class="hdr-back" onclick="go('home')">←</button><div class="hdr-title" id="topicsTitle"></div><div class="hdr-badge" id="topicsBadge"></div></div>
  <div class="topic-grid" id="topicGrid"></div>
  <div class="study-ref" id="studyRef"></div>
</div>
<div class="screen" id="lesson">
  <div class="hdr"><button class="hdr-back" onclick="go('topics')">←</button><div class="hdr-title" id="lessonTitle"></div></div>
  <div class="lesson-wrap"><div class="lesson-illus" id="lessonIllus"></div><div class="lesson-body" id="lessonBody"></div></div>
  <button class="quiz-start" id="quizStartBtn" onclick="startQuiz()">🎮 Start Quiz!</button>
</div>
<div class="screen" id="quiz">
  <div class="hdr"><button class="hdr-back" onclick="go('topics')">←</button><div class="hdr-title" id="quizHdrTitle"></div></div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="q-count" id="qCount"></div>
  <div class="q-card"><div class="q-text" id="qText"></div><div class="q-img" id="qImg"></div></div>
  <div class="opts" id="optsList"></div>
  <div class="fb" id="fb"></div>
  <button class="nxt" id="nxtBtn" onclick="nextQ()"></button>
</div>
<div class="screen" id="results">
  <div class="res-emoji" id="resEmoji"></div>
  <div class="res-title" id="resTitle"></div>
  <div class="res-score" id="resScore"></div>
  <div class="res-stars" id="resStars"></div>
  <div class="res-msg" id="resMsg"></div>
  <div class="res-btns"><button class="btn-retry" id="btnRetry" onclick="startQuiz()"></button><button class="btn-home" onclick="go('home')">🏠 Back to Exams</button></div>
</div>

<script>
// ===================== SVG BUILDER HELPERS =====================
function S(w,h,bg,content){return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><defs><filter id="gl"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="${w}" height="${h}" rx="14" fill="${bg}"/>${content}</svg>`}
const W=500,H=300;

// ===================== QUESTION ILLUSTRATIONS (per question) =====================
const QI = {
  // === SCIENCE: REFLECTION ===
  sci_refl_0: ()=>S(W,H,'#0d1b2a',`
    <rect x="230" y="50" width="16" height="200" rx="3" fill="#a8d8ea" opacity=".8"/>

        lesson:`<h3>Grandezas e Medidas</h3><p>1 metro = 100 cm = 1000 mm</p><p>Régua para pequenos, metro para grandes.</p><p>📌 Relógio: ponteiro pequeno = horas, grande = minutos. No 6 = "e meia".</p>`,

  {id:'math',date:'27/04',day:'Monday',lang:'en',name:'Math Test',icon:'🧮',css:'c-math',badge:'English',
    ref:'<p>📖 Prime Math: pp.20-31 (Add), 37-42 (Sub), 44+ (problems), 123&125 (Graphs), 130-134 (m&cm)</p>',
    topics:[
      {id:'math_ops',icon:'➕',name:'Addition & Subtraction',desc:'Adding and taking away numbers',illus:'generic',
        lesson:`<h3>Addition & Subtraction</h3><p><span class="hl">Regrouping:</span> When numbers add up to more than 9, we carry 1 to the next place. Example: 48+36 → 8+6=14, write 4, carry 1!</p><p><span class="hl">Subtraction:</span> When you can't take away, borrow from the next column. Example: 72−45 → borrow to make 12−5=7.</p><p>📌 "How many in all?" = add. "How many are left?" = take away.</p>`,
        quiz:[
          {q:'What is 58 + 37?',opts:['85','95','105','94'],correct:1,fb:'8+7=15, write 5, carry 1. 5+3+1=9 → 95!',img:'math_ops_0'},
          {q:'What is 83 − 46?',opts:['47','37','43','27'],correct:1,fb:'Borrow: 13−6=7, 7−4=3 → 37!',img:'math_ops_1'},
          {q:'Tom has 45 stickers. He gets 28 more. How many in all?',opts:['63','73','83','72'],correct:1,fb:'45+28=73. He gets more, so we add!',img:'math_ops_2'},
          {q:'What does "regrouping" mean in math?',opts:['Taking away','Carrying to the next place','Counting back','Cutting in half'],correct:1,fb:'Regrouping means carrying 1 when numbers add up to more than 9!',img:'math_ops_3'},
          {q:'Sara had 60 candies. She gave 24 away. How many are left?',opts:['44','36','34','46'],correct:1,fb:'60−24=36. She gave away, so we take away!',img:'math_ops_4'}
        ]},
      {id:'math_meas',icon:'📏',name:'Measurement',desc:'Meters and centimeters',illus:'generic',
        lesson:`<h3>Meters & Centimeters</h3><p>A <span class="hl">meter (m)</span> is about the size of a big step. A <span class="hl">centimeter (cm)</span> is very small — like the tip of your finger!</p><p>1 meter = 100 centimeters.</p><p>We use a <span class="hl">ruler</span> for small things and a <span class="hl">tape measure</span> for big things.</p><p>📌 Always start at zero on the ruler!</p>`,
        quiz:[
          {q:'How many centimeters are in 1 meter?',opts:['10','50','100','1000'],correct:2,fb:'1 meter = 100 centimeters!',img:'math_meas_0'},
          {q:'What do we use to measure a pencil?',opts:['Meters','Centimeters','Kilometers','Liters'],correct:1,fb:'A pencil is small — we use centimeters!',img:'math_meas_1'},
          {q:'Which is longer: 1 meter or 90 cm?',opts:['90 cm','They are the same','1 meter','We don\'t know'],correct:2,fb:'1 meter = 100 cm, and 100 is more than 90!',img:'math_meas_2'},
          {q:'What tool do we use to measure how long something is?',opts:['A scale','A clock','A ruler','A cup'],correct:2,fb:'We use a ruler to measure length!',img:'math_meas_3'},
          {q:'About how long is a classroom?',opts:['5 cm','5 meters','50 meters','500 meters'],correct:1,fb:'A classroom is about 5 to 10 meters long!',img:'math_meas_4'}
        ]},
      {id:'math_graph',icon:'📊',name:'Graphs',desc:'Bar graphs and pictographs',illus:'generic',
        lesson:`<h3>Graphs</h3><p>A <span class="hl">bar graph</span> uses bars to show numbers. The taller the bar, the bigger the number!</p><p>A <span class="hl">pictograph</span> uses little pictures to show numbers. Each picture can mean 1 or more.</p><p>📌 Always read the <span class="hl">title</span> first to know what the graph is about!</p>`,
        quiz:[
          {q:'In a bar graph, the tallest bar means:',opts:['The smallest number','The biggest number','Nothing','A mistake'],correct:1,fb:'The taller the bar, the bigger the number!',img:'math_graph_0'},
          {q:'What is a pictograph?',opts:['A photo','A graph that uses little pictures','A painting','A math problem'],correct:1,fb:'A pictograph uses pictures to show numbers!',img:'math_graph_1'},
          {q:'If each 🍎 = 3 votes and there are 4 apples, how many votes?',opts:['4','7','12','15'],correct:2,fb:'4 apples × 3 votes each = 12 votes!',img:'math_graph_2'},
          {q:'What should you read first on a graph?',opts:['The biggest bar','The title','The colors','The smallest number'],correct:1,fb:'Always read the title first to know what the graph shows!',img:'math_graph_3'},
          {q:'Bar graphs are good for:',opts:['Telling stories','Comparing numbers','Drawing','Measuring things'],correct:1,fb:'Bar graphs help us compare numbers side by side!',img:'math_graph_4'}
        ]}
    ]},

  {id:'portugues',date:'23/04',day:'Terça',lang:'pt',name:'Língua Portuguesa',icon:'📝',css:'c-portugues',badge:'Português',
    ref:'<p>📖 Livro Unidade A · Capítulos 1 e 2</p><p>📓 Registros no caderno</p>',
    topics:[
      {id:'pt_bio',icon:'📖',name:'Biografia e Autobiografia',desc:'Quem escreve? Em qual pessoa?',illus:'generic',
        lesson:`<h3>Biografia e Autobiografia</h3><p>A palavra <span class="hl">biografia</span> vem do grego: <span class="hl">bio</span> = vida + <span class="hl">grafia</span> = escrita. Ou seja, "vida escrita"!</p><p><span class="hl">Biografia</span> = OUTRA pessoa conta a história de alguém. Usa a <span class="hl">3ª pessoa</span>: ele, ela, seu, sua. Ex: "Ele nasceu em 1452 na Itália..."</p><p><span class="hl">Autobiografia</span> = a PRÓPRIA pessoa conta sua história. Usa a <span class="hl">1ª pessoa</span>: eu, meu, minha. Ex: "Desde pequeno fui invadido por livros..."</p><p>📌 Ambas contam <span class="hl">fatos reais</span>: nascimento, infância, conquistas, lugares onde viveu!</p><p>📌 Na biografia aparecem informações como: data de nascimento, onde nasceu, o que fez de importante, profissão.</p>`,
        quiz:[
          {q:'O que significa a palavra "biografia"?',opts:['Livro de receitas','Vida escrita','História inventada','Desenho bonito'],correct:1,fb:'Bio = vida, grafia = escrita → biografia = vida escrita!',img:'pt_genero_0'},
          {q:'Quem escreve uma biografia?',opts:['A própria pessoa','Outra pessoa','Um robô','Ninguém'],correct:1,fb:'Na biografia, OUTRA pessoa conta a história de alguém!',img:'pt_genero_0'},
          {q:'E quem escreve uma autobiografia?',opts:['Outra pessoa','A própria pessoa','Um jornalista','Um professor'],correct:1,fb:'Na autobiografia, a PRÓPRIA pessoa conta sua vida!',img:'pt_genero_1'},
          {q:'"Eu nasci no Rio de Janeiro e adorava ler" é trecho de:',opts:['Biografia','Autobiografia','Fábula','Receita'],correct:1,fb:'Usa "eu" (1ª pessoa) → é autobiografia!',img:'pt_genero_1'},
          {q:'"Ela nasceu em 1990 e se tornou médica" é trecho de:',opts:['Autobiografia','Biografia','Fábula','Poesia'],correct:1,fb:'Usa "ela" (3ª pessoa) → outra pessoa escreveu → biografia!',img:'pt_genero_3'},
          {q:'Biografias e autobiografias contam fatos:',opts:['Inventados','Reais','Mágicos','Do futuro'],correct:1,fb:'Sempre fatos reais da vida de alguém!',img:'pt_genero_2'},
          {q:'A biografia usa qual pessoa para contar a história?',opts:['1ª pessoa (eu, meu)','2ª pessoa (tu, teu)','3ª pessoa (ele, ela, seu)','Nenhuma'],correct:2,fb:'Biografia usa 3ª pessoa: ele, ela, seu, sua!',img:'pt_genero_3'},
          {q:'A autobiografia usa qual pessoa?',opts:['1ª pessoa (eu, meu, minha)','2ª pessoa (tu)','3ª pessoa (ele, ela)','Todas'],correct:0,fb:'Autobiografia usa 1ª pessoa: eu, meu, minha!',img:'pt_genero_1'},
          {q:'Qual informação aparece em biografias?',opts:['Receitas de bolo','Data e local de nascimento','Feitiços mágicos','Previsão do tempo'],correct:1,fb:'Biografias trazem nascimento, infância, conquistas e fatos reais!',img:'pt_genero_4'},
          {q:'"Desde pequeno fui invadido por livros e leituras..." — isso é:',opts:['Biografia','Autobiografia','Fábula','Notícia'],correct:1,fb:'Usa "fui" (1ª pessoa) → a própria pessoa conta → autobiografia!',img:'pt_genero_1'}
        ]},
      {id:'pt_fab',icon:'🦊',name:'Fábulas',desc:'Histórias com animais que ensinam uma lição',illus:'generic',
        lesson:`<h3>Fábulas</h3><p>Uma <span class="hl">fábula</span> é uma história curta, geralmente com <span class="hl">animais que falam e agem como pessoas</span>. No final, sempre tem uma <span class="hl">moral</span> — uma lição de vida!</p><p>📌 <span class="hl">"O Sapo e o Boi"</span> (Esopo): Um sapo viu um boi enorme e ficou com inveja. Começou a se estufar para ficar do mesmo tamanho, até que... estourou! <span class="hl">Moral: seja sempre você mesmo.</span></p><p>📌 <span class="hl">"O Rato do Mato e o Rato da Cidade"</span>: O rato do campo vivia com calma, comendo raízes e ervas. O rato da cidade tinha comida farta, mas vivia com medo de gatos e perigos. <span class="hl">Moral: mais vale uma vida simples com paz do que luxo com perigos.</span></p><p>📌 Fábulas são diferentes de biografias! Fábulas são <span class="hl">histórias inventadas</span> que ensinam algo. Biografias contam <span class="hl">fatos reais</span>.</p>`,
        quiz:[
          {q:'O que é uma fábula?',opts:['A história real de alguém','Uma história com animais que ensina uma lição','Um texto sobre ciências','Uma receita'],correct:1,fb:'Fábulas usam animais que falam e ensinam uma moral!',img:'pt_fab_2'},
          {q:'Toda fábula tem uma:',opts:['Receita','Conta de matemática','Moral (lição)','Música'],correct:2,fb:'No final da fábula sempre tem uma moral — uma lição de vida!',img:'pt_fab_2'},
          {q:'Na fábula "O Sapo e o Boi", o sapo queria:',opts:['Cantar','Ficar do tamanho do boi','Nadar','Dormir'],correct:1,fb:'O sapo ficou com inveja do boi e tentou se estufar para ficar grande!',img:'pt_fab_0'},
          {q:'Qual é a moral de "O Sapo e o Boi"?',opts:['Corra sempre','Seja sempre você mesmo','Coma bastante','Durma cedo'],correct:1,fb:'O sapo se deu mal tentando ser o que não era — seja você mesmo!',img:'pt_fab_0'},
          {q:'Na fábula do Rato do Mato e o Rato da Cidade, o rato do campo preferia:',opts:['A cidade cheia de perigos','Sua vida simples e em paz','Morar com gatos','Comer sozinho'],correct:1,fb:'O rato do campo preferiu sua vida calma, mesmo com pouca comida!',img:'pt_fab_1'},
          {q:'Qual é a moral do Rato do Mato e o Rato da Cidade?',opts:['Cidade é melhor','Mais vale vida simples com paz do que luxo com perigos','Ratos não gostam de queijo','Campo é ruim'],correct:1,fb:'Mais vale paz e sossego do que luxo com preocupações!',img:'pt_fab_1'},
          {q:'Fábulas são diferentes de biografias porque:',opts:['Fábulas contam fatos reais','Fábulas são histórias inventadas com uma moral','Biografias têm animais','São iguais'],correct:1,fb:'Fábulas = inventadas com moral. Biografias = fatos reais!',img:'pt_fab_2'},
          {q:'Os personagens das fábulas geralmente são:',opts:['Pessoas famosas','Animais que falam','Robôs','Plantas'],correct:1,fb:'Nas fábulas, os animais falam e agem como pessoas!',img:'pt_fab_2'},
          {q:'Quem escreveu muitas fábulas famosas?',opts:['Santos Dumont','Esopo','Neymar','Papai Noel'],correct:1,fb:'Esopo é um dos autores mais famosos de fábulas!',img:'pt_fab_0'},
          {q:'O que aconteceu com o sapo que tentou imitar o boi?',opts:['Ficou bonito','Estourou','Virou boi','Ficou amigo do boi'],correct:1,fb:'O sapo se estufou tanto que estourou! Por isso: seja você mesmo.',img:'pt_fab_0'}
        ]},
      {id:'pt_subst',icon:'📦',name:'Substantivos',desc:'Comuns, próprios, primitivos e derivados',illus:'generic',
        lesson:`<h3>Substantivos</h3><p><span class="hl">Substantivo</span> é a palavra que dá nome a objetos, seres, sentimentos e lugares.</p><p>📌 <span class="hl">Substantivo comum</span> = nome geral, escrito com letra <span class="hl">minúscula</span>: escola, país, gato, tristeza, rio, computador.</p><p>📌 <span class="hl">Substantivo próprio</span> = nome específico, SEMPRE com letra <span class="hl">maiúscula</span>: Brasil, São Paulo, Pueri Domus, Nintendo, Rio Amazonas.</p><p>📌 <span class="hl">Primitivo</span> = palavra original (limão, jornal). <span class="hl">Derivado</span> = palavra que vem de outra usando um <span class="hl">sufixo</span>: limão → limo<span class="hl">eiro</span>, jornal → jornal<span class="hl">eiro</span>, casa → cas<span class="hl">inha</span>, livro → livr<span class="hl">ão</span>, dente → dent<span class="hl">inho</span>, motor → motor<span class="hl">ista</span>.</p>`,
        quiz:[
          {q:'O que é um substantivo?',opts:['Uma ação','Palavra que dá nome a coisas','Uma cor','Um número'],correct:1,fb:'Substantivo dá nome a objetos, seres, sentimentos e lugares!',img:'pt_sub_0'},
          {q:'Qual destes é um substantivo próprio?',opts:['escola','gato','Brasil','tristeza'],correct:2,fb:'Brasil é nome específico de um país → substantivo próprio, com maiúscula!',img:'pt_sub_1'},
          {q:'Substantivos próprios são escritos com:',opts:['Letra minúscula','Letra maiúscula','Números','Símbolos'],correct:1,fb:'Substantivos próprios SEMPRE com letra maiúscula!',img:'pt_sub_2'},
          {q:'"Rio" é substantivo comum. E "Rio Amazonas"?',opts:['Comum','Próprio','Adjetivo','Verbo'],correct:1,fb:'Rio Amazonas é o nome específico de um rio → substantivo próprio!',img:'pt_sub_0'},
          {q:'A palavra "limoeiro" é derivada de:',opts:['Limeira','Limão','Limonada','Lima'],correct:1,fb:'Limão + sufixo -eiro = limoeiro! É um substantivo derivado.',img:'pt_sub_1'},
          {q:'Qual é o sufixo na palavra "casinha"?',opts:['-casa','-inha','-sinha','-asin'],correct:1,fb:'Casa + -inha = casinha. O sufixo -inha indica tamanho pequeno!',img:'pt_sub_2'},
          {q:'"Motorista" vem de qual palavra primitiva?',opts:['Moto','Motor','Motora','Motorismo'],correct:1,fb:'Motor + sufixo -ista = motorista!',img:'pt_sub_0'},
          {q:'Qual destes é um substantivo COMUM?',opts:['Vanessa','São Paulo','cachorro','Nintendo'],correct:2,fb:'Cachorro é nome geral de um animal → substantivo comum, com minúscula!',img:'pt_sub_1'},
          {q:'O sufixo -ão na palavra "livrão" indica:',opts:['Tamanho pequeno','Tamanho grande','Uma cor','Uma pessoa'],correct:1,fb:'Livrão = livro grande! O sufixo -ão indica aumento (aumentativo).',img:'pt_sub_2'},
          {q:'"Bananeira" é um substantivo derivado de:',opts:['Bana','Banana','Banano','Banho'],correct:1,fb:'Banana + sufixo -eira = bananeira!',img:'pt_sub_0'}
        ]},
      {id:'pt_adj',icon:'🎨',name:'Adjetivos',desc:'Descrevendo coisas e adjetivos pátrios (-ês/-esa)',illus:'generic',
        lesson:`<h3>Adjetivos</h3><p><span class="hl">Adjetivo</span> é a palavra que dá <span class="hl">característica</span> ao substantivo. Ex: "O cachorro é <span class="hl">bravo</span>." / "A casa é <span class="hl">grande</span>."</p><p>📌 Podemos descrever coisas pela: <span class="hl">Textura</span> (macio, duro, crocante), <span class="hl">Forma</span> (redondo, quadrado, oval), <span class="hl">Cor</span> (vermelho, amarelo, rosa), <span class="hl">Gosto</span> (doce, salgado, azedo).</p><p>📌 <span class="hl">Adjetivos pátrios</span> indicam de onde a pessoa vem. Usam os sufixos <span class="hl">-ÊS</span> (masculino) e <span class="hl">-ESA</span> (feminino):</p><p>Portugal → português / portuguesa<br>França → francês / francesa<br>China → chinês / chinesa<br>Japão → japonês / japonesa<br>Holanda → holandês / holandesa</p>`,
        quiz:[
          {q:'O que é um adjetivo?',opts:['Nome de coisa','Palavra que descreve o substantivo','Uma ação','Um lugar'],correct:1,fb:'Adjetivo dá característica ao substantivo!',img:'pt_adj_0'},
          {q:'Na frase "O gato bonito dormiu", qual é o adjetivo?',opts:['gato','bonito','dormiu','O'],correct:1,fb:'Bonito descreve o gato → é o adjetivo!',img:'pt_adj_1'},
          {q:'"Doce", "salgado" e "azedo" são adjetivos de:',opts:['Cor','Forma','Textura','Gosto'],correct:3,fb:'Doce, salgado e azedo descrevem o gosto!',img:'pt_adj_0'},
          {q:'Uma pessoa que nasceu na França é:',opts:['Francesa','Franciosa','Franciana','Franção'],correct:0,fb:'França + -esa = francesa! É um adjetivo pátrio.',img:'pt_adj_2'},
          {q:'Qual é o masculino de "japonesa"?',opts:['Japoneiro','Japonês','Japônico','Japanês'],correct:1,fb:'Japonesa → japonês! Sufixo -ÊS no masculino.',img:'pt_adj_2'},
          {q:'"Redondo", "quadrado" e "oval" são adjetivos de:',opts:['Gosto','Cor','Forma','Textura'],correct:2,fb:'Eles descrevem a forma das coisas!',img:'pt_adj_0'},
          {q:'Uma comida "crocante" e "macia" está sendo descrita pela:',opts:['Cor','Forma','Textura','Tamanho'],correct:2,fb:'Crocante e macia descrevem a textura!',img:'pt_adj_0'},
          {q:'Na frase "A bola vermelha caiu", qual é o adjetivo?',opts:['bola','vermelha','caiu','A'],correct:1,fb:'Vermelha descreve a bola → é o adjetivo!',img:'pt_adj_1'},
          {q:'Uma pessoa que nasceu na China é:',opts:['Chinesa','Chineira','Chiniosa','Chinalesa'],correct:0,fb:'China + -esa = chinesa! Adjetivo pátrio.',img:'pt_adj_2'},
          {q:'Qual é o feminino de "holandês"?',opts:['Holandeira','Holandesa','Holandisa','Holandosa'],correct:1,fb:'Holandês → holandesa! Masculino -ÊS, feminino -ESA.',img:'pt_adj_2'}
        ]},
      {id:'pt_ss',icon:'🔤',name:'Ortografia S/SS',desc:'Quando usar S ou SS entre vogais',illus:'generic',
        lesson:`<h3>Uso do S e SS</h3><p>📌 <span class="hl">S no início da palavra</span> = som de S: <span class="hl">s</span>apo, <span class="hl">s</span>opa, <span class="hl">s</span>ol.</p><p>📌 <span class="hl">S entre duas vogais</span> = som de <span class="hl">Z</span>: ca<span class="hl">s</span>a, me<span class="hl">s</span>a, ro<span class="hl">s</span>a, Bra<span class="hl">s</span>il, de<span class="hl">s</span>ejo.</p><p>📌 <span class="hl">SS entre duas vogais</span> = som de <span class="hl">S</span>: pa<span class="hl">ss</span>arinho, gira<span class="hl">ss</span>ol, pá<span class="hl">ss</span>aro, a<span class="hl">ss</span>ombrada, carro<span class="hl">ss</span>el.</p><p>⚠️ <span class="hl">Nenhuma palavra começa com SS!</span></p><p>📌 Dica rápida: se o som é de Z entre vogais → um S só. Se o som é de S entre vogais → dois SS.</p>`,
        quiz:[
          {q:'A letra S entre duas vogais tem som de:',opts:['S','Z','X','R'],correct:1,fb:'S entre vogais soa como Z: casa, mesa, rosa!',img:'pt_ss_0'},
          {q:'Qual é a escrita correta?',opts:['Ssapo','Sapo','Ssapu','Çapo'],correct:1,fb:'Nenhuma palavra começa com SS! O correto é sapo.',img:'pt_ss_1'},

      {id:'pt_lh',icon:'✏️',name:'Ortografia LHA/LHO/LIA/LIO',desc:'Palavras terminadas em LHA, LHO, LIA e LIO',illus:'generic',
        lesson:`<h3>LHA / LHO / LIA / LIO</h3><p>Muitas palavras terminam com sons parecidos, mas a escrita é diferente!</p><p>📌 Palavras com <span class="hl">LHO</span>: coe<span class="hl">lho</span>, repo<span class="hl">lho</span>, mi<span class="hl">lho</span>, joe<span class="hl">lho</span>, choca<span class="hl">lho</span>, espe<span class="hl">lho</span>.</p><p>📌 Palavras com <span class="hl">LHA</span>: mura<span class="hl">lha</span>, fo<span class="hl">lha</span>, toa<span class="hl">lha</span>, sobrance<span class="hl">lha</span>, ervi<span class="hl">lha</span>, miga<span class="hl">lha</span>.</p><p>📌 Palavras com <span class="hl">LIA</span>: famí<span class="hl">lia</span>, mobi<span class="hl">lia</span>, Emí<span class="hl">lia</span>, sandá<span class="hl">lia</span>.</p><p>📌 Palavras com <span class="hl">LIO</span>: cí<span class="hl">lio</span>, domicí<span class="hl">lio</span>, utensí<span class="hl">lio</span>.</p><p>⚠️ Dica: LHA/LHO tem o som do "LH" (como em "filho"). LIA/LIO tem som de "LI" separado (como em "Júlia").</p>`,
        quiz:[
          {q:'Qual palavra é escrita com LHO?',opts:['Famílio','Coelho','Mobílio','Cílio'],correct:1,fb:'Coelho se escreve com LHO!',img:'pt_lh_0'},
          {q:'"Família" se escreve com:',opts:['LHA','LHO','LIA','LIO'],correct:2,fb:'Família termina com LIA!',img:'pt_lh_1'},

          {q:'"Sobrancelha" termina com:',opts:['LIA','LHO','LHA','LIO'],correct:2,fb:'Sobrancelha termina com LHA!',img:'pt_lh_0'},

          {q:'"Mobília" termina com:',opts:['LHA','LHO','LIA','LIO'],correct:2,fb:'Mobília termina com LIA!',img:'pt_lh_0'}
        ]},
      {id:'pt_mn',icon:'🔡',name:'Ortografia M/N antes de consoantes',desc:'Quando usar M ou N antes de outras letras',illus:'generic',
        lesson:`<h3>M ou N antes de consoantes?</h3><p>📌 Antes de <span class="hl">P</span> e <span class="hl">B</span> → sempre <span class="hl">M</span>:</p><p>bo<span class="hl">mb</span>eiro, la<span class="hl">mp</span>arina, ta<span class="hl">mb</span>or, co<span class="hl">mp</span>utador, so<span class="hl">mb</span>rinha, lâ<span class="hl">mp</span>ada, ca<span class="hl">mp</span>o.</p><p>📌 Antes de <span class="hl">outras consoantes</span> (T, D, G, Q, C...) → sempre <span class="hl">N</span>:</p><p>bri<span class="hl">n</span>quedo, ca<span class="hl">n</span>tiga, po<span class="hl">n</span>te, de<span class="hl">n</span>te, li<span class="hl">n</span>do, ba<span class="hl">n</span>co.</p><p>⚠️ Erro comum: escrever "brimquedo" (errado!) em vez de "brinquedo" (certo!). Q não é P nem B, então usa N!</p><p>📌 Dica fácil: veja a letra que vem DEPOIS. Se for P ou B → M. Se for qualquer outra → N.</p>`,
        quiz:[
          {q:'Antes de P e B, usamos:',opts:['N','M','S','L'],correct:1,fb:'Antes de P e B → sempre M! Exemplo: tambor, computador.',img:'pt_mn_0'},
          {q:'Qual é a escrita correta?',opts:['Brinquedo','Brimquedo','Brinqedo','Brincedo'],correct:0,fb:'Brinquedo! Antes de Q → usa N (não é P nem B).',img:'pt_mn_2'},
          {q:'"Lamparina" usa M antes do P porque:',opts:['Começa com L','Antes de P sempre vai M','É uma palavra grande','Tem três sílabas'],correct:1,fb:'Antes de P → M! LaM-Pa-ri-na.',img:'pt_mn_1'},
          {q:'"Computador" se escreve com M ou N antes do P?',opts:['N','M','Nenhum','Os dois'],correct:1,fb:'CoMPutador → antes de P = M!',img:'pt_mn_1'},
          {q:'Qual é a escrita correta?',opts:['Tanpor','Tambor','Tanbor','Tampor'],correct:1,fb:'TaMBor → antes de B = M!',img:'pt_mn_0'},
          {q:'"Sombrinha" — por que tem M antes do B?',opts:['Porque começa com S','Porque antes de B sempre vai M','Porque é pequena','Porque tem acento'],correct:1,fb:'SoMBrinha → antes de B = M! Regra: M antes de P e B.',img:'pt_mn_0'},
          {q:'Qual está escrito ERRADO?',opts:['Bombeiro','Cantiga','Lanpada','Sombra'],correct:2,fb:'O correto é lâMPada! Antes de P → M, não N.',img:'pt_mn_1'},
          {q:'"Ponte" se escreve com M ou N antes do T?',opts:['M','N','Nenhum','Os dois'],correct:1,fb:'PoNTe → T não é P nem B, então usa N!',img:'pt_mn_2'},
          {q:'Qual é a escrita correta?',opts:['Campo','Canpo','Campu','Canpu'],correct:0,fb:'CaMPo → antes de P = M!',img:'pt_mn_1'},
          {q:'"Banco" se escreve com M ou N antes do C?',opts:['M','N','Nenhum','Os dois'],correct:1,fb:'BaNCo → C não é P nem B, então usa N!',img:'pt_mn_0'}
        ]},
      {id:'pt_mai',icon:'🔠',name:'Letra Maiúscula e Interpretação',desc:'Quando usar maiúscula e entender textos',illus:'generic',
        lesson:`<h3>Letra Maiúscula e Interpretação de Texto</h3><p>📌 Usamos <span class="hl">letra maiúscula</span>:</p><p>• No <span class="hl">início de frases</span>: "O menino correu."</p><p>• Em <span class="hl">nomes próprios</span> de pessoas: Benício, Vanessa</p><p>• Em nomes de <span class="hl">lugares</span>: Brasil, São Paulo, Rio Amazonas</p><p>• Em nomes de <span class="hl">marcas</span>: Nintendo, Faber Castel</p><p>📌 <span class="hl">Interpretação de texto</span>: ao ler um texto, preste atenção em:</p><p>• <span class="hl">Quem?</span> (personagens)</p><p>• <span class="hl">O quê?</span> (o que aconteceu)</p><p>• <span class="hl">Onde?</span> (lugar)</p><p>• <span class="hl">Quando?</span> (tempo)</p><p>• <span class="hl">Por quê?</span> (motivo)</p>`,
        quiz:[
          {q:'Quando usamos letra maiúscula?',opts:['No meio das palavras','No início de frases e nomes próprios','Nunca','Só em números'],correct:1,fb:'Maiúscula no início de frases e em nomes próprios!',img:'pt_mai_0'},
          {q:'Qual frase está escrita corretamente?',opts:['o Brasil é grande.','O brasil é grande.','O Brasil é grande.','o brasil é grande.'],correct:2,fb:'O (início de frase) e Brasil (nome próprio) com maiúscula!',img:'pt_mai_0'},
          {q:'Por que "São Paulo" é escrito com maiúscula?',opts:['É uma palavra bonita','É nome próprio de um lugar','Tem duas palavras','Começa com S'],correct:1,fb:'São Paulo é nome próprio de uma cidade → maiúscula!',img:'pt_mai_0'},
          {q:'Ao ler um texto, "Quem?" nos ajuda a encontrar:',opts:['O lugar','Os personagens','O tempo','A moral'],correct:1,fb:'Quem = os personagens da história!',img:'pt_mai_0'},
          {q:'Na fábula do rato do campo, "Onde?" a história acontece?',opts:['Na escola','No campo e na cidade','No espaço','No mar'],correct:1,fb:'A história acontece no campo e na cidade!',img:'pt_mai_0'},
          {q:'Qual destas palavras NÃO precisa de maiúscula?',opts:['Benício','Nintendo','escola','São Paulo'],correct:2,fb:'Escola é substantivo comum → minúscula! Os outros são próprios.',img:'pt_mai_0'}
        ]}
    ]},

  {id:'langarts',date:'29/04',day:'Wednesday',lang:'en',name:'Language Arts',icon:'📖',css:'c-langarts',badge:'English',
    ref:'<p>📖 Language Arts Booklet pp.5-7, 9-10, 13-15</p><p>📖 Cornerstone pp.18-19, 34-35</p>',
    topics:[
      {id:'la_present',icon:'⏰',name:'Simple Present Tense',desc:'Adding -s, -es and -ies to verbs',illus:'generic',
        lesson:`<h3>Simple Present Tense</h3><p>When we talk about things that happen every day or are always true, we use the <span class="hl">simple present</span>.</p><p>📌 With <span class="hl">he, she, it</span> we add something to the verb:</p><p>Most verbs → add <span class="hl">-s</span>: he play<span class="hl">s</span>, she read<span class="hl">s</span>, it rain<span class="hl">s</span></p><p>Verbs ending in s, sh, ch, x, o → add <span class="hl">-es</span>: she wash<span class="hl">es</span>, he watch<span class="hl">es</span>, it go<span class="hl">es</span></p><p>Verbs ending in consonant + y → change y to <span class="hl">-ies</span>: she carr<span class="hl">ies</span>, he stud<span class="hl">ies</span>, it fl<span class="hl">ies</span></p><p>📌 With <span class="hl">I, you, we, they</span> → the verb stays the same: I play, they read, we go.</p>`,
        quiz:[
          {q:'She ___ to school every day.',opts:['go','goes','gos','going'],correct:1,fb:'She + go → goes! (ends in O → add -es)',img:'la_verb_0'},
          {q:'He ___ TV after dinner.',opts:['watch','watchs','watches','watching'],correct:2,fb:'He + watch → watches! (ends in CH → add -es)',img:'la_verb_2'},
          {q:'My cat ___ milk every morning.',opts:['drink','drinks','drinkes','drinkies'],correct:1,fb:'It (my cat) + drink → drinks! (most verbs → add -s)',img:'la_verb_2'},
          {q:'She ___ her homework every day.',opts:['study','studys','studies','studyes'],correct:2,fb:'She + study → studies! (consonant + Y → change to -ies)',img:'la_verb_1'},
          {q:'They ___ soccer on Saturdays.',opts:['plays','play','playes','plais'],correct:1,fb:'They + play → play! (with they, the verb stays the same)',img:'la_verb_0'},
          {q:'He ___ his teeth before bed.',opts:['brush','brushs','brushes','brushies'],correct:2,fb:'He + brush → brushes! (ends in SH → add -es)',img:'la_verb_2'},
          {q:'The baby ___ a lot.',opts:['cry','crys','cries','cryes'],correct:2,fb:'It (the baby) + cry → cries! (consonant + Y → -ies)',img:'la_verb_1'}
        ]},
      {id:'la_wh',icon:'❓',name:'Wh- Questions',desc:'What, Where, Who, When, Why',illus:'generic',
        lesson:`<h3>Wh- Questions</h3><p>We use question words to ask for information:</p><p>📌 <span class="hl">What</span> = asks about a thing or action. "What is your name?"</p><p>📌 <span class="hl">Where</span> = asks about a place. "Where do you live?"</p><p>📌 <span class="hl">Who</span> = asks about a person. "Who is your teacher?"</p><p>📌 <span class="hl">When</span> = asks about time. "When is your birthday?"</p><p>📌 <span class="hl">Why</span> = asks about a reason. "Why are you happy?"</p><p>📌 <span class="hl">How</span> = asks about the way something happens. "How do you go to school?"</p>`,
        quiz:[
          {q:'___ is your name? My name is Ben.',opts:['Where','What','When','Who'],correct:1,fb:'What asks about a thing → What is your name?',img:'la_wh_0'},
          {q:'___ do you live? I live in São Paulo.',opts:['What','Who','Where','When'],correct:2,fb:'Where asks about a place!',img:'la_wh_0'},
          {q:'___ is your best friend? It is Tom.',opts:['Where','When','What','Who'],correct:3,fb:'Who asks about a person!',img:'la_wh_0'},
          {q:'___ is your birthday? It is in March.',opts:['Who','What','Where','When'],correct:3,fb:'When asks about time!',img:'la_wh_0'},
          {q:'___ are you sad? Because I lost my toy.',opts:['What','Where','When','Why'],correct:3,fb:'Why asks about a reason!',img:'la_wh_0'},
          {q:'___ do you go to school? I go by bus.',opts:['Why','What','How','Who'],correct:2,fb:'How asks about the way something happens!',img:'la_wh_1'},
          {q:'___ do you eat for lunch? I eat rice and beans.',opts:['Who','What','When','Where'],correct:1,fb:'What asks about a thing → What do you eat?',img:'la_wh_0'}
        ]},
      {id:'la_read',icon:'📚',name:'Reading & Writing',desc:'Finding information and writing complete sentences',illus:'generic',
        lesson:`<h3>Reading & Writing</h3><p>📌 When you read a text, look for the <span class="hl">key details</span>:</p><p><span class="hl">Who</span> is in the story?</p><p><span class="hl">What</span> happens?</p><p><span class="hl">When</span> does it happen?</p><p><span class="hl">Where</span> does it happen?</p><p><span class="hl">Why</span> does it happen?</p><p>📌 When you write, make <span class="hl">complete sentences</span>:</p><p>✅ Good: "<span class="hl">The cat sleeps on the bed.</span>" (has a subject + verb + details)</p><p>❌ Not complete: "Sleeps on the bed." (who sleeps?)</p><p>❌ Not complete: "The cat." (what does the cat do?)</p><p>📌 Always stay on the <span class="hl">topic</span> — write about what was asked!</p>`,
        quiz:[
          {q:'Which is a COMPLETE sentence?',opts:['The big dog.','Runs very fast.','The big dog runs fast.','Fast dog big.'],correct:2,fb:'A complete sentence needs WHO + WHAT THEY DO!',img:'la_read_0'},
          {q:'When reading a story, "Who?" helps you find:',opts:['The place','The people in the story','The time','The reason'],correct:1,fb:'Who = the people or characters in the story!',img:'la_read_1'},
          {q:'Which sentence stays on the topic "My Pet"?',opts:['I like math.','My dog is brown and playful.','The sky is blue.','Pizza is good.'],correct:1,fb:'Only "My dog is brown and playful" is about the pet!',img:'la_read_0'},
          {q:'"Where?" helps you find:',opts:['The people','The time','The place','The reason'],correct:2,fb:'Where = the place where things happen!',img:'la_read_1'},
          {q:'What is missing? "Eats a banana every morning."',opts:['A place','A verb','A subject (who?)','A time'],correct:2,fb:'Who eats? We need a subject! Example: "She eats a banana."',img:'la_read_0'},
          {q:'Which is NOT a complete sentence?',opts:['I go to school.','She likes ice cream.','The tall tree.','We play soccer.'],correct:2,fb:'"The tall tree" — what about it? It needs a verb!',img:'la_read_0'}
        ]}
    ]},

  {id:'historia',date:'16/04',day:'Quinta',lang:'pt',name:'História e Geografia',icon:'🌍',css:'c-historia',badge:'Português',
    ref:'<p>📓 Caderno de História e Geografia</p><p>📖 My Projects · pp.35-37</p>',
    topics:[
      {id:'hist_cult',icon:'🎭',name:'Cultura e Diversidade',desc:'Influências indígenas, africanas, portuguesas e italianas',illus:'generic',
        lesson:`<h3>Herança Brasileira — Quem contribuiu?</h3><p>🏹 <span class="hl">Indígenas:</span> mandioca, milho, tapioca, pipoca, rede de dormir, tomar banho todos os dias, andar descalço, brincar de peteca, cesto de palha. Palavras: abacaxi, tatu, jacaré, Iguaçu, Pará.</p><p>🌍 <span class="hl">Africanos:</span> capoeira, samba, congada, maracatu, reisado. Instrumentos: berimbau, agogô, reco-reco, atabaque. Comidas: acarajé, vatapá, inhame, feijoada. Palavras: caçula, dengo, batuque.</p><p>⛵ <span class="hl">Portugueses:</span> língua portuguesa, azulejos, festas juninas, bacalhau, religião católica.</p><p>🇮🇹 <span class="hl">Italianos:</span> macarrão e outras comidas!</p><p>📌 A <span class="hl">diversidade cultural</span> é a mistura dessas influências que faz o Brasil um país tão rico e especial!</p>`,
        quiz:[
          {q:'A mandioca, o milho e a pipoca são heranças de qual povo?',opts:['Portugueses','Africanos','Indígenas','Italianos'],correct:2,fb:'Os povos indígenas cultivavam mandioca, milho, pipoca e muito mais!',img:'hist_cult_0'},
          {q:'A capoeira é uma dança/luta que tem origem:',opts:['Indígena','Africana','Portuguesa','Italiana'],correct:1,fb:'A capoeira foi criada pelos africanos trazidos ao Brasil!',img:'hist_cult_1'},
          {q:'A língua que falamos no Brasil veio de qual povo?',opts:['Indígenas','Africanos','Portugueses','Italianos'],correct:2,fb:'Falamos português porque os colonizadores portugueses trouxeram sua língua!',img:'hist_cult_2'},
          {q:'A feijoada e o samba são contribuições do povo:',opts:['Indígena','Africano','Português','Italiano'],correct:1,fb:'A feijoada e o samba são parte da rica herança africana no Brasil!',img:'hist_cult_4'},
          {q:'Tomar banho todos os dias e dormir em redes são hábitos que vieram dos:',opts:['Portugueses','Africanos','Indígenas','Italianos'],correct:2,fb:'Os indígenas já tomavam banho diariamente e dormiam em redes!',img:'hist_cult_0'},
          {q:'O que significa "diversidade cultural"?',opts:['Todo mundo é igual','Diferentes culturas contribuindo juntas','Só uma cultura existe','Não ter cultura'],correct:1,fb:'Diversidade = muitas culturas juntas, e cada uma contribuiu para o Brasil!',img:'hist_cult_3'},
          {q:'Por que a cultura brasileira é tão rica e variada?',opts:['Porque só tem um povo','Porque recebeu influências de vários povos diferentes','Porque copiou tudo de um país','Porque não tem tradições'],correct:1,fb:'Indígenas, africanos, portugueses, italianos e outros — cada povo trouxe algo especial!',img:'hist_cult_3'}
        ]}
    ]},

  {id:'social',date:'15/04',day:'Wednesday',lang:'en',name:'Social Studies',icon:'🗺️',css:'c-social',badge:'English',
    ref:'<p>📓 Social Studies notebook</p><p>📖 Cornerstone pp.6-7 — Kids\' Stories from around the World</p>',
    topics:[
      {id:'soc_cult',icon:'🌎',name:'Cultures & Traditions',desc:'How people live around the world',illus:'generic',
        lesson:`<h3>Cultures & Traditions</h3><p><span class="hl">Culture</span> = how a group of people live: their food, music, clothes, language, and parties!</p><p><span class="hl">Tradition</span> = something families do again and again, like celebrating a holiday every year. Parents teach traditions to their children!</p><p>📌 <span class="hl">People live in different places:</span></p><p>🏘️ A <span class="hl">suburb</span> has many houses near a big city.</p><p>🏔️ A <span class="hl">small town</span> can be far from the city, sometimes in the mountains.</p><p>🏙️ A <span class="hl">big city</span> has tall buildings and many people.</p><p>🌾 A <span class="hl">farm</span> is in the countryside. Families grow food there.</p><p>📌 Kids everywhere go to school, play, and have families — even if they live in very different places! We should <span class="hl">respect</span> all cultures. 🌈</p>`,
        quiz:[
          {q:'What is a "culture"?',opts:['A kind of food','How a group of people live','The name of a country','A type of dance'],correct:1,fb:'Culture is how people live: food, music, clothes, language, and parties!',img:'soc_cult_0'},
          {q:'What is a "tradition"?',opts:['Something new','Something you do only one time','Something families do again and again','A type of drawing'],correct:2,fb:'A tradition is something families repeat — like celebrating a holiday every year!',img:'soc_cult_1'},
          {q:'A place with many houses near a big city is called a:',opts:['Farm','Suburb','Mountain','Island'],correct:1,fb:'A suburb has many houses and is close to a big city!',img:'soc_cult_2'},
          {q:'How should we treat people from different cultures?',opts:['Laugh at them','Be afraid','Respect them','Ignore them'],correct:2,fb:'We should respect all cultures — being different is what makes the world beautiful!',img:'soc_cult_3'},
          {q:'What do all kids around the world have in common?',opts:['They live in the same place','They go to school and have families','They eat the same food','They speak the same language'],correct:1,fb:'All kids go to school, play, and have families — no matter where they live!',img:'soc_cult_4'},
          {q:'Which one is a tradition?',opts:['Doing homework today','Celebrating Christmas every year','Watching a new movie','Playing a new game'],correct:1,fb:'Christmas is celebrated every year — that is a tradition!',img:'soc_cult_0'},
          {q:'A family that grows food in the countryside lives on a:',opts:['Suburb','Tall building','Farm','Shopping mall'],correct:2,fb:'Farms are in the countryside where families grow food!',img:'soc_cult_4'}
        ]}
    ]},

  {id:'ciencias_som',date:'14/04',day:'Terça',lang:'pt',name:'Ciências — Som',icon:'🔊',css:'c-ciencias',badge:'Português',

      {id:'som',icon:'🔊',name:'O Som',desc:'Vibração, propagação, características e experiência',illus:'sound',
        lesson:`<h3>O que é o Som?</h3><p>Som é uma <span class="hl">vibração</span> que chega aos nossos ouvidos por meio de ondas sonoras.</p><p>📌 <span class="hl">Características do som:</span> Altura (grave/agudo), Intensidade (forte/fraco), Duração (longo/curto) e Timbre (cada instrumento tem o seu!).</p><p>O som viaja pelo ar, pela água e por sólidos. No vácuo (espaço), NÃO tem som!</p><p>🧪 <span class="hl">Experiência:</span> Celular dentro de um pote de vidro coberto com filme PVC e grãos de arroz em cima. Quando o celular toca, o arroz pula! As vibrações do som se propagam pelo pote e transferem para os grãos. 🍚</p><p>📌 Num concerto, ouvimos sons de flautas, violino, piano, tambor, vozes e aplausos — cada um produz vibrações diferentes!</p>`,

  {id:'science',date:'13/04',day:'Monday',lang:'en',name:'Science — Light',icon:'💡',css:'c-science',badge:'English',
    ref:'<p>📖 Science Booklet pp.19-33</p><p>📓 Science Notebook</p>',
    topics:[
      {id:'sci_refl',icon:'🪞',name:'Reflection',desc:'When light bounces back',illus:'reflection',
        lesson:`<h3>Reflection</h3><p>When light hits something smooth and shiny, it <span class="hl">bounces back</span>. This is called <span class="hl">reflection</span>!</p><p>It is like throwing a ball at a wall — the ball comes back to you! 🏀</p><p>When light bounces off a mirror, it sends a picture of you back to your eyes. That is why you can see yourself!</p><p>📌 A flat mirror shows you normally. But a curved surface (like the inside of a <span class="hl">spoon</span>) shows you upside down!</p>`,
        quiz:[
          {q:'What happens when light hits a mirror?',opts:['It is absorbed','It is reflected','It stops','It changes color'],correct:1,fb:'Light is reflected — it bounces back from the mirror!',img:'sci_refl_0'},
          {q:'Which one reflects light the best?',opts:['A black shirt','A smooth mirror','A piece of wood','An eraser'],correct:1,fb:'Smooth and shiny things reflect light the best!',img:'sci_refl_1'},
          {q:'Reflection is like throwing a ball at a wall because:',opts:['The ball melts','The ball bounces back','The ball goes away','The wall breaks'],correct:1,fb:'Light bounces back like a ball bouncing off a wall!',img:'sci_refl_2'},
          {q:'When you look at the INSIDE of a spoon, you look:',opts:['Normal','Upside down','Very big','Very small'],correct:1,fb:'The curved inside of a spoon flips your reflection upside down!',img:'sci_refl_3'},
          {q:'Light reflects at the ___ angle it came in.',opts:['A bigger','A smaller','The same','Any'],correct:2,fb:'Light always reflects at the same angle!',img:'sci_refl_4'}
        ]},
      {id:'sci_refr',icon:'🌈',name:'Refraction',desc:'When light bends',illus:'refraction',
        lesson:`<h3>Refraction</h3><p>When light goes from one thing into another (like from air into water), it <span class="hl">bends</span>. This is called <span class="hl">refraction</span>!</p><p>That is why a straw in a glass of water looks broken — but it is not really broken! The light bends when it goes into the water. 🥤</p><p>📌 This is also why you might miss a fish when trying to catch it — the fish is not really where you see it!</p><p>📌 A <span class="hl">rainbow</span> happens when sunlight bends inside rain drops and splits into many colors! 🌈</p>`,
        quiz:[
          {q:'Refraction means light:',opts:['Bounces back','Bends','Breaks things','Gets lost'],correct:1,fb:'Refraction is when light bends!',img:'sci_refr_0'},
          {q:'Why does a straw look broken in water?',opts:['The straw really breaks','Light is refracted in water','The glass is broken','It is magic'],correct:1,fb:'Light is refracted (it bends) when it goes into water!',img:'sci_refr_1'},
          {q:'A rainbow is an example of:',opts:['Absorption','Reflection','Refraction','A shadow'],correct:2,fb:'Sunlight is refracted inside rain drops and splits into colors!',img:'sci_refr_2'},
          {q:'Why might you miss a fish in water?',opts:['Fish is too fast','Refraction makes the fish look in a different place','Water is too dark','Fish can fly'],correct:1,fb:'Refraction bends the light, so the fish is not where you see it!',img:'sci_refr_3'},
          {q:'Refraction happens because light changes ___ in water.',opts:['Color','Speed','Size','Shape'],correct:1,fb:'Light changes speed in water, and that makes it bend!',img:'sci_refr_4'}
        ]},
      {id:'sci_abs',icon:'🖤',name:'Absorption',desc:'When things take in light',illus:'absorption',
        lesson:`<h3>Absorption</h3><p>When light hits something and <span class="hl">does not bounce back</span>, it is <span class="hl">absorbed</span>. The light turns into <span class="hl">heat</span>! 🌡️</p><p>That is why <span class="hl">black clothes feel hotter</span> in the sun — black absorbs almost all light!</p><p><span class="hl">White clothes feel cooler</span> because white reflects most light back.</p><p>📌 A red apple absorbs all colors of light except red. Red is the only color that bounces to your eyes! 🍎</p>`,
        quiz:[
          {q:'When something absorbs light, it gets:',opts:['Colder','Warmer','Smaller','Louder'],correct:1,fb:'Absorbed light turns into heat — so things get warmer!',img:'sci_abs_0'},
          {q:'Why do black clothes feel hotter in the sun?',opts:['They are heavier','They absorb more light','They reflect more light','They are thicker'],correct:1,fb:'Black absorbs almost all light and turns it into heat!',img:'sci_abs_1'},
          {q:'A red apple absorbs which colors of light?',opts:['Only red','All colors except red','No colors','Only green'],correct:1,fb:'It absorbs all colors and only reflects red to our eyes!',img:'sci_abs_2'},
          {q:'Which color keeps you coolest in the sun?',opts:['Black','Dark blue','White','Brown'],correct:2,fb:'White reflects most light, so less absorption and less heat!',img:'sci_abs_3'},
          {q:'Solar panels work because of:',opts:['Reflection','Refraction','Absorption','Shadows'],correct:2,fb:'Solar panels absorb sunlight and turn it into energy!',img:'sci_abs_4'}
        ]},
      {id:'sci_trans',icon:'🔍',name:'Transparent, Translucent & Opaque',desc:'Can light go through it?',illus:'transparent',
        lesson:`<h3>Transparent, Translucent & Opaque</h3><p><span class="hl">Transparent:</span> ALL light goes through — you can see clearly! Like a clean window or a glass bottle. 🪟</p><p><span class="hl">Translucent:</span> SOME light goes through, but things look blurry. Like a thin plastic bag or frosted glass. 🧊</p><p><span class="hl">Opaque:</span> NO light goes through at all! Like a wall, a book, or a wooden table. 🧱</p><p>📌 Opaque things make <span class="hl">shadows</span> because they block all light!</p>`,
        quiz:[
          {q:'A clear glass bottle is:',opts:['Opaque','Translucent','Transparent','Dark'],correct:2,fb:'Clear glass is transparent — all light goes through!',img:'sci_trans_0'},
          {q:'A thin plastic bag is:',opts:['Transparent','Translucent','Opaque','Shiny'],correct:1,fb:'Some light goes through but things look blurry = translucent!',img:'sci_trans_1'},
          {q:'A wooden table is:',opts:['Transparent','Translucent','Opaque','See-through'],correct:2,fb:'No light goes through wood = opaque!',img:'sci_trans_2'},
          {q:'Shadows are made by ___ things.',opts:['Transparent','Translucent','Opaque','Small'],correct:2,fb:'Opaque things block all light and make shadows!',img:'sci_trans_3'},
          {q:'Which one is transparent?',opts:['A shoe','A frosted window','A clear glass cup','A thick book'],correct:2,fb:'A clear glass cup is transparent — you can see right through it!',img:'sci_trans_4'}
        ]},
      {id:'sci_light',icon:'💡',name:'Light Sources',desc:'Where does light come from?',illus:'generic',
        lesson:`<h3>Where Does Light Come From?</h3><p>A <span class="hl">light source</span> is something that makes its own light.</p><p>🌿 <span class="hl">From nature:</span> the Sun, stars, fire, fireflies.</p><p>🔧 <span class="hl">Made by people:</span> light bulbs, flashlights, candles, TV screens.</p><p>📌 Light goes in <span class="hl">straight lines</span>.</p><p>📌 We see things because light goes from things into our <span class="hl">eyes</span>.</p><p>📌 In the <span class="hl">dark</span>, there is no light, so we can not see!</p>`,
        quiz:[
          {q:'Which one is a light source from nature?',opts:['A flashlight','A light bulb','The Sun','A TV screen'],correct:2,fb:'The Sun makes its own light — it is from nature!',img:'sci_abs_0'},
          {q:'Light goes in:',opts:['Curved lines','Zigzag lines','Straight lines','Circles'],correct:2,fb:'Light always goes in straight lines!',img:'sci_refl_0'},
          {q:'We can see things because light:',opts:['Comes from our eyes','Goes from things into our eyes','Is invisible','Only works at night'],correct:1,fb:'Light bounces off things and goes into our eyes!',img:'sci_trans_0'},
          {q:'Which one is a light source made by people?',opts:['A star','A firefly','A candle','Lightning'],correct:2,fb:'A candle is made by people!',img:'som_0'},
          {q:'Why can we not see in the dark?',opts:['Our eyes close','There is no light','Colors go away','Air blocks the way'],correct:1,fb:'No light = nothing for our eyes to see!',img:'sci_trans_2'}
        ]}
    ]}
];

// ===================== STATE =====================
let curExam=null,curTopic=null,curQuiz=[],qIdx=0,score=0;
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

// ===================== HOME =====================
function renderHome(){
  const list=document.getElementById('examList');
  const sorted=[...EXAMS].sort((a,b)=>{const[da,ma]=a.date.split('/').map(Number);const[db,mb]=b.date.split('/').map(Number);return(ma*100+da)-(mb*100+db)});
  list.innerHTML=sorted.map(e=>`<div class="exam-card ${e.css}" onclick="openExam('${e.id}')"><div class="exam-icon">${e.icon}</div><div class="exam-info"><div class="exam-name">${e.name}</div><div class="exam-meta"><span class="tag">📅 ${e.date} · ${e.day}</span><span class="tag">${e.badge==='English'?'🇺🇸':'🇧🇷'} ${e.badge}</span></div></div><div class="exam-arrow">›</div></div>`).join('')}

// ===================== TOPICS =====================
function openExam(id){
  curExam=EXAMS.find(e=>e.id===id);
  document.getElementById('topicsTitle').textContent=curExam.name;
  document.getElementById('topicsBadge').textContent=`${curExam.lang==='en'?'🇺🇸':'🇧🇷'} ${curExam.badge} · 📅 ${curExam.date}`;
  const c=['var(--cyan)','var(--orange)','var(--pink)','var(--green)'];
  document.getElementById('topicGrid').innerHTML=curExam.topics.map((t,i)=>`<div class="topic-card" onclick="openTopic('${t.id}')"><div class="topic-icon">${t.icon}</div><div class="topic-name">${t.name}</div><div class="topic-desc">${t.desc}</div></div>`).join('');
  document.getElementById('studyRef').innerHTML=`<div class="study-ref-title">📚 ${curExam.lang==='pt'?'Instrumentos de Estudo':'Study Tools'}</div>${curExam.ref}`;
  go('topics')}

function openTopic(id){
  curTopic=curExam.topics.find(t=>t.id===id);
  document.getElementById('lessonTitle').textContent=curTopic.name;
  document.getElementById('lessonIllus').innerHTML=LILLUS[curTopic.illus]||LILLUS.generic;
  document.getElementById('lessonBody').innerHTML=curTopic.lesson;
  document.getElementById('quizStartBtn').textContent=curExam.lang==='pt'?'🎮 Começar o Quiz!':'🎮 Start the Quiz!';
  go('lesson')}

// ===================== QUIZ =====================
function startQuiz(){curQuiz=[...curTopic.quiz].sort(()=>Math.random()-.5);qIdx=0;score=0;document.getElementById('quizHdrTitle').textContent=curTopic.icon+' Quiz';go('quiz');renderQ()}

function renderQ(){
  const q=curQuiz[qIdx],total=curQuiz.length,pt=curExam.lang==='pt';
  document.getElementById('progFill').style.width=(qIdx/total*100)+'%';
  document.getElementById('qCount').textContent=`${qIdx+1} ${pt?'de':'of'} ${total}`;
  document.getElementById('qText').textContent=q.q;
  const imgEl=document.getElementById('qImg');
  if(q.img&&QI[q.img]){imgEl.innerHTML=QI[q.img]();imgEl.style.display='block'}else{imgEl.style.display='none'}
  const L=['A','B','C','D'];
  document.getElementById('optsList').innerHTML=q.opts.map((o,i)=>`<button class="opt" onclick="check(${i})"><span class="opt-l">${L[i]}</span><span>${o}</span></button>`).join('');
  document.getElementById('fb').style.display='none';document.getElementById('fb').className='fb';document.getElementById('nxtBtn').style.display='none'}

function check(sel){
  const q=curQuiz[qIdx],pt=curExam.lang==='pt';
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('dis');if(i===q.correct)b.classList.add('ok');if(i===sel&&sel!==q.correct)b.classList.add('no')});
  const fb=document.getElementById('fb');
  if(sel===q.correct){score++;fb.className='fb fb-ok';fb.innerHTML=`${pt?'✅ Correto!':'✅ Correct!'} ${q.fb}`}
  else{fb.className='fb fb-no';fb.innerHTML=`${pt?'❌ Ops! Resposta: ':'❌ Oops! Answer: '}<strong>${q.opts[q.correct]}</strong><br>${q.fb}`}
  fb.style.display='block';
  const n=document.getElementById('nxtBtn');n.style.display='block';n.textContent=qIdx<curQuiz.length-1?(pt?'Próxima →':'Next →'):(pt?'🏆 Ver resultado':'🏆 See results')}

function nextQ(){qIdx++;if(qIdx<curQuiz.length)renderQ();else showResults()}

function showResults(){
  const pt=curExam.lang==='pt',total=curQuiz.length,pct=score/total;
  const tier=pct<.3?0:pct<.5?1:pct<.7?2:pct<1?3:4;
  go('results');
  document.getElementById('resEmoji').textContent=['😅','🤔','😊','🤩','🏆'][tier];
  document.getElementById('resTitle').textContent=(pt?['Tente de novo!','Quase lá!','Muito bom!','Excelente!','Perfeito! 🎉']:['Try again!','Almost there!','Very good!','Excellent!','Perfect! 🎉'])[tier];
  document.getElementById('resScore').innerHTML=`${score} <span class="tot">/ ${total}</span>`;
  document.getElementById('resMsg').textContent=(pt?['Continue estudando!','No caminho certo!','Parabéns!','Incrível!','Você é demais! ⭐']:['Keep studying!','On the right track!','Great job!','Amazing!','You\'re a genius! ⭐'])[tier];
  const sc=Math.ceil(pct*5);
  document.getElementById('resStars').innerHTML=Array.from({length:5},(_,i)=>`<span style="animation-delay:${i*.12}s;opacity:${i<sc?1:.2}">${i<sc?'⭐':'☆'}</span>`).join('');
  document.getElementById('btnRetry').textContent=pt?'🔄 Tentar de novo':'🔄 Try again';
  document.getElementById('progFill').style.width='100%';
  if(pct>=.7)confetti()}

function confetti(){var c=document.createElement('div');c.className='confetti-c';document.body.appendChild(c);var cols=['#FFD93D','#FF6B35','#FF1493','#00E5FF','#39FF14','#B388FF'];for(var i=0;i<55;i++){var p=document.createElement('div');p.className='conf';p.style.left=Math.random()*100+'%';p.style.background=cols[~~(Math.random()*cols.length)];var dur=(2+Math.random()*2)+'s';p.style.webkitAnimationDuration=dur;p.style.animationDuration=dur;p.style.webkitAnimationDelay=Math.random()*1.5+'s';p.style.animationDelay=Math.random()*1.5+'s';var s=6+Math.random()*8;p.style.width=s+'px';p.style.height=s+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p)}setTimeout(function(){c.remove()},5000)}

// BG particles
(function(){var c=document.getElementById('particles');var cols=['#FFD93D','#00E5FF','#FF1493','#39FF14','#B388FF'];for(var i=0;i<25;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';var s=4+Math.random()*10;p.style.width=s+'px';p.style.height=s+'px';p.style.background=cols[~~(Math.random()*cols.length)];var dur=(8+Math.random()*15)+'s';p.style.webkitAnimationDuration=dur;p.style.animationDuration=dur;p.style.webkitAnimationDelay=Math.random()*5+'s';p.style.animationDelay=Math.random()*5+'s';c.appendChild(p)}})();

renderHome();
</script>
</div><!-- end appWrapper -->

<script>
// ===================== LOGIN SYSTEM =====================
var LOGIN_USER='pueri';
var LOGIN_PASS='pueri';
var MAX_ATTEMPTS=5;
var LOCKOUT_MS=3*60*1000; // 3 minutes
var failCount=0;
var lockUntil=0;
var lockTimer=null;

// Check if already authenticated this session
if(window.sessionStorage){try{if(sessionStorage.getItem('sq_auth')==='1'){unlockApp()}}catch(e){}}

// Enter key support
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter'){document.getElementById('loginPass').focus()}});
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter'){tryLogin()}});

function tryLogin(){
  var now=Date.now();
  var errEl=document.getElementById('loginError');
  var attEl=document.getElementById('loginAttempts');
  var btn=document.getElementById('loginBtn');

  // Check lockout
  if(now<lockUntil){
    var secsLeft=Math.ceil((lockUntil-now)/1000);
    errEl.textContent='🔒 Too many attempts. Wait '+secsLeft+'s';
    return;
  }

  var user=document.getElementById('loginUser').value.trim().toLowerCase();
  var pass=document.getElementById('loginPass').value;

  if(user===LOGIN_USER && pass===LOGIN_PASS){
    // Success
    failCount=0;
    if(window.sessionStorage){try{sessionStorage.setItem('sq_auth','1')}catch(e){}}
    unlockApp();
  } else {
    // Fail
    failCount++;
    var remaining=MAX_ATTEMPTS-failCount;

    if(failCount>=MAX_ATTEMPTS){
      lockUntil=now+LOCKOUT_MS;
      errEl.textContent='🔒 Blocked! Too many wrong attempts.';
      attEl.textContent='Try again in 3 minutes';
      btn.disabled=true;
      document.getElementById('loginUser').disabled=true;
      document.getElementById('loginPass').disabled=true;

      // Countdown timer
      if(lockTimer)clearInterval(lockTimer);
      lockTimer=setInterval(function(){
        var left=Math.ceil((lockUntil-Date.now())/1000);
        if(left<=0){
          clearInterval(lockTimer);
          lockTimer=null;
          failCount=0;
          btn.disabled=false;
          document.getElementById('loginUser').disabled=false;
          document.getElementById('loginPass').disabled=false;
          errEl.textContent='';
          attEl.textContent='You can try again now!';
        } else {
          var m=Math.floor(left/60);
          var s=left%60;
          attEl.textContent='⏳ Wait '+m+':'+(s<10?'0':'')+s;
        }
      },1000);
    } else {
      errEl.textContent='❌ Wrong username or password';
      attEl.textContent=remaining+' attempt'+(remaining!==1?'s':'')+' left';
    }

    // Shake animation
    var form=document.querySelector('.login-form');
    form.style.animation='none';
    form.offsetHeight; // trigger reflow
    form.style.webkitAnimation='shake .4s ease';
    form.style.animation='shake .4s ease';

    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  }
}

function unlockApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appWrapper').style.display='block';
}

// Add shake keyframes dynamically (WebView safe)
var shakeStyle=document.createElement('style');
shakeStyle.textContent='@-webkit-keyframes shake{0%,100%{-webkit-transform:translateX(0)}20%{-webkit-transform:translateX(-12px)}40%{-webkit-transform:translateX(12px)}60%{-webkit-transform:translateX(-8px)}80%{-webkit-transform:translateX(8px)}}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}';
document.head.appendChild(shakeStyle);
</script>
